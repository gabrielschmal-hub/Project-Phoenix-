name: Phoenix Daily Run

on:
  schedule:
    - cron: '0 5 * * 1-5'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    # Cap the blast radius. Without this the job inherits GitHub's 6h default,
    # so a hung Yahoo call would burn hours of Actions minutes before dying.
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Phoenix
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python phoenix.py --full

      # Fail loudly if the engine produced nothing. Previously a broken run could
      # commit an empty/partial outputs/ and the workflow would still go green.
      - name: Verify outputs
        run: |
          set -euo pipefail
          test -f outputs/stocks.json || { echo "::error::outputs/stocks.json missing — engine failed"; exit 1; }
          charts=$(ls outputs/charts/*.json 2>/dev/null | wc -l)
          echo "chart files written: $charts"
          if [ "$charts" -lt 50 ]; then
            echo "::error::only $charts chart files — expected hundreds. Yahoo likely blocked the pull."
            exit 1
          fi
          python -c "
          import json
          m = json.load(open('outputs/stocks.json')).get('meta', {})
          cov = m.get('daily_coverage_pct')
          print('daily coverage: %s%%  |  fresh: %s  |  latest bar: %s' % (cov, m.get('data_is_fresh'), m.get('latest_bar')))
          if m.get('data_is_fresh') is False:
              print('::warning::no fresh bars this run - screener is scoring stored history')
          elif cov is not None and cov < 80:
              print('::warning::daily coverage only %s%% - partial refresh' % cov)
          "

      - name: Commit outputs
        run: |
          set -euo pipefail
          git config user.name  "phoenix-bot"
          git config user.email "phoenix-bot@users.noreply.github.com"
          git add outputs/
          # The earnings checker APPENDS new quarters to this CSV at repo root —
          # it must be committed or new earnings are lost every run.
          [ -f macroflow_fundamentals_quarterly.csv ] && git add macroflow_fundamentals_quarterly.csv || true
          # macroflow.db may not exist (db writes aren't wired yet) — don't fail on it
          [ -f macroflow.db ] && git add macroflow.db || true
          # Distinguish "nothing changed" (fine) from "commit broke" (not fine).
          # The old `|| echo "No changes"` swallowed BOTH, so a real failure
          # still showed a green tick with no charts on the site.
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          echo "staged files: $(git diff --cached --name-only | wc -l)"
          git commit -m "Daily run $(date -u +%Y-%m-%d)"
          # Retry the push once — a concurrent push is the only benign failure here.
          git push || (git pull --rebase && git push)
