name: Phoenix Daily Run

on:
  schedule:
    - cron: '0 5 * * 1-5'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Phoenix
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python phoenix.py --full
      - name: Commit outputs
        run: |
          git config user.name  "phoenix-bot"
          git config user.email "phoenix-bot@users.noreply.github.com"
          git add outputs/ macroflow.db || true
          git commit -m "Daily run $(date -u +%Y-%m-%d)" || echo "No changes"
          git push || echo "Nothing to push"
