name: Phoenix Daily Run

on:
  schedule:
    - cron: '0 5 * * 1-5'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      # C2 gate: a broken engine can never publish. Tests are synthetic-data
      # only (no network) and take seconds.
      - name: Engine tests
        run: python test_phoenix_v2.py
      - name: Run Phoenix
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          # C1: enables batch CIO theses (outputs/theses.json). Optional —
          # the run skips theses cleanly if unset.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # E2: enables iPhone push alerts via ntfy.sh. Optional — set this to
          # any hard-to-guess string and subscribe to the same topic in the
          # ntfy app. The run skips alerts cleanly if unset.
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python phoenix.py --full
      - name: Commit outputs
        run: |
          git config user.name  "phoenix-bot"
          git config user.email "phoenix-bot@users.noreply.github.com"
          git add outputs/ || true
          git commit -m "Daily run $(date -u +%Y-%m-%d)" || echo "No changes"
          git push || echo "Nothing to push"
