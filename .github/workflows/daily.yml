name: Phoenix Daily Run

on:
  schedule:
    - cron: '0 5 * * 1-5'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Phoenix pipeline
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python run.py --full

      - name: Commit updated outputs
        run: |
          git config user.name  "phoenix-bot"
          git config user.email "phoenix-bot@users.noreply.github.com"
          git add outputs/ macroflow.db
          git commit -m "Daily run" || echo "No changes to commit"
          git push
