  function trNewId() { return "tr_" + Date.now() + "_" + Math.floor(Math.random() * 9999); }

  function trByStatus(status) {
    return (trLog || []).filter(function(t) { return t.status === status; });
  }

  // ---- arithmetic engine (pure) ----
  function trCalc(t, currentPrice) {
    var entry = +t.entry || 0;
    var stop  = +t.stop  || 0;
    var target = +t.target || 0;
    var qty   = +t.qty   || 0;
    var cur   = currentPrice != null ? +currentPrice : null;

    var risk_per_sh = (entry > 0 && stop > 0) ? Math.abs(entry - stop) : null;
    var reward_per_sh = (entry > 0 && target > 0) ? Math.abs(target - entry) : null;
    var rr = (risk_per_sh && reward_per_sh && risk_per_sh > 0) ? (reward_per_sh / risk_per_sh) : null;

    var pnl = null, pnl_pct = null;
    if (cur !== null && entry > 0 && qty > 0) {
      pnl = (cur - entry) * qty;
      pnl_pct = ((cur - entry) / entry) * 100;
    }

    var dist_stop = (cur !== null && stop > 0) ? ((cur - stop) / cur * 100) : null;
    var dist_target = (cur !== null && target > 0) ? ((target - cur) / cur * 100) : null;

    // % of plan complete: 0 = at entry, 100 = at target, negative = underwater
    var plan_pct = null;
    if (cur !== null && entry > 0 && target > 0 && Math.abs(target - entry) > 0) {
      plan_pct = Math.min(100, Math.max(-50, (cur - entry) / (target - entry) * 100));
    }

    // Suggested size from RISK config: risk 1% of hypothetical $100k account (for relative guidance)
    var acct_size = t.account_size ? +t.account_size : 100000;
    var risk_dollars = acct_size * 0.01;
    var suggested_qty = (risk_per_sh && risk_per_sh > 0) ? Math.floor(risk_dollars / risk_per_sh) : null;

    return { rr: rr, pnl: pnl, pnl_pct: pnl_pct, dist_stop: dist_stop, dist_target: dist_target,
             plan_pct: plan_pct, suggested_qty: suggested_qty, risk_per_sh: risk_per_sh };
  }

  // ---- live price fetch (Yahoo Finance, same CORS-free approach as Research) ----
  function trFetchPrice(ticker, cb) {
    if (trLivePrices[ticker] != null) { cb(trLivePrices[ticker]); return; }
    var url = "https://query1.finance.yahoo.com/v8/finance/chart/" + ticker + "?interval=1d&range=1d";
    fetch(url, { headers: { Accept: "application/json" } }).then(function(r) { return r.json(); })
      .then(function(d) {
        var price = null;
        try {
          var meta = d.chart.result[0].meta;
          price = meta.regularMarketPrice || meta.previousClose;
        } catch(e) {}
        trLivePrices[ticker] = price;
        cb(price);
      }).catch(function() { cb(null); });
  }

  // ---- formatters ----
  function trFmtPx(v) { return v == null ? "—" : Number(v).toLocaleString(undefined, {minimumFractionDigits:2,maximumFractionDigits:2}); }
  function trFmtPnl(v) { if (v == null) return "—"; var s = v >= 0 ? "+" : ""; return s + "$" + Math.abs(v).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0}); }
  function trFmtPct(v, dec) { if (v == null) return "—"; return (v >= 0 ? "+" : "") + v.toFixed(dec != null ? dec : 1) + "%"; }
  function trPnlColor(v) { return v == null ? "var(--inkFade)" : (v >= 0 ? "var(--green)" : "var(--red)"); }

  // ---- render summary bar ----
  function trRenderSummary() {
    var open = trByStatus("open");
    var closed = trByStatus("closed");
    var totalPnl = 0, wins = 0;
    closed.forEach(function(t) {
      if (t.exit_price && t.entry && t.qty) {
        var p = (t.exit_price - t.entry) * t.qty; totalPnl += p; if (p > 0) wins++;
      }
    });
    var winRate = closed.length ? Math.round(wins / closed.length * 100) : null;
    return '<div class="tr-summary-bar">'+
      '<div class="tr-sum-cell"><div class="sk">Open</div><div class="sv" style="color:var(--green)">'+open.length+'</div></div>'+
      '<div class="tr-sum-cell"><div class="sk">Plans</div><div class="sv" style="color:var(--amber)">'+trByStatus("plan").length+'</div></div>'+
      '<div class="tr-sum-cell"><div class="sk">Realized P&L</div><div class="sv" style="color:'+trPnlColor(totalPnl)+'">'+trFmtPnl(totalPnl)+'</div></div>'+
      '<div class="tr-sum-cell"><div class="sk">Win Rate</div><div class="sv">'+(winRate != null ? winRate + "%" : "—")+'</div></div>'+
    '</div>';
  }

  // ---- render Plans tab ----
  function trRenderPlan() {
    var plans = trByStatus("plan");
    if (!plans.length) {
      return '<div class="tr-empty">No trade plans yet.<span>Add a plan with the + button below,<br>or press <b>T</b> in the Screener to flag a stock.</span></div>';
    }
    return plans.map(function(t) {
      var calc = trCalc(t, trLivePrices[t.ticker]);
      var cur = trLivePrices[t.ticker];
      var rrStr = calc.rr != null ? calc.rr.toFixed(1) + "R" : "—";
      var sugStr = calc.suggested_qty != null ? calc.suggested_qty + " sh" : "—";
      return '<div class="tr-card plan-card" data-id="'+t.id+'">'+
        '<div class="tr-head">'+
          '<span class="tr-tk">'+t.ticker+'</span>'+
          '<span class="tr-name">'+(t.name||t.industry||"")+'</span>'+
          '<span class="tr-status-chip chip-plan">PLAN</span>'+
        '</div>'+
        '<div class="tr-grid">'+
          '<div class="tr-cell"><div class="ck">Entry target</div><div class="cv">'+trFmtPx(t.entry)+'</div></div>'+
          '<div class="tr-cell"><div class="ck">Current px</div><div class="cv" style="color:'+(cur==null?"var(--inkFade)":"var(--ink)")+'">'+
            (cur != null ? trFmtPx(cur) : '<span style="font-size:9px;color:var(--inkFade)">tap ↻</span>')+
          '</div></div>'+
          '<div class="tr-cell"><div class="ck">Stop</div><div class="cv" style="color:var(--red)">'+trFmtPx(t.stop)+'</div></div>'+
          '<div class="tr-cell"><div class="ck">Target</div><div class="cv" style="color:var(--green)">'+trFmtPx(t.target)+'</div></div>'+
          '<div class="tr-cell"><div class="ck">Risk/Reward</div><div class="cv">'+rrStr+'</div></div>'+
          '<div class="tr-cell"><div class="ck">Size (guide)</div><div class="cv">'+sugStr+'</div></div>'+
          '<div class="tr-cell"><div class="ck">T-score</div><div class="cv">'+(t.trade_score||"—")+'</div></div>'+
          '<div class="tr-cell"><div class="ck">Planned</div><div class="cv" style="font-size:9px;color:var(--inkFade)">'+(t.plan_date||"—")+'</div></div>'+
        '</div>'+
        (t.thesis ? '<div style="font-family:var(--serif);font-size:11px;color:var(--inkMed);margin-bottom:8px;line-height:1.45">'+t.thesis+'</div>' : '')+
        '<div class="tr-actions">'+
          '<button class="tr-btn primary" data-action="open" data-id="'+t.id+'">Open trade →</button>'+
          '<button class="tr-btn" data-action="refresh" data-id="'+t.id+'">↻ Price</button>'+
          '<button class="tr-btn" data-action="edit" data-id="'+t.id+'">Edit</button>'+
          '<button class="tr-btn danger" data-action="delete" data-id="'+t.id+'">Delete</button>'+
        '</div>'+
      '</div>';
    }).join("");
  }

  // ---- render Open tab ----
  function trRenderOpen() {
    var open = trByStatus("open");
    if (!open.length) {
      return '<div class="tr-empty">No open positions.<span>Open a plan to start tracking live P&L.</span></div>';
    }
    return open.map(function(t) {
      var cur = trLivePrices[t.ticker];
      var calc = trCalc(t, cur);
      var pnlColor = trPnlColor(calc.pnl);
      var barW = calc.plan_pct != null ? Math.max(0, Math.min(100, calc.plan_pct)) : 0;
      var barColor = calc.pnl != null && calc.pnl < 0 ? "var(--redSoft)" : "var(--greenSoft)";
      var coaching = trCoachingCache[t.id];
      return '<div class="tr-card open-card" data-id="'+t.id+'">'+
        '<div class="tr-head">'+
          '<span class="tr-tk">'+t.ticker+'</span>'+
          '<span class="tr-name">'+(t.name||t.industry||"")+'</span>'+
          '<span class="tr-status-chip chip-open">OPEN</span>'+
        '</div>'+
        '<div class="tr-grid">'+
          '<div class="tr-cell"><div class="ck">Entry</div><div class="cv">'+trFmtPx(t.entry)+'</div></div>'+
          '<div class="tr-cell"><div class="ck">Current</div><div class="cv" style="color:'+(cur==null?"var(--inkFade)":"var(--ink)")+'">'+
            (cur != null ? trFmtPx(cur) : '—')+
          '</div></div>'+
          '<div class="tr-cell"><div class="ck">P&L</div><div class="cv" style="color:'+pnlColor+'">'+trFmtPnl(calc.pnl)+'</div></div>'+
          '<div class="tr-cell"><div class="ck">P&L %</div><div class="cv" style="color:'+pnlColor+'">'+trFmtPct(calc.pnl_pct)+'</div></div>'+
          '<div class="tr-cell"><div class="ck">Stop</div><div class="cv" style="color:var(--red)">'+trFmtPx(t.stop)+'</div></div>'+
          '<div class="tr-cell"><div class="ck">Target</div><div class="cv" style="color:var(--green)">'+trFmtPx(t.target)+'</div></div>'+
          '<div class="tr-cell"><div class="ck">Dist stop</div><div class="cv" style="color:var(--inkMed)">'+trFmtPct(calc.dist_stop)+'</div></div>'+
          '<div class="tr-cell"><div class="ck">Dist target</div><div class="cv" style="color:var(--inkMed)">'+trFmtPct(calc.dist_target)+'</div></div>'+
          '<div class="tr-cell"><div class="ck">RR</div><div class="cv">'+(calc.rr!=null?calc.rr.toFixed(1)+"R":"—")+'</div></div>'+
          '<div class="tr-cell"><div class="ck">Qty</div><div class="cv">'+(t.qty||"—")+'</div></div>'+
          '<div class="tr-cell"><div class="ck">Entry date</div><div class="cv" style="font-size:9px;color:var(--inkFade)">'+(t.entry_date||"—")+'</div></div>'+
          '<div class="tr-cell"><div class="ck">Setup</div><div class="cv" style="font-size:9px">'+(t.setup||"—")+'</div></div>'+
        '</div>'+
        (calc.plan_pct != null ?
          '<div style="font-family:var(--mono);font-size:8px;color:var(--inkFade);margin-bottom:3px">'+Math.round(calc.plan_pct)+'% of plan complete</div>'+
          '<div class="tr-progress"><div class="tr-progress-bar" style="width:'+barW+'%;background:'+barColor+'"></div></div>'
          : '')+
        (t.thesis ? '<div style="font-family:var(--serif);font-size:11px;color:var(--inkMed);margin-bottom:8px;line-height:1.45">'+t.thesis+'</div>' : '')+
        '<div class="tr-actions">'+
          '<button class="tr-btn danger" data-action="close" data-id="'+t.id+'">Close trade</button>'+
          '<button class="tr-btn" data-action="refresh" data-id="'+t.id+'">↻ Price</button>'+
          '<button class="tr-btn coaching" data-action="coach" data-id="'+t.id+'">'+(coaching?"Coaching ✓":"AI Coaching")+'</button>'+
          '<button class="tr-btn" data-action="edit" data-id="'+t.id+'">Edit</button>'+
        '</div>'+
        (coaching ? '<div class="tr-coaching">'+coaching+'</div>' : '')+
      '</div>';
    }).join("");
  }

  // ---- render Closed/History tab ----
  function trRenderClosed() {
    var closed = trByStatus("closed");
    if (!closed.length) {
      return '<div class="tr-empty">No closed trades yet.<span>Closed trades appear here for review and learning.</span></div>';
    }
    // sort newest exit first
    closed = closed.slice().sort(function(a,b) {
      return (b.exit_date||"") > (a.exit_date||"") ? 1 : -1;
    });
    return closed.map(function(t) {
      var realized = (t.exit_price && t.entry && t.qty) ? (t.exit_price - t.entry) * t.qty : null;
      var pnl_pct = (t.exit_price && t.entry) ? ((t.exit_price - t.entry) / t.entry * 100) : null;
      var isWin = realized != null && realized > 0;
      var isLoss = realized != null && realized < 0;
      var cardClass = "tr-card closed-card" + (isWin ? " win" : isLoss ? " loss" : "");
      var chipClass = isWin ? "tr-status-chip chip-closed-win" : isLoss ? "tr-status-chip chip-closed-loss" : "tr-status-chip";
      var calc = trCalc(t, null);
      return '<div class="'+cardClass+'" data-id="'+t.id+'">'+
        '<div class="tr-head">'+
          '<span class="tr-tk">'+t.ticker+'</span>'+
          '<span class="tr-name">'+(t.name||t.industry||"")+'</span>'+
          '<span class="'+chipClass+'">'+(isWin?"WIN":isLoss?"LOSS":"CLOSED")+'</span>'+
        '</div>'+
        '<div class="tr-grid">'+
          '<div class="tr-cell"><div class="ck">Entry</div><div class="cv">'+trFmtPx(t.entry)+'</div></div>'+
          '<div class="tr-cell"><div class="ck">Exit</div><div class="cv">'+trFmtPx(t.exit_price)+'</div></div>'+
          '<div class="tr-cell"><div class="ck">Realized P&L</div><div class="cv" style="color:'+trPnlColor(realized)+'">'+trFmtPnl(realized)+'</div></div>'+
          '<div class="tr-cell"><div class="ck">Return %</div><div class="cv" style="color:'+trPnlColor(pnl_pct)+'">'+trFmtPct(pnl_pct)+'</div></div>'+
          '<div class="tr-cell"><div class="ck">Stop was</div><div class="cv" style="color:var(--red)">'+trFmtPx(t.stop)+'</div></div>'+
          '<div class="tr-cell"><div class="ck">Target was</div><div class="cv" style="color:var(--green)">'+trFmtPx(t.target)+'</div></div>'+
          '<div class="tr-cell"><div class="ck">RR planned</div><div class="cv">'+(calc.rr!=null?calc.rr.toFixed(1)+"R":"—")+'</div></div>'+
          '<div class="tr-cell"><div class="ck">Qty</div><div class="cv">'+(t.qty||"—")+'</div></div>'+
          '<div class="tr-cell"><div class="ck">Entered</div><div class="cv" style="font-size:9px;color:var(--inkFade)">'+(t.entry_date||"—")+'</div></div>'+
          '<div class="tr-cell"><div class="ck">Exited</div><div class="cv" style="font-size:9px;color:var(--inkFade)">'+(t.exit_date||"—")+'</div></div>'+
          '<div class="tr-cell"><div class="ck">Setup</div><div class="cv" style="font-size:9px">'+(t.setup||"—")+'</div></div>'+
          '<div class="tr-cell"><div class="ck">Exit reason</div><div class="cv" style="font-size:9px">'+(t.exit_reason||"—")+'</div></div>'+
        '</div>'+
        (t.exit_notes ? '<div style="font-family:var(--serif);font-size:11px;color:var(--inkMed);margin-top:4px;line-height:1.45"><b>Review:</b> '+t.exit_notes+'</div>' : '')+
      '</div>';
    }).join("");
  }

  // ---- main render dispatcher ----
  function trRender() {
    var plans = trByStatus("plan"), open = trByStatus("open"), closed = trByStatus("closed");
    // update counts
    var cntP = document.getElementById("trCntPlan"), cntO = document.getElementById("trCntOpen"), cntC = document.getElementById("trCntClosed");
    if (cntP) cntP.textContent = plans.length;
    if (cntO) cntO.textContent = open.length;
    if (cntC) cntC.textContent = closed.length;

    var body = document.getElementById("trBody");
    if (!body) return;
    var summary = trRenderSummary();
    var content = "";
    if (trTab === "plan") content = trRenderPlan();
    else if (trTab === "open") content = trRenderOpen();
    else content = trRenderClosed();
    body.innerHTML = summary + content;

    // wire action buttons
    body.querySelectorAll("[data-action]").forEach(function(btn) {
      btn.addEventListener("click", function() {
        var action = this.dataset.action, id = this.dataset.id;
        if (action === "open") trPromptOpen(id);
        else if (action === "close") trPromptClose(id);
        else if (action === "edit") trPromptEdit(id);
        else if (action === "delete") trConfirmDelete(id);
        else if (action === "refresh") trRefreshPrice(id);
        else if (action === "coach") trGenerateCoaching(id, this);
      });
    });
  }

  // ---- refresh price for one trade ----
  function trRefreshPrice(id) {
    var t = (trLog || []).filter(function(x) { return x.id === id; })[0];
    if (!t) return;
    delete trLivePrices[t.ticker]; // force re-fetch
    trFetchPrice(t.ticker, function(price) {
      trRender();
    });
  }

  // ---- AI coaching (Claude API, same pattern as thesis) ----
  function trGenerateCoaching(id, btn) {
    var t = (trLog || []).filter(function(x) { return x.id === id; })[0];
    if (!t) return;
    if (trCoachingCache[id]) { trCoachingCache[id] = null; trRender(); return; } // toggle off
    var cur = trLivePrices[t.ticker];
    var calc = trCalc(t, cur);
    var regime = (C.macro && C.macro.regime) || "NO_CLEAR";
    btn.disabled = true; btn.textContent = "Thinking…";
    var prompt =
      "You are a senior hedge fund PM coaching a trader on a live position. Be concise and specific. " +
      "Do not invent prices — use only the numbers given. " +
      "Ticker: " + t.ticker + (t.name ? " (" + t.name + ")" : "") + ". " +
      "Setup: " + (t.setup || "breakout") + ". Macro regime: " + regime + ". " +
      "Entry: " + (t.entry || "?") + ". Current: " + (cur != null ? cur.toFixed(2) : "unknown") + ". " +
      "Stop: " + (t.stop || "?") + ". Target: " + (t.target || "?") + ". " +
      "Qty: " + (t.qty || "?") + " shares. " +
      "P&L: " + (calc.pnl != null ? trFmtPnl(calc.pnl) + " (" + trFmtPct(calc.pnl_pct) + ")" : "unknown") + ". " +
      "Distance to stop: " + trFmtPct(calc.dist_stop) + ". Distance to target: " + trFmtPct(calc.dist_target) + ". " +
      "Plan completion: " + (calc.plan_pct != null ? Math.round(calc.plan_pct) + "%" : "unknown") + ". " +
      "Risk/reward: " + (calc.rr != null ? calc.rr.toFixed(1) + "R" : "unknown") + ". " +
      (t.thesis ? "Original thesis: " + t.thesis.slice(0, 200) + ". " : "") +
      "Answer these coaching questions with short headers: " +
      "GOOD ENTRY? (was this a quality setup entry). " +
      "THESIS INTACT? (given current price vs levels, is the reason to own it still valid). " +
      "STOP: should you move it or leave it — and why. " +
      "ADD or REDUCE: should you do either at current price. " +
      "TODAY'S ACTION: one sentence on what to do today. " +
      "Keep under 180 words. Plain text, no markdown symbols.";
    fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1000, messages: [{ role: "user", content: prompt }] })
    }).then(function(r) { return r.json(); }).then(function(data) {
      var text = (data.content || []).filter(function(b) { return b.type === "text"; }).map(function(b) { return b.text; }).join("\n");
      var html = text.replace(/\n?(GOOD ENTRY|THESIS INTACT|STOP|ADD or REDUCE|TODAY'S ACTION)\??:?/g, "<h5>$1</h5>");
      trCoachingCache[id] = html;
      trRender();
    }).catch(function(err) {
      btn.disabled = false; btn.textContent = "Retry coaching";
      trCoachingCache[id] = '<div style="color:var(--red);font-size:11px">Coaching failed: ' + err.message + '. Needs live API on deployed site.</div>';
      trRender();
    });
  }

  // ---- MODALS ----
  function trShowModal(html, onOk) {
    if (trModalOpen) return;
    trModalOpen = true;
    var bg = document.createElement("div"); bg.className = "tr-modal-bg"; bg.id = "trModalBg";
    bg.innerHTML = '<div class="tr-modal">' + html + '</div>';
    document.body.appendChild(bg);
    bg.addEventListener("click", function(ev) { if (ev.target === bg) trCloseModal(); });
    var okBtn = bg.querySelector(".ok");
    if (okBtn) okBtn.addEventListener("click", function() { onOk(bg); });
    var cancelBtn = bg.querySelector(".cancel");
    if (cancelBtn) cancelBtn.addEventListener("click", trCloseModal);
  }

  function trCloseModal() {
    var el = document.getElementById("trModalBg");
    if (el) el.remove();
    trModalOpen = false;
  }

  // ---- Log a new plan ----
  function trPromptAdd(prefill) {
    prefill = prefill || {};
    var today = new Date().toISOString().slice(0, 10);
    var html =
      '<div class="tr-modal-title">New Trade Plan</div>'+
      '<div class="tr-2col">'+
        '<div class="tr-field"><label>Ticker</label><input id="mTicker" value="'+(prefill.ticker||"")+'" placeholder="e.g. NVDA" style="text-transform:uppercase"></div>'+
        '<div class="tr-field"><label>Setup</label><input id="mSetup" value="'+(prefill.setup||"Breakout")+'" placeholder="Breakout / VCP / etc."></div>'+
      '</div>'+
      '<div class="tr-2col">'+
        '<div class="tr-field"><label>Entry price target</label><input id="mEntry" type="number" step="0.01" value="'+(prefill.entry||"")+'"></div>'+
        '<div class="tr-field"><label>Position size (shares)</label><input id="mQty" type="number" step="1" value="'+(prefill.qty||"")+'"></div>'+
      '</div>'+
      '<div class="tr-2col">'+
        '<div class="tr-field"><label>Stop loss</label><input id="mStop" type="number" step="0.01" value="'+(prefill.stop||"")+'"></div>'+
        '<div class="tr-field"><label>Price target</label><input id="mTarget" type="number" step="0.01" value="'+(prefill.target||"")+'"></div>'+
      '</div>'+
      '<div class="tr-field"><label>Thesis / Why (optional)</label><textarea id="mThesis">'+(prefill.thesis||"")+'</textarea></div>'+
      '<div class="tr-2col">'+
        '<div class="tr-field"><label>Plan date</label><input id="mPlanDate" type="date" value="'+(prefill.plan_date||today)+'"></div>'+
        '<div class="tr-field"><label>Account size ($) — for sizing guide</label><input id="mAcct" type="number" value="'+(prefill.account_size||100000)+'"></div>'+
      '</div>'+
      '<div class="tr-modal-actions"><button class="ok">Save plan</button><button class="cancel">Cancel</button></div>';
    trShowModal(html, function(bg) {
      var tk = (bg.querySelector("#mTicker").value || "").trim().toUpperCase();
      if (!tk) { alert("Ticker is required."); return; }
      var trade = {
        id: prefill.id || trNewId(),
        status: prefill.status || "plan",
        ticker: tk,
        name: prefill.name || "",
        industry: prefill.industry || "",
        setup: bg.querySelector("#mSetup").value || "",
        entry: parseFloat(bg.querySelector("#mEntry").value) || null,
        qty: parseFloat(bg.querySelector("#mQty").value) || null,
        stop: parseFloat(bg.querySelector("#mStop").value) || null,
        target: parseFloat(bg.querySelector("#mTarget").value) || null,
        thesis: bg.querySelector("#mThesis").value || "",
        plan_date: bg.querySelector("#mPlanDate").value || today,
        account_size: parseFloat(bg.querySelector("#mAcct").value) || 100000,
        trade_score: prefill.trade_score || null,
        invest_score: prefill.invest_score || null,
      };
      // replace if editing, else push
      var idx = (trLog || []).findIndex(function(x) { return x.id === trade.id; });
      if (idx >= 0) trLog[idx] = trade; else trLog.push(trade);
      trSave(); trCloseModal(); trRender();
    });
  }

  // ---- Edit existing trade ----
  function trPromptEdit(id) {
    var t = (trLog || []).filter(function(x) { return x.id === id; })[0];
    if (!t) return;
    trPromptAdd(t); // reuse the same form with pre-filled values
  }

  // ---- Open trade (plan → open, capture fill) ----
  function trPromptOpen(id) {
    var t = (trLog || []).filter(function(x) { return x.id === id; })[0];
    if (!t) return;
    var today = new Date().toISOString().slice(0, 10);
    var html =
      '<div class="tr-modal-title">Open trade — '+t.ticker+'</div>'+
      '<div style="font-family:var(--mono);font-size:10px;color:var(--inkFade);margin-bottom:14px">Capture your actual fill (may differ from plan)</div>'+
      '<div class="tr-2col">'+
        '<div class="tr-field"><label>Actual fill price</label><input id="mFillPx" type="number" step="0.01" value="'+(t.entry||"")+'"></div>'+
        '<div class="tr-field"><label>Actual shares filled</label><input id="mFillQty" type="number" step="1" value="'+(t.qty||"")+'"></div>'+
      '</div>'+
      '<div class="tr-field"><label>Entry date</label><input id="mEntryDate" type="date" value="'+today+'"></div>'+
      '<div class="tr-modal-actions"><button class="ok">Open position</button><button class="cancel">Cancel</button></div>';
    trShowModal(html, function(bg) {
      t.status = "open";
      t.entry = parseFloat(bg.querySelector("#mFillPx").value) || t.entry;
      t.qty = parseFloat(bg.querySelector("#mFillQty").value) || t.qty;
      t.entry_date = bg.querySelector("#mEntryDate").value;
      trSave(); trCloseModal(); trTab = "open"; trRender();
    });
  }

  // ---- Close trade (open → closed, capture exit) ----
  function trPromptClose(id) {
    var t = (trLog || []).filter(function(x) { return x.id === id; })[0];
    if (!t) return;
    var today = new Date().toISOString().slice(0, 10);
    var cur = trLivePrices[t.ticker];
    var html =
      '<div class="tr-modal-title">Close trade — '+t.ticker+'</div>'+
      '<div class="tr-2col">'+
        '<div class="tr-field"><label>Exit price</label><input id="mExitPx" type="number" step="0.01" value="'+(cur!=null?cur.toFixed(2):"")+'"></div>'+
        '<div class="tr-field"><label>Exit date</label><input id="mExitDate" type="date" value="'+today+'"></div>'+
      '</div>'+
      '<div class="tr-field"><label>Exit reason</label><input id="mExitReason" placeholder="Hit target / Stopped / Thesis broken / etc."></div>'+
      '<div class="tr-field"><label>Post-trade review (optional)</label><textarea id="mExitNotes" placeholder="Did you follow the plan? What would you do differently?"></textarea></div>'+
      '<div class="tr-modal-actions"><button class="ok">Close position</button><button class="cancel">Cancel</button></div>';
    trShowModal(html, function(bg) {
      t.status = "closed";
      t.exit_price = parseFloat(bg.querySelector("#mExitPx").value) || null;
      t.exit_date = bg.querySelector("#mExitDate").value;
      t.exit_reason = bg.querySelector("#mExitReason").value || "";
      t.exit_notes = bg.querySelector("#mExitNotes").value || "";
      delete trCoachingCache[id];
      trSave(); trCloseModal(); trTab = "closed"; trRender();
    });
  }

  // ---- Delete plan ----
  function trConfirmDelete(id) {
    var t = (trLog || []).filter(function(x) { return x.id === id; })[0];
    if (!t) return;
    var html =
      '<div class="tr-modal-title">Delete plan — '+t.ticker+'?</div>'+
      '<div style="font-family:var(--serif);font-size:13px;color:var(--inkMed);margin-bottom:20px">This cannot be undone. The plan will be removed from your log.</div>'+
      '<div class="tr-modal-actions"><button class="ok" style="background:var(--redSoft);border-color:var(--redSoft)">Delete</button><button class="cancel">Cancel</button></div>';
    trShowModal(html, function() {
      var idx = (trLog || []).findIndex(function(x) { return x.id === id; });
      if (idx >= 0) trLog.splice(idx, 1);
      trSave(); trCloseModal(); trRender();
    });
  }

  // ---- init ----
  function initTrades() {
    trLoad(function() {
      // fetch live prices for open positions on load
      var open = trByStatus("open");
      var pending = open.length;
      if (pending === 0) { trRender(); trWireTradesPage(); return; }
      open.forEach(function(t) {
        trFetchPrice(t.ticker, function() {
          pending--;
          if (pending === 0) { trRender(); trWireTradesPage(); }
        });
      });
    });
  }

  function trWireTradesPage() {
    // tab clicks
    var tabs = document.querySelectorAll(".tr-tab");
    tabs.forEach(function(tab) {
      tab.addEventListener("click", function() {
        trTab = this.dataset.tab;
        tabs.forEach(function(t) { t.classList.remove("active"); });
        this.classList.add("active");
        trRender();
      });
    });
    // add button
    var addBtn = document.getElementById("trAddBtn");
    if (addBtn) addBtn.addEventListener("click", function() { trPromptAdd(); });
    // export button
    var expBtn = document.getElementById("trExportBtn");
    if (expBtn) expBtn.addEventListener("click", trExport);
  }

  // ---- hook screener T-button to also offer a Plan modal ----
  // Override watchToggle for trades to open the plan modal
  var _origWatchToggle = null; // patched below after watchToggle is defined

  // ================= WATCHLISTS (research / trades) =================
  // committed-JSON backed: loaded from research.json / trades.json, edits held in memory,
  // exported for the user to re-commit. Live edits persist for the session.
  var watch={research:null, trades:null};
  function watchLoad(kind, cb){
    if(watch[kind]!==null){ cb(); return; }
    getJSON(kind).then(function(d){ watch[kind]=(d&&d.tickers)||[]; cb(); })
      .catch(function(){ watch[kind]=[]; cb(); });
  }
  function watchHas(kind, tk){ return watch[kind] && watch[kind].some(function(x){return x.ticker===tk;}); }
  function watchToggle(kind, stock){
    if(watch[kind]===null) watch[kind]=[];
    var i=watch[kind].findIndex(function(x){return x.ticker===stock.ticker;});
    if(i>=0) watch[kind].splice(i,1);
    else watch[kind].push({ticker:stock.ticker, industry:stock.industry, mcap_B:stock.mcap_B,
      trade_score:stock.trade_score, invest_score:stock.invest_score, label:stock.label,
      daily_pct:stock.daily_pct, added:new Date().toISOString().slice(0,10)});
  }

  function watchPageHTML(kind){
    var title=kind==="research"?"Research":"Trades";
    return '<div class="watch-bar"><div style="font-family:var(--serif);font-size:15px;font-weight:700;color:var(--ink)">'+title+' list</div>'+
      '<div style="font-family:var(--mono);font-size:9px;color:var(--inkFade)" id="'+kind+'Count"></div>'+
      '<button class="exp" id="'+kind+'Export">Export JSON</button></div>'+
      '<div class="watch-grid" id="'+kind+'Grid"></div>';
  }
  function initWatchPage(kind){
    watchLoad(kind, function(){ renderWatch(kind); });
    var eb=document.getElementById(kind+"Export");
    if(eb) eb.addEventListener("click",function(){ exportWatch(kind); });
  }
  function renderWatch(kind){
    var list=watch[kind]||[];
    var grid=document.getElementById(kind+"Grid");
    var cnt=document.getElementById(kind+"Count");
    if(cnt) cnt.textContent=list.length+" stocks";
    if(!grid) return;
    if(!list.length){
      grid.innerHTML='<div class="watch-empty">No stocks yet.<br>Add them from the Screener with the '+(kind==="research"?"<b>R</b>":"<b>T</b>")+' button.<br><span style="font-size:11px;color:var(--inkFade)">Detailed '+kind+' view coming next.</span></div>';
      return;
    }
    grid.innerHTML=list.map(function(s){
      var dp=s.daily_pct, dps=(dp==null)?"\u2014":((dp>=0?"+":"")+dp.toFixed(1)+"%");
      var clk=(kind==="research")?" clickable":"";
      return '<div class="watch-card'+clk+'" data-tk="'+s.ticker+'"><div class="wc-head"><span class="wc-tk">'+s.ticker+'</span><span class="wc-ind">'+(s.industry||"")+'</span><span class="wc-rm" data-tk="'+s.ticker+'">remove</span></div>'+
        '<div class="wc-row"><span class="k">Day</span><span style="color:'+(dp==null?"var(--inkFade)":(dp>=0?"var(--green)":"var(--red)"))+'">'+dps+'</span></div>'+
        '<div class="wc-row"><span class="k">Trade / Invest</span><span>'+(s.trade_score!=null?s.trade_score:"\u2014")+' / '+(s.invest_score!=null?s.invest_score:"\u2014")+'</span></div>'+
        '<div class="wc-row"><span class="k">Label</span><span>'+labelChip(s.label||"")+'</span></div>'+
        (kind==="research"?'<div class="wc-row"><span class="k" style="color:var(--gold)">Open research \u2192</span><span></span></div>':'<div class="wc-row"><span class="k">Added</span><span style="color:var(--inkFade)">'+(s.added||"")+'</span></div>')+'</div>';
    }).join("");
    grid.querySelectorAll(".wc-rm").forEach(function(b){
      b.addEventListener("click",function(ev){
        ev.stopPropagation();
        var tk=this.dataset.tk, i=watch[kind].findIndex(function(x){return x.ticker===tk;});
        if(i>=0) watch[kind].splice(i,1); renderWatch(kind);
      });
    });
    if(kind==="research"){
      grid.querySelectorAll(".watch-card.clickable").forEach(function(card){
        card.addEventListener("click",function(){ openProductPage(this.dataset.tk); });
      });
    }
  }
  function exportWatch(kind){
    var payload=JSON.stringify({tickers:watch[kind]||[]}, null, 1);
    // offer as a downloadable file so the user can commit it as {kind}.json
    var blob=new Blob([payload],{type:"application/json"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a"); a.href=url; a.download=kind+".json"; a.click();
    setTimeout(function(){URL.revokeObjectURL(url);},1000);
  }

  // ================= RESEARCH PRODUCT PAGE =================
  var researchData=null, rpTf="daily", rpDrawn=false, rpCurrentTk=null;
  function ensureResearchData(cb){
    if(researchData){ cb(); return; }
    getJSON("research_data").then(function(d){ researchData=(d&&d.tickers)||{}; cb(); })
      .catch(function(){ researchData={}; cb(); });
  }
  function openProductPage(tk){
    rpCurrentTk=tk; rpDrawn=false; rpTf="daily";
    var page=document.getElementById("page-research");
    page.innerHTML='<div class="loading" style="padding:40px">Loading '+tk+'\u2026</div>';
    ensureResearchData(function(){ renderProductPage(tk); });
  }
  function backToResearchGrid(){
    var page=document.getElementById("page-research");
    page.className="page"; page.innerHTML=watchPageHTML("research");
    initWatchPage("research");
  }

  function renderProductPage(tk){
    var d=researchData[tk];
    var wl=(watch.research||[]).filter(function(x){return x.ticker===tk;})[0]||{};
    var page=document.getElementById("page-research");
    if(!d){
      page.innerHTML='<div class="rp-wrap"><div class="rp-top"><span class="rp-back" id="rpBack">\u2190 Back</span>'+
        '<div class="rp-id"><div class="r1"><span class="tk">'+tk+'</span></div></div></div>'+
        '<div style="padding:30px;font-family:var(--serif);color:var(--inkLight);line-height:1.6">No research data for '+tk+' yet.<br><span style="font-size:12px;color:var(--inkFade)">It populates after the next engine run pulls this ticker (it\'s on your research list, so the next run will fetch it).</span></div></div>';
      document.getElementById("rpBack").addEventListener("click",backToResearchGrid);
      return;
    }
    var p=d.profile||{}, q=d.quote||{}, r52=d.range52||{};
    var name=p.name||wl.name||tk;
    var chg=q.chg, chgpct=q.chg_pct;
    var chgc=(chg==null)?"var(--inkFade)":(chg>=0?"var(--green)":"var(--red)");
    var exch=(p.exchange||"").toUpperCase();
    var exchLabel = /NAS|NMS/.test(exch)?"NASDAQ":(/NYS|NYQ/.test(exch)?"NYSE":exch||"\u2014");
    var r52txt=(r52.low!=null&&r52.high!=null)?(fmtN(r52.low)+" \u2013 "+fmtN(r52.high)):"\u2014";

    page.innerHTML=
      '<div class="rp-wrap">'+
        '<div class="rp-top">'+
          '<span class="rp-back" id="rpBack">\u2190 Back</span>'+
          '<div class="rp-id">'+
            '<div class="r1"><span class="tk">'+tk+'</span>'+
              '<span class="px">'+(q.last!=null?fmtN(q.last):"\u2014")+'</span>'+
              '<span class="chg" style="color:'+chgc+'">'+(chg!=null?((chg>=0?"+":"")+fmtN(chg)+" ("+(chgpct>=0?"+":"")+chgpct.toFixed(2)+"%)"):"")+'</span></div>'+
            '<div class="r2"><span>'+name+'</span><span class="exch">'+exchLabel+'</span><span>'+(p.industry||p.sector||"")+'</span></div>'+
          '</div>'+
          '<div class="rp-stats">'+
            '<div class="rp-stat"><div class="k">Mkt Cap</div><div class="v">'+(q.mcap_B!=null?capFmt(q.mcap_B):"\u2014")+'</div></div>'+
            '<div class="rp-stat"><div class="k">P/E</div><div class="v">'+(d.pe!=null?d.pe.toFixed(1):"\u2014")+'</div></div>'+
            '<div class="rp-stat"><div class="k">52wk Range</div><div class="v" style="font-size:11px">'+r52txt+'</div></div>'+
          '</div>'+
        '</div>'+
        '<div class="rp-body">'+
          '<div class="rp-thesis" id="rpThesis">'+
            '<h4>CIO Thesis</h4>'+
            (p.summary?'<div class="summary">'+truncate(p.summary,420)+'</div>':'<div class="summary" style="color:var(--inkFade)">No company summary available.</div>')+
            '<div id="rpThesisGen"></div>'+
            '<button class="rp-thesis-btn" id="rpThesisBtn">Generate full CIO thesis \u2192</button>'+
            '<div class="rp-connections"><h5>Competitors \u00B7 Suppliers \u00B7 Customers</h5>'+
              '<div class="rp-conn-ph">Not yet available \u2014 this needs a supply-chain data source. Your IBKR connector has this data (company connections), but that integration isn\'t reachable yet. Placeholder until wired.</div>'+
            '</div>'+
          '</div>'+
          '<div class="rp-right">'+
            '<div class="rp-chart-tile"><div class="thead" style="display:flex;align-items:baseline"><span class="tt" style="margin:0">Price</span>'+
              '<div class="rp-seg" id="rpSeg"><button data-tf="daily" class="on">D</button><button data-tf="weekly">W</button><button data-tf="monthly">M</button></div></div>'+
              '<div class="rp-chart-body"><div class="plot" id="rpPlot"></div></div></div>'+
            '<div class="rp-lower">'+
              '<div class="rp-tile"><div class="tt">Financials (Rev / Margin)</div><div class="tbody2" id="rpFin"></div></div>'+
              '<div class="rp-tile"><div class="tt">Analyst Ratings</div><div class="tbody2" id="rpRatings"></div></div>'+
              '<div class="rp-tile"><div class="tt">Next Earnings</div><div class="tbody2" id="rpEarnings"></div></div>'+
            '</div>'+
          '</div>'+
        '</div>'+
      '</div>';

    document.getElementById("rpBack").addEventListener("click",backToResearchGrid);
    renderRpChart(tk);
    renderRpFinancials(d);
    renderRpRatings(d);
    renderRpEarnings(d);
    document.getElementById("rpSeg").addEventListener("click",function(ev){
      var b=ev.target.closest("button"); if(!b)return; rpTf=b.dataset.tf; rpDrawn=false;
      Array.prototype.forEach.call(this.querySelectorAll("button"),function(x){x.classList.toggle("on",x===b);});
      renderRpChart(tk);
    });
    document.getElementById("rpThesisBtn").addEventListener("click",function(){ generateProductThesis(tk, this); });
  }

  function renderRpChart(tk){
    var d=researchData[tk]; if(!d)return;
    var bars=(d.chart&&d.chart[rpTf])||[];
    var el=document.getElementById("rpPlot");
    if(!bars.length){ el.innerHTML='<div class="err" style="padding:12px">No '+rpTf+' price data for '+tk+'.</div>'; return; }
    var dates=bars.map(function(b){return b.date;});
    var volColors=bars.map(function(b){return (b.c>=b.o)?"rgba(45,138,85,.4)":"rgba(176,48,48,.4)";});
    var candle={type:"candlestick",x:dates,open:bars.map(function(b){return b.o;}),high:bars.map(function(b){return b.h;}),
      low:bars.map(function(b){return b.l;}),close:bars.map(function(b){return b.c;}),
      increasing:{line:{color:"#2D8A55"},fillcolor:"rgba(45,138,85,.5)"},decreasing:{line:{color:"#B03030"},fillcolor:"rgba(176,48,48,.5)"},
      yaxis:"y",showlegend:false};
    var vol={type:"bar",x:dates,y:bars.map(function(b){return b.v;}),marker:{color:volColors},yaxis:"y2",showlegend:false};
    var layout={paper_bgcolor:"rgba(0,0,0,0)",plot_bgcolor:"rgba(0,0,0,0)",margin:{l:4,r:44,t:6,b:20},
      font:{family:"'Courier New',monospace",size:9,color:"#6B6347"},showlegend:false,dragmode:"pan",
      grid:{rows:2,columns:1,roworder:"top to bottom"},
      yaxis:{domain:[0.24,1],side:"right",gridcolor:"rgba(0,0,0,.05)",fixedrange:false},
      yaxis2:{domain:[0,0.18],side:"right",gridcolor:"rgba(0,0,0,.04)",showticklabels:false,fixedrange:false},
      xaxis:{rangeslider:{visible:false},gridcolor:"rgba(0,0,0,.04)"}};
    if(rpTf==="daily") layout.xaxis.rangebreaks=[{bounds:["sat","mon"]}];
    Plotly.newPlot("rpPlot",[candle,vol],layout,{displayModeBar:false,responsive:true,scrollZoom:true,doubleClick:"reset"});
    rpDrawn=true;
  }

  function renderRpFinancials(d){
    var fin=d.financials||[];
    var el=document.getElementById("rpFin");
    if(!fin.length){ el.innerHTML='<div style="font-family:var(--mono);font-size:9px;color:var(--inkFade);padding:6px">No quarterly financials available.</div>'; return; }
    var head='<div class="fin-row fin-head"><span class="q">Qtr</span><span class="v">Rev $B</span><span class="v">Margin</span></div>';
    el.innerHTML=head+fin.map(function(f){
      return '<div class="fin-row"><span class="q">'+(f.q||"")+'</span>'+
        '<span class="v">'+(f.revenue_B!=null?f.revenue_B.toFixed(1):"\u2014")+'</span>'+
        '<span class="v" style="color:'+(f.net_margin==null?"var(--inkFade)":(f.net_margin>=0?"var(--green)":"var(--red)"))+'">'+(f.net_margin!=null?f.net_margin.toFixed(0)+"%":"\u2014")+'</span></div>';
    }).join("");
  }

  function renderRpRatings(d){
    var r=d.ratings, el=document.getElementById("rpRatings");
    var p=d.profile||{};
    if(!r){ 
      var recTxt=p.recommendation?('<div class="rate-row"><span class="k">Consensus</span><span style="font-weight:700;text-transform:uppercase">'+p.recommendation+'</span></div>'):'';
      var tgtTxt=p.target_mean?('<div class="rate-row"><span class="k">Target</span><span style="font-weight:700">'+fmtN(p.target_mean)+'</span></div>'):'';
      el.innerHTML=(recTxt||tgtTxt)?(recTxt+tgtTxt):'<div style="font-family:var(--mono);font-size:9px;color:var(--inkFade);padding:6px">No analyst ratings available.</div>';
      return;
    }
    var tot=(r.strong_buy+r.buy+r.hold+r.sell+r.strong_sell)||1;
    var segs=[["strong_buy","#1A5C38",r.strong_buy],["buy","#2D8A55",r.buy],["hold","#A67C00",r.hold],["sell","#B03030",r.sell],["strong_sell","#7A1E1E",r.strong_sell]];
    var bar='<div class="rate-bar">'+segs.filter(function(s){return s[2]>0;}).map(function(s){
      return '<div class="rate-seg" style="background:'+s[1]+';width:'+(s[2]/tot*100)+'%">'+(s[2]/tot>0.12?s[2]:"")+'</div>';
    }).join("")+'</div>';
    var rows=segs.map(function(s){
      return '<div class="rate-row"><span class="k">'+s[0].replace("_"," ")+'</span><span style="font-weight:700">'+s[2]+'</span></div>';
    }).join("");
    var tgt=p.target_mean?('<div class="rate-row" style="border-top:1px solid var(--line);margin-top:4px;padding-top:4px"><span class="k">Mean target</span><span style="font-weight:700;color:var(--gold)">'+fmtN(p.target_mean)+'</span></div>'):'';
    el.innerHTML=bar+rows+tgt;
  }

  function renderRpEarnings(d){
    var e=d.earnings||{}, el=document.getElementById("rpEarnings");
    var p=d.profile||{};
    if(!e.next_date){ el.innerHTML='<div style="font-family:var(--mono);font-size:9px;color:var(--inkFade);padding:6px">No upcoming earnings date available.</div>'; 
    } else {
      var dt=new Date(e.next_date+"T00:00:00");
      var days=Math.round((dt-new Date())/86400000);
      el.innerHTML='<div class="earn-lbl">Next report</div><div class="earn-big">'+dt.toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"})+'</div>'+
        (days>=0?'<div style="font-family:var(--mono);font-size:9px;color:var(--gold);margin-bottom:8px">in '+days+' days</div>':'');
    }
    // key facts appended
    var facts='';
    if(p.employees) facts+='<div class="earn-row"><span class="k">Employees</span><span>'+p.employees.toLocaleString()+'</span></div>';
    if(p.forward_pe) facts+='<div class="earn-row"><span class="k">Fwd P/E</span><span>'+p.forward_pe.toFixed(1)+'</span></div>';
    if(p.div_yield) facts+='<div class="earn-row"><span class="k">Div yield</span><span>'+(p.div_yield*100).toFixed(2)+'%</span></div>';
    if(p.country) facts+='<div class="earn-row"><span class="k">Country</span><span>'+p.country+'</span></div>';
    el.innerHTML+=facts;
  }

  function generateProductThesis(tk, btn){
    var d=researchData[tk]||{}, p=d.profile||{}, q=d.quote||{}, r52=d.range52||{};
    var box=document.getElementById("rpThesisGen");
    btn.disabled=true; btn.textContent="Thinking\u2026";
    box.innerHTML='<div class="gen">Writing full thesis\u2026</div>';
    var regime=(C.macro&&C.macro.regime)||"NO_CLEAR";
    var fin=(d.financials||[]).slice(-2).map(function(f){return f.q+": rev $"+f.revenue_B+"B, margin "+f.net_margin+"%";}).join("; ");
    var prompt=
      "You are a senior hedge fund PM / CIO writing a full research thesis for "+tk+" ("+(p.name||"")+"). "+
      "Use ONLY the data provided; do not invent numbers. Macro regime: "+regime+". "+
      "Sector: "+(p.sector||"?")+", industry: "+(p.industry||"?")+". "+
      "Price "+q.last+", market cap "+(q.mcap_B!=null?q.mcap_B+"B":"?")+", P/E "+(d.pe||"?")+", "+
      "52-week range "+r52.low+"\u2013"+r52.high+". "+
      (fin?("Recent quarters: "+fin+". "):"")+
      (p.target_mean?("Analyst mean target "+p.target_mean+". "):"")+
      (p.summary?("Business: "+truncate(p.summary,300)+" "):"")+
      "Write these sections with headers on their own lines: WHAT THEY DO, MOAT, ENTRY, EXIT, STRATEGY, RISKS. "+
      "WHAT THEY DO: one tight sentence. MOAT: the durable competitive advantage, or state if weak. "+
      "ENTRY: a price or condition to enter, using the levels given (near 52-week low/high, support). "+
      "EXIT: stop and target logic with prices where possible. STRATEGY: how to play it given the regime and scores. "+
      "RISKS: the top 2 risks. Keep under 220 words, plain text, no markdown symbols.";
    fetch("https://api.anthropic.com/v1/messages",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1400,messages:[{role:"user",content:prompt}]})
    }).then(function(r){return r.json();}).then(function(data){
      var text=(data.content||[]).filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("\n");
      box.innerHTML=text.replace(/\n?(WHAT THEY DO|MOAT|ENTRY|EXIT|STRATEGY|RISKS)\s*:?/g,'<h5>$1</h5>');
      btn.style.display="none";
    }).catch(function(err){
      box.innerHTML='<div class="gen" style="color:var(--red)">Thesis generation failed ('+err.message+'). Needs the live API on the deployed site.</div>';
      btn.disabled=false; btn.textContent="Retry \u2192";
    });
  }

  function fmtN(v){ return v==null?"\u2014":Number(v).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}); }
  function truncate(s,n){ return (s&&s.length>n)?s.slice(0,n)+"\u2026":(s||""); }

  // ---------- mobile rail ----------
  // ---------- floating nav panel ----------
  var navPanel=document.getElementById("navPanel"), navBtn=document.getElementById("navBtn"), navScrim=document.getElementById("navScrim");
  function openNav(){ navPanel.classList.add("open"); navScrim.classList.add("show"); }
  function closeNav(){ navPanel.classList.remove("open"); navScrim.classList.remove("show"); }
  function toggleNav(){ navPanel.classList.contains("open")?closeNav():openNav(); }
  navBtn.addEventListener("click",toggleNav);
  navScrim.addEventListener("click",closeNav);

  // ---------- boot ----------
  var start=(location.hash||"").replace("#","");
  if(!NAV.some(function(n){return n.id===start&&n.live;})) start="markets";
  go(start);
})();
</script>
