<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0">
<meta name="theme-color" content="#14120C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Phoenix">
<title>Phoenix</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
<style>
  :root{
    --bg:#F4EFE6; --card:#FAF7F2; --card2:#F0EBE0; --line:#DDD5C0; --line2:#C8BFA8;
    --ink:#1C1912; --inkMed:#3D3828; --inkLight:#6B6347; --inkFade:#9A9178; --inkGhost:#C0B89A;
    --gold:#A67C00; --green:#1A5C38; --greenSoft:#2D8A55; --greenBg:#EBF5EF;
    --red:#7A1E1E; --redSoft:#B03030; --redBg:#F5EBEB; --amber:#7A4E00; --amberBg:#F5F0E0;
    --rail:#14120C; --railHi:#211E14; --railLine:#2E2A1C; --railInk:#B8AE90; --railInkDim:#6E664F;
    --railActive:#D9A521;
    --serif:Georgia,'Times New Roman',serif;
    --mono:'Courier New',ui-monospace,monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{background:var(--bg);color:var(--ink);font-family:var(--serif);-webkit-font-smoothing:antialiased;overflow:hidden;}

  /* ---------- floating collapsible nav (Apple-OS bubble) ---------- */
  .app{display:block;height:100vh;height:100dvh;position:relative;}
  .navbtn{position:fixed;top:calc(env(safe-area-inset-top) + 11px);left:16px;z-index:300;
          width:44px;height:44px;border-radius:14px;background:var(--rail);border:1px solid var(--railLine);
          display:flex;align-items:center;justify-content:center;cursor:pointer;
          box-shadow:0 4px 16px rgba(20,18,12,.28);transition:transform .18s ease,background .18s;}
  .navbtn:hover{background:var(--railHi);}
  .navbtn:active{transform:scale(.94);}
  .navbtn svg{width:22px;height:22px;}
  .navpanel{position:fixed;top:calc(env(safe-area-inset-top) + 64px);left:16px;z-index:299;
            width:210px;background:rgba(255,253,250,.98);border:1px solid var(--line2);border-radius:20px;
            padding:10px;box-shadow:0 12px 40px rgba(20,18,12,.18);
            -webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);
            transform:translateY(-8px) scale(.97);opacity:0;pointer-events:none;
            transform-origin:top left;transition:transform .2s cubic-bezier(.2,.8,.3,1),opacity .18s;}
  .navpanel.open{transform:translateY(0) scale(1);opacity:1;pointer-events:auto;}
  .navpanel .ph-head{padding:8px 12px 12px;border-bottom:1px solid var(--line);margin-bottom:8px;}
  .navpanel .ph-head .mark{font-family:var(--serif);font-size:19px;font-weight:700;color:var(--ink);letter-spacing:.3px;}
  .navpanel .ph-head .mark .dot{color:var(--gold);}
  .navpanel .ph-head .sub{font-family:var(--mono);font-size:8px;letter-spacing:2px;color:var(--inkFade);text-transform:uppercase;margin-top:2px;}
  .nav-item{display:flex;align-items:center;gap:11px;padding:9px 12px;cursor:pointer;border-radius:11px;
            font-family:var(--mono);font-size:12px;letter-spacing:.4px;color:var(--inkMed);
            user-select:none;transition:background .12s,color .12s;}
  .nav-item .ico{width:15px;text-align:center;font-size:13px;opacity:.7;}
  .nav-item:hover{background:var(--card2);color:var(--ink);}
  /* active page: strong gold fill, clearly distinct from cream/white */
  .nav-item.active{background:var(--gold);color:#FFFDF8;box-shadow:0 2px 8px rgba(166,124,0,.28);}
  .nav-item.active .ico{opacity:1;}
  .nav-item.soon{color:var(--inkGhost);cursor:default;}
  .nav-item.soon:hover{background:transparent;color:var(--inkGhost);}
  .nav-item.soon .tag{margin-left:auto;font-size:7px;letter-spacing:1px;color:var(--inkFade);border:1px solid var(--line2);border-radius:4px;padding:1px 5px;}
  .navscrim{position:fixed;inset:0;z-index:298;background:transparent;display:none;}
  .navscrim.show{display:block;}

  .main{display:flex;flex-direction:column;overflow:hidden;height:100vh;height:100dvh;min-width:0;}
  .topbar{display:flex;align-items:center;gap:14px;background:var(--card);border-bottom:1px solid var(--line2);
          padding:0 20px 0 74px;padding-top:env(safe-area-inset-top);min-height:66px;flex-shrink:0;}
  .tb-brand{display:flex;flex-direction:column;justify-content:center;}
  .tb-brand .mk{font-family:var(--serif);font-size:19px;font-weight:700;color:var(--ink);letter-spacing:.3px;line-height:1;}
  .tb-brand .mk .dot{color:var(--gold);}
  .tb-sec{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--inkFade);text-transform:uppercase;margin-top:3px;}
  .topbar .spacer{flex:1;}
  .topbar .asof{font-family:var(--mono);font-size:9px;color:var(--inkFade);letter-spacing:.5px;}
  .topbar .acct{font-family:var(--mono);font-size:10.5px;color:var(--ink);background:var(--card2);border:1px solid var(--line2);border-radius:4px;padding:4px 8px;}

  .page-host{flex:1;overflow:hidden;min-height:0;}
  .page{display:none;height:100%;}
  .page.active{display:block;}
  .page.pad{padding:18px 20px;overflow-y:auto;}

  .mkt-grid{display:grid;height:100%;gap:10px;padding:12px;grid-template-columns:1.6fr 1fr 1fr;
    grid-template-areas:"assets assets assets" "spx regime gex" "spx vix vix" "sector sector top";
    grid-template-rows:auto minmax(0,1.3fr) minmax(0,0.95fr) minmax(0,1.1fr);overflow:hidden;}
  .a-assets{grid-area:assets;}
  /* asset band: auto-scrolling marquee */
  .asset-band{overflow:hidden;position:relative;width:100%;-webkit-mask-image:linear-gradient(90deg,transparent,#000 3%,#000 97%,transparent);mask-image:linear-gradient(90deg,transparent,#000 3%,#000 97%,transparent);}
  .marquee-track{display:flex;gap:8px;width:max-content;animation:marquee 48s linear infinite;}
  .asset-band:hover .marquee-track{animation-play-state:paused;}
  @keyframes marquee{from{transform:translateX(0);}to{transform:translateX(-50%);}}
  .asset-cell{flex:0 0 auto;min-width:132px;background:var(--card);border:1px solid var(--line);border-radius:6px;padding:8px 13px;
              display:flex;flex-direction:column;gap:2px;position:relative;overflow:hidden;}
  .asset-cell .an{font-family:var(--mono);font-size:8.5px;letter-spacing:1px;color:var(--inkFade);text-transform:uppercase;}
  .asset-cell .av{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--ink);line-height:1.1;}
  .asset-cell .ac{font-family:var(--mono);font-size:10px;font-weight:700;}
  .asset-cell .accent{position:absolute;left:0;top:0;bottom:0;width:3px;}
  .tile{background:var(--card);border:1px solid var(--line);border-radius:7px;padding:11px 13px;display:flex;flex-direction:column;min-height:0;overflow:hidden;}
  .tile > .thead{display:flex;align-items:baseline;gap:8px;margin-bottom:8px;flex-shrink:0;}
  .tile .ttl{font-family:var(--mono);font-size:9.5px;letter-spacing:1.5px;color:var(--gold);text-transform:uppercase;}
  .tile .tnote{margin-left:auto;font-family:var(--mono);font-size:8.5px;color:var(--inkFade);letter-spacing:.5px;}
  .tile .tbody{flex:1;min-height:0;position:relative;}
  .a-spx{grid-area:spx;} .a-regime{grid-area:regime;} .a-gex{grid-area:gex;}
  .a-vix{grid-area:vix;} .a-sector{grid-area:sector;} .a-top{grid-area:top;} .a-cal{grid-area:cal;}
  .plot{position:absolute;inset:0;}
  /* SPX hero header: big price + change, with scrub readout */
  .spx-hero{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:4px;flex-shrink:0;}
  .spx-px{font-family:var(--mono);font-size:26px;font-weight:700;color:var(--ink);line-height:1;}
  .spx-chg{font-family:var(--mono);font-size:13px;font-weight:700;}
  .spx-hover{font-family:var(--mono);font-size:9.5px;color:var(--inkMed);flex-basis:100%;min-height:12px;letter-spacing:.2px;}
  .spx-hover .hk{color:var(--gold);font-weight:700;margin-right:4px;}
  /* zoom controls, bottom-right of the chart */
  .spx-zoom{position:absolute;right:8px;bottom:8px;display:flex;gap:4px;z-index:5;}
  .spx-zoom button{width:26px;height:26px;border-radius:6px;border:1px solid var(--line2);
                   background:rgba(250,247,242,.92);color:var(--ink);font-family:var(--mono);
                   font-size:14px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;
                   box-shadow:0 1px 4px rgba(20,18,12,.12);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);}
  .spx-zoom button:active{transform:scale(.92);background:var(--card2);}

  .rg-name{font-family:var(--serif);font-size:23px;font-weight:700;line-height:1.05;margin-bottom:5px;}
  .rg-desc{font-family:var(--serif);font-size:11.5px;color:var(--inkMed);line-height:1.45;}
  .rg-conf{font-family:var(--mono);font-size:9px;color:var(--inkLight);margin-top:7px;}
  .rg-inputs{margin-top:auto;display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;padding-top:8px;}
  .rg-inp{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9.5px;}
  .rg-inp .k{color:var(--inkFade);} .rg-inp .v{font-weight:700;}

  .gex-hero{display:flex;align-items:baseline;gap:8px;margin-bottom:2px;}
  .gex-net{font-family:var(--mono);font-size:22px;font-weight:700;}
  .gex-reg{font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:3px;}
  .gex-rows{margin-top:8px;display:flex;flex-direction:column;gap:5px;}
  .gex-row{display:flex;justify-content:space-between;align-items:baseline;font-family:var(--mono);font-size:10.5px;padding-bottom:4px;border-bottom:1px solid var(--line);}
  .gex-row .k{color:var(--inkLight);} .gex-row .v{font-weight:700;color:var(--ink);}
  .gex-row .sub{color:var(--inkFade);font-size:9px;margin-left:5px;}

  .seg{display:inline-flex;border:1px solid var(--line2);border-radius:5px;overflow:hidden;margin-left:auto;}
  .seg button{font-family:var(--mono);font-size:9px;letter-spacing:.5px;padding:3px 9px;border:none;background:var(--card);color:var(--inkLight);cursor:pointer;}
  .seg button.on{background:var(--gold);color:#fff;}
  .sec-list{overflow-y:auto;height:100%;}
  .sec-row{display:grid;grid-template-columns:34px 92px 1fr 48px;align-items:center;gap:8px;padding:2.5px 0;font-family:var(--mono);font-size:10px;}
  .sec-row .tk{font-weight:700;color:var(--ink);}
  .sec-row .nm{color:var(--inkLight);font-size:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sec-bar-wrap{position:relative;height:12px;background:var(--card2);border-radius:2px;overflow:hidden;}
  .sec-bar{position:absolute;top:0;bottom:0;}
  .sec-val{text-align:right;font-weight:700;}

  .top-list{overflow-y:auto;height:100%;}
  .top-row{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--line);font-family:var(--mono);font-size:10.5px;}
  .top-row .tk{font-weight:700;color:var(--ink);}
  .top-row .ind{color:var(--inkFade);font-size:8.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px;}
  .top-row .sc{font-weight:700;text-align:right;}
  .chip{font-family:var(--mono);font-size:8px;padding:1px 5px;border-radius:3px;letter-spacing:.5px;}

  .cal-strip{display:flex;gap:8px;overflow-x:auto;height:100%;align-items:stretch;padding-bottom:2px;}
  .cal-card{flex:0 0 auto;min-width:118px;background:var(--card2);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:5px;padding:7px 10px;display:flex;flex-direction:column;gap:2px;}
  .cal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;height:100%;overflow-y:auto;align-content:start;}
  .cal-grid .cal-card{min-width:0;}
  .cal-card.hi{border-left-color:var(--red);}
  .cal-card.med{border-left-color:var(--amber);}
  .cal-date{font-family:var(--mono);font-size:9px;color:var(--inkLight);letter-spacing:.5px;}
  .cal-evt{font-family:var(--serif);font-size:12px;font-weight:700;color:var(--ink);line-height:1.2;}
  .cal-in{font-family:var(--mono);font-size:8.5px;color:var(--inkFade);margin-top:auto;}

  .loading{font-family:var(--serif);font-size:12px;color:var(--inkLight);padding:14px 2px;text-align:center;}
  .err{font-family:var(--serif);font-size:11.5px;color:var(--red);line-height:1.5;padding:10px 2px;}
  .err .fix{color:var(--inkMed);font-size:10px;margin-top:4px;}

  .page-head{margin-bottom:18px;}
  .eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:6px;}
  .page-title{font-family:var(--serif);font-size:28px;font-weight:700;color:var(--ink);margin:0 0 5px;}
  .soon-panel{font-family:var(--serif);font-size:14px;color:var(--inkLight);line-height:1.65;background:var(--amberBg);border:1px solid var(--line2);border-left:3px solid var(--amber);border-radius:6px;padding:20px 22px;max-width:64ch;}
  .soon-panel h3{font-family:var(--mono);font-size:11px;letter-spacing:1.5px;color:var(--amber);text-transform:uppercase;margin:0 0 10px;}
  .soon-panel .need{font-family:var(--mono);font-size:11px;color:var(--inkLight);margin-top:12px;padding-top:12px;border-top:1px solid var(--line);}

  /* ===== SCREENER page ===== */
  .scr-grid{display:grid;height:100%;gap:10px;padding:12px;grid-template-columns:1.85fr 1fr;
    grid-template-areas:"screener industry" "screener picks";
    grid-template-rows:minmax(0,0.85fr) minmax(0,1.15fr);overflow:hidden;}
  .a-industry{grid-area:industry;} .a-screener{grid-area:screener;} .a-picks{grid-area:picks;}
  .ind-list{overflow-y:auto;height:100%;}
  .ind-row{display:grid;grid-template-columns:1fr 92px 52px;align-items:center;gap:8px;padding:3px 0;font-family:var(--mono);font-size:10.5px;}
  .ind-row .nm{color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .ind-bar-wrap{position:relative;height:13px;background:var(--card2);border-radius:2px;overflow:hidden;}
  .ind-bar{position:absolute;top:0;bottom:0;}
  .ind-val{text-align:right;font-weight:700;}
  .scr-controls{display:flex;align-items:center;gap:7px;margin-bottom:8px;flex-shrink:0;flex-wrap:wrap;}
  .scr-search{flex:1;min-width:130px;font-family:var(--mono);font-size:11px;padding:6px 10px;border:1px solid var(--line2);border-radius:6px;background:var(--card2);color:var(--ink);}
  .scr-search::placeholder{color:var(--inkFade);}
  .scr-sel{font-family:var(--mono);font-size:9.5px;padding:5px 7px;border:1px solid var(--line2);border-radius:6px;background:var(--card2);color:var(--inkMed);cursor:pointer;max-width:130px;}
  .scr-filter{font-family:var(--mono);font-size:9.5px;padding:5px 8px;border:1px solid var(--line2);border-radius:6px;background:var(--card);color:var(--inkMed);cursor:pointer;}
  .scr-filter.on{background:var(--gold);color:#FFFDF8;}
  .scr-table{overflow-y:auto;height:100%;}
  .scr-th,.scr-tr{display:grid;grid-template-columns:28px 1.6fr 52px 40px 38px 38px 56px 58px;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;}
  .scr-th{position:sticky;top:0;background:var(--card);color:var(--inkFade);font-size:8.5px;letter-spacing:.5px;text-transform:uppercase;padding:4px 0;border-bottom:1px solid var(--line2);z-index:2;}
  .scr-th span{cursor:pointer;}
  .scr-th span:hover{color:var(--gold);}
  .scr-tr{padding:4px 0;border-bottom:1px solid var(--line);}
  .scr-tr .rk{color:var(--inkFade);font-size:9px;text-align:center;}
  .scr-tr .nmcell{overflow:hidden;}
  .scr-tr .tk{font-weight:700;color:var(--ink);}
  .scr-tr .nm{color:var(--inkFade);font-size:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;}
  .scr-tr .ind{color:var(--inkFade);font-size:8.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .scr-tr .num{text-align:right;}
  .scr-tr.nearmiss{opacity:.62;}
  .scr-tr.nearmiss .tk::after{content:" \25CB";color:var(--amber);font-size:8px;}
  .scr-acts{display:flex;gap:3px;}
  .scr-acts button{font-family:var(--mono);font-size:7.5px;padding:2px 4px;border:1px solid var(--line2);border-radius:4px;background:var(--card2);color:var(--inkMed);cursor:pointer;letter-spacing:.3px;}
  .scr-acts button:active{transform:scale(.94);}
  .scr-acts button.added{background:var(--greenBg);color:var(--green);border-color:var(--greenSoft);}
  .lblchip{font-family:var(--mono);font-size:7.5px;padding:1px 4px;border-radius:3px;letter-spacing:.3px;}
  .picks-scroll{overflow-y:auto;height:100%;display:flex;flex-direction:column;gap:8px;}
  .pick{background:var(--card2);border:1px solid var(--line);border-radius:7px;padding:10px 12px;}
  .pick-head{display:flex;align-items:baseline;gap:8px;cursor:pointer;}
  .pick-head .tk{font-family:var(--serif);font-size:16px;font-weight:700;color:var(--ink);}
  .pick-head .ind{font-family:var(--mono);font-size:8.5px;color:var(--inkFade);}
  .pick-head .px{margin-left:auto;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--ink);}
  .pick-head .exp{font-family:var(--mono);font-size:11px;color:var(--gold);}
  .pick-levels{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px;}
  .pl{background:var(--card);border:1px solid var(--line);border-radius:4px;padding:5px 7px;text-align:center;}
  .pl .k{font-family:var(--mono);font-size:7.5px;color:var(--inkFade);text-transform:uppercase;letter-spacing:.4px;}
  .pl .v{font-family:var(--mono);font-size:11px;font-weight:700;margin-top:2px;}
  .thesis{margin-top:8px;font-family:var(--serif);font-size:11.5px;color:var(--inkMed);line-height:1.5;}
  .thesis h5{font-family:var(--mono);font-size:8.5px;letter-spacing:1px;color:var(--gold);text-transform:uppercase;margin:8px 0 3px;}
  .thesis .gen{font-family:var(--mono);font-size:10px;color:var(--inkLight);padding:8px 0;}
  .thesis-btn{margin-top:8px;font-family:var(--mono);font-size:10px;padding:6px 12px;border:1px solid var(--gold);border-radius:6px;background:var(--card);color:var(--gold);cursor:pointer;width:100%;}
  .thesis-btn:active{transform:scale(.98);}
  .thesis-btn:disabled{opacity:.5;cursor:default;}
  .watch-grid{display:grid;height:100%;gap:10px;padding:12px;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));grid-auto-rows:min-content;overflow-y:auto;align-content:start;}
  .watch-card{background:var(--card);border:1px solid var(--line);border-radius:7px;padding:12px 14px;}
  .watch-card.clickable{cursor:pointer;transition:border-color .12s,transform .08s;}
  .watch-card.clickable:hover{border-color:var(--gold);}
  .watch-card.clickable:active{transform:scale(.99);}

  /* ===== RESEARCH PRODUCT PAGE ===== */
  .rp-wrap{height:100%;display:flex;flex-direction:column;overflow:hidden;}
  .rp-top{display:flex;align-items:flex-start;gap:16px;padding:12px 16px;border-bottom:1px solid var(--line2);flex-shrink:0;flex-wrap:wrap;}
  .rp-back{font-family:var(--mono);font-size:10px;color:var(--gold);cursor:pointer;padding:4px 8px;border:1px solid var(--line2);border-radius:6px;background:var(--card2);align-self:center;}
  .rp-id{display:flex;flex-direction:column;gap:2px;min-width:0;}
  .rp-id .r1{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;}
  .rp-id .tk{font-family:var(--serif);font-size:26px;font-weight:700;color:var(--ink);line-height:1;}
  .rp-id .px{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--ink);}
  .rp-id .chg{font-family:var(--mono);font-size:12px;font-weight:700;}
  .rp-id .r2{font-family:var(--mono);font-size:9px;color:var(--inkFade);display:flex;gap:8px;flex-wrap:wrap;margin-top:2px;}
  .rp-id .exch{padding:1px 6px;border:1px solid var(--line2);border-radius:3px;color:var(--inkMed);}
  .rp-stats{margin-left:auto;display:flex;gap:16px;align-items:center;}
  .rp-stat{text-align:right;}
  .rp-stat .k{font-family:var(--mono);font-size:8px;color:var(--inkFade);text-transform:uppercase;letter-spacing:.5px;}
  .rp-stat .v{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--ink);}

  .rp-body{flex:1;display:grid;grid-template-columns:300px 1fr;gap:10px;padding:10px 12px;overflow:hidden;min-height:0;}

  .pf-seg.on .sn{background:rgba(255,255,255,.25);}

  /* summary strip — mirrors the asset band's row-of-cells feel */
  .pf-strip{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr 1fr;gap:8px;}
  .pf-cell{background:var(--card);border:1px solid var(--line);border-radius:6px;padding:8px 12px;
           display:flex;flex-direction:column;gap:2px;position:relative;overflow:hidden;}
  .pf-cell .accent{position:absolute;left:0;top:0;bottom:0;width:3px;}
  .pf-cell .cn{font-family:var(--mono);font-size:8.5px;letter-spacing:1px;color:var(--inkFade);text-transform:uppercase;}
  .pf-cell .cv{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--ink);line-height:1.1;}
  .pf-cell .cs{font-family:var(--mono);font-size:9px;font-weight:700;}
  .pf-cell.wide .cv{font-size:20px;}
  /* gauges inside tiles */
  .pf-gauge-v{display:flex;flex-direction:column;height:100%;justify-content:center;gap:7px;}
  .gnum{font-family:var(--mono);font-size:26px;font-weight:700;line-height:1;}
  .gnum .go{font-size:12px;color:var(--inkFade);font-weight:400;}
  .gbar{height:6px;background:var(--card2);border:1px solid var(--line);border-radius:3px;overflow:hidden;}
  .gfill{height:100%;border-radius:3px;transition:width .3s;}
  .gs{font-family:var(--mono);font-size:8.5px;color:var(--inkLight);line-height:1.5;}
  /* concentration rows */
  .pf-conc-row{display:flex;align-items:center;gap:7px;margin-bottom:3px;}
  .pf-conc-row .ct{font-family:var(--mono);font-size:9.5px;font-weight:700;color:var(--ink);width:46px;}
  .cbar{flex:1;height:4px;background:var(--card2);border:1px solid var(--line);border-radius:2px;overflow:hidden;}
  .cfill{height:100%;border-radius:2px;}
  .pf-conc-row .cv{font-family:var(--mono);font-size:8.5px;font-weight:700;width:40px;text-align:right;}
  /* metrics inside a tile */
  .pf-mgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;align-content:start;}
  .pf-m{background:var(--card2);border:1px solid var(--line);border-radius:5px;padding:6px 8px;}
  .pf-m .mk{font-family:var(--mono);font-size:6.5px;color:var(--inkFade);text-transform:uppercase;letter-spacing:.4px;}
  .pf-m .mv{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--ink);margin-top:1px;}
  .pf-m .ms{font-family:var(--mono);font-size:7px;color:var(--inkFade);margin-top:1px;}
  /* council inside a tile */
  .pf-council-scroll{display:grid;grid-template-columns:1fr 1fr;gap:9px;overflow-y:auto;height:100%;align-content:start;}
  .pf-cm{background:var(--card2);border:1px solid var(--line);border-radius:5px;padding:10px 12px;}
  .pf-cm.wide{grid-column:1/-1;}
  .cm-h{display:flex;align-items:baseline;gap:7px;margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid var(--line);}
  .cm-seal{font-family:var(--serif);font-size:10px;font-weight:700;color:var(--gold);width:16px;}
  .cm-name{font-family:var(--serif);font-size:12.5px;font-weight:700;color:var(--ink);}
  .cm-role{font-family:var(--mono);font-size:6.5px;color:var(--inkFade);text-transform:uppercase;letter-spacing:.5px;margin-left:auto;}
  .cm-b{font-family:var(--serif);font-size:11px;line-height:1.6;color:var(--inkMed);}
  .cm-b b{color:var(--ink);}
  .ch-b{font-family:var(--serif);font-size:11.5px;line-height:1.65;color:var(--inkMed);overflow-y:auto;height:100%;}
  .ch-b p{margin:0 0 8px;} .ch-b p:last-child{margin:0;} .ch-b b{color:var(--ink);}
  .pf-prose{font-family:var(--serif);font-size:11.5px;line-height:1.6;color:var(--inkMed);margin:0;}
  .pf-prose b{color:var(--ink);}
  /* rules line, like .tnote */
  .pf-rules-line{font-family:var(--mono);font-size:8px;color:var(--inkFade);letter-spacing:.4px;}
  .pf-toggle{font-family:var(--mono);font-size:8px;padding:2px 7px;border:1px solid var(--line2);
             border-radius:4px;background:var(--card2);color:var(--inkMed);cursor:pointer;letter-spacing:.5px;}
  .pf-toggle.on{background:var(--amberBg);color:var(--amber);border-color:var(--amber);}
  .pf-bal{font-family:var(--mono);font-size:9px;width:78px;padding:2px 5px;border:1px solid var(--line2);
          border-radius:4px;background:var(--card2);color:var(--ink);-webkit-appearance:none;}
  .pf-empty-t{font-family:var(--serif);font-size:12px;color:var(--inkLight);display:flex;align-items:center;
              justify-content:center;height:100%;text-align:center;line-height:1.6;padding:10px;}
  .pf-warn{font-family:var(--mono);font-size:8.5px;color:var(--red);background:var(--redBg);border-radius:4px;padding:4px 6px;margin-top:5px;}

  .rail-toggle{display:none;}
  .scrim{display:none;}
  @media (max-width:900px){
    .scr-grid{grid-template-columns:1fr;grid-template-areas:"screener" "industry" "picks";grid-template-rows:none;grid-auto-rows:minmax(280px,auto);overflow-y:auto;}
    .watch-grid{grid-template-columns:1fr;}
    .app{grid-template-columns:1fr;}
    .rail{position:fixed;left:0;top:0;bottom:0;width:200px;z-index:200;transform:translateX(-100%);transition:transform .2s ease;}
    .rail.open{transform:translateX(0);box-shadow:4px 0 24px rgba(0,0,0,.3);}
    .rail-toggle{display:flex;align-items:center;justify-content:center;width:34px;height:34px;background:var(--card2);border:1px solid var(--line2);border-radius:6px;font-size:16px;color:var(--ink);cursor:pointer;}
    .scrim.show{display:block;position:fixed;inset:0;background:rgba(20,18,12,.4);z-index:150;}
    .mkt-grid{grid-template-columns:1fr;grid-template-areas:"assets" "spx" "regime" "gex" "vix" "sector" "top";grid-template-rows:none;grid-auto-rows:minmax(190px,auto);overflow-y:auto;height:100%;}
    .pf-grid{grid-template-columns:1fr;grid-template-areas:"summary" "heat" "streak" "equity" "metrics" "council" "chair";grid-template-rows:none;grid-auto-rows:minmax(190px,auto);overflow-y:auto;height:100%;}
    .p-summary{min-height:0 !important;height:auto !important;}
    .pf-strip{grid-template-columns:1fr 1fr;}
    .pf-mgrid{grid-template-columns:repeat(2,1fr);}
    .pf-council-scroll{grid-template-columns:1fr;}
    .asset-band{min-height:0;}
    .a-assets{grid-row:auto;min-height:0 !important;height:auto !important;}
    .mkt-grid .asset-band{min-height:0;}
    .topbar .asof{display:none;}
    .page-title{font-size:24px;}
  }
</style>
</head>
<body>
<div class="app">
  <!-- floating nav button (Phoenix logo) -->
  <div class="navbtn" id="navBtn" aria-label="Menu">
    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M16 3 C11 8, 9 13, 11 18 C12 15, 14 13, 16 12 C15 16, 16 20, 20 22 C19 19, 20 16, 22 14 C24 19, 23 24, 18 28 C25 26, 29 20, 27 13 C26 16, 24 17, 22 17 C24 12, 22 6, 16 3 Z" fill="#D9A521"/>
    </svg>
  </div>
  <div class="navscrim" id="navScrim"></div>
  <nav class="navpanel" id="navPanel">
    <div class="ph-head"><div class="mark">Phoenix<span class="dot">.</span></div><div class="sub">Investment OS</div></div>
    <div class="rail-nav" id="railNav"></div>
  </nav>

  <div class="main">
    <div class="topbar">
      <div class="tb-brand">
        <div class="mk">Phoenix<span class="dot">.</span></div>
        <div class="tb-sec" id="tbSection">Markets</div>
      </div>
      <div class="spacer"></div>
      <div class="asof" id="stripAsof"></div>
      <div class="acct">gabriel</div>
    </div>
    <div class="page-host" id="pageHost"></div>
  </div>
</div>
<script>
(function(){
  "use strict";
  var BASE = "https://gabrielschmal-hub.github.io/Project-Phoenix-/outputs/";
  function url(name){ return (BASE||"") + name + ".json?t=" + Date.now(); }
  function getJSON(name){ return fetch(url(name)).then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); }); }

  var NAV = [
    {id:"home",     ico:"\u25C7", label:"Home",      live:true},
    {id:"markets",  ico:"\u25C8", label:"Markets",   live:true},
    {id:"screeners",ico:"\u25A6", label:"Screeners", live:true},
    {id:"trades",   ico:"\u21C4", label:"Trades",    live:true},
    {id:"portfolio",ico:"\u25A4", label:"Portfolio", live:true},
    {id:"news",     ico:"\u25B0", label:"News",      live:false, need:"News + institutional-flow APIs"},
    {id:"cio",      ico:"\u2726", label:"CIO",       live:false, need:"Briefing engine over all modules"},
    {id:"settings", ico:"\u2699", label:"Settings",  live:false, need:"Preferences + data-source config"}
  ];

  var REGIME_INFO = {
    GOLDILOCKS:{c:"var(--green)",bg:"var(--greenBg)",d:"Low vol, steady equity gains, contained inflation. Risk-on backdrop."},
    ENERGY_GRIND:{c:"var(--amber)",bg:"var(--amberBg)",d:"Sustained oil strength feeding into inflation. Favors energy / real assets."},
    ENERGY_SPIKE:{c:"var(--red)",bg:"var(--redBg)",d:"Sharp oil + vol surge with hot inflation. Defensive, commodity-tilted."},
    POLICY_TIGHTENING:{c:"var(--amber)",bg:"var(--amberBg)",d:"Rising real rates / front-end yields with markets still near highs."},
    CRISIS_PEAK:{c:"var(--red)",bg:"var(--redBg)",d:"Deep drawdown with extreme volatility. Capital preservation first."},
    RECOVERY_EARLY:{c:"var(--greenSoft)",bg:"var(--greenBg)",d:"Bouncing off lows as volatility rolls over. Early risk re-entry."},
    RECOVERY_LATE:{c:"var(--green)",bg:"var(--greenBg)",d:"Uptrend resuming below prior highs, calm vol, tight credit."},
    NO_CLEAR:{c:"var(--inkLight)",bg:"var(--card2)",d:"No regime's conditions are currently met. Macro gives no clear edge \u2014 rotation (Layer 2) and selection (Layer 3) carry the weight."}
  };

  // shared caches
  var C = {macro:null,series:null,spx:null,sector:null,stocks:null,gex:null,events:null};
  var built = {}, drawn = {};

  // ---------- nav ----------
  var railNav = document.getElementById("railNav");
  NAV.forEach(function(n){
    var el=document.createElement("div");
    el.className="nav-item"+(n.live?"":" soon"); el.dataset.page=n.id;
    el.innerHTML='<span class="ico">'+n.ico+'</span>'+n.label+(n.live?'':'<span class="tag">SOON</span>');
    el.addEventListener("click",function(){ if(n.live) go(n.id); });
    railNav.appendChild(el);
  });

  var host=document.getElementById("pageHost");
  function go(id){
    if(!built[id]){ buildPage(id); built[id]=true; }
    Array.prototype.forEach.call(document.querySelectorAll(".page"),function(p){p.classList.toggle("active",p.id==="page-"+id);});
    Array.prototype.forEach.call(document.querySelectorAll(".nav-item"),function(it){it.classList.toggle("active",it.dataset.page===id);});
    var n=NAV.filter(function(x){return x.id===id;})[0];
    document.getElementById("tbSection").textContent=(n?n.label:id);
    if(id==="markets") initMarkets();
    if(id==="home") initHome();
    if(id==="screeners") initScreener();
    if(id==="trades") initTrades();
    if(id==="portfolio") initPortfolio();
    closeNav();
    try{location.hash=id;}catch(e){}
  }

  function buildPage(id){
    var p=document.createElement("div"); p.id="page-"+id;
    if(id==="markets"){ p.className="page"; p.innerHTML=MARKETS_HTML; }
    else if(id==="home"){ p.className="page pad"; p.innerHTML='<div class="page-head"><div class="eyebrow">Phoenix \u00B7 Mission Control</div><h1 class="page-title">Home</h1></div><div class="loading">Coming next \u2014 a recap of every module.</div>'; }
    else if(id==="screeners"){ p.className="page"; p.innerHTML=SCREENER_HTML; }
    else if(id==="trades"){ p.className="page"; p.innerHTML=TRADES_HTML; }
    else if(id==="portfolio"){ p.className="page"; p.innerHTML=PORTFOLIO_HTML; }
    else { p.className="page pad"; p.innerHTML=soonHTML(id); }
    host.appendChild(p);
  }
  function soonHTML(id){
    var n=NAV.filter(function(x){return x.id===id;})[0]||{};
    return '<div class="page-head"><div class="eyebrow">Phoenix \u00B7 '+(n.label||id)+'</div><h1 class="page-title">'+(n.label||id)+'</h1></div>'+
      '<div class="soon-panel"><h3>Not wired yet</h3>This module is part of the Phoenix vision but isn\'t live yet because the data behind it isn\'t flowing. Building it now would mean showing placeholder numbers \u2014 which the system is designed to avoid.<div class="need">Needs: '+(n.need||"a live data source")+'</div></div>';
  }

  // ---------- topbar (asof only; regime now lives in its tile) ----------
  function paintStrip(d){
    var a=document.getElementById("stripAsof");
    if(a) a.textContent=d.asof?("data as of "+d.asof):"";
  }

  // ================= MARKETS =================
  var MARKETS_HTML =
    '<div class="mkt-grid">'+
      '<div class="a-assets"><div class="asset-band" id="assetBand"><div class="loading" style="grid-column:1/-1">\u2026</div></div></div>'+
      '<div class="tile a-spx"><div class="thead"><span class="ttl">S&P 500 \u00B7 Daily</span><span class="tnote" id="spxAsof"></span></div>'+
        '<div class="spx-hero"><div class="spx-px" id="spxPx">\u2014</div><div class="spx-chg" id="spxChg"></div><div class="spx-hover" id="spxHover"></div></div>'+
        '<div class="tbody"><div class="plot" id="spxPlot"></div>'+
        '<div class="spx-zoom"><button id="spxZoomIn">+</button><button id="spxZoomOut">\u2212</button><button id="spxZoomReset">\u21BA</button></div>'+
        '</div></div>'+
      '<div class="tile a-regime"><div class="thead"><span class="ttl">Regime</span><span class="tnote" id="rgNote"></span></div><div class="tbody" id="rgBody"><div class="loading">\u2026</div></div></div>'+
      '<div class="tile a-gex"><div class="thead"><span class="ttl">GEX \u00B7 SPX</span><span class="tnote" id="gexNote"></span></div><div class="tbody" id="gexBody"><div class="loading">\u2026</div></div></div>'+
      '<div class="tile a-vix"><div class="thead"><span class="ttl">VIX Term Structure</span><span class="tnote" id="vixNote"></span></div><div class="tbody"><div class="plot" id="vixPlot"></div></div></div>'+
      '<div class="tile a-sector"><div class="thead"><span class="ttl">Sector Performance</span><div class="seg" id="secSeg"><button data-k="m1" class="on">1M</button><button data-k="m3">3M</button><button data-k="y">1Y</button></div></div><div class="tbody"><div class="sec-list" id="secList"><div class="loading">\u2026</div></div></div></div>'+
      '<div class="tile a-top"><div class="thead"><span class="ttl">Top Performers</span><span class="tnote" id="topNote">daily %</span></div><div class="tbody"><div class="top-list" id="topList"><div class="loading">\u2026</div></div></div></div>'+
    '</div>';

  function initMarkets(){
    // regime (also powers strip) — always fetch fresh once
    if(!C.macro){
      getJSON("macro").then(function(d){ C.macro=d; paintStrip(d); renderRegime(d); })
        .catch(function(e){ document.getElementById("rgBody").innerHTML=errHTML("macro.json",e.message); });
    } else { renderRegime(C.macro); }

    drawSPX();
    drawVIX();
    loadAssets();
    loadSectors();
    loadTop();
    loadGEX();
  }

  function errHTML(file,msg){ return '<div class="err">Couldn\'t load '+file+' \u2014 '+msg+'.<div class="fix">Check it\'s live in outputs/ on GitHub Pages.</div></div>'; }

  // ----- regime tile -----
  function renderRegime(d){
    var info=REGIME_INFO[d.regime]||REGIME_INFO.NO_CLEAR, i=d.inputs||{};
    document.getElementById("rgNote").textContent=d.asof||"";
    function row(k,label,v,unit){
      var val = (v===null||v===undefined||(typeof v==="number"&&isNaN(v)))?"\u2014":
        (unit==="%"?( (v>0?"+":"")+(+v).toFixed(1)+"%"):
         unit==="bp"?((v>0?"+":"")+Math.round(v)+"bp"):
         (+v).toFixed(2));
      return '<div class="rg-inp"><span class="k">'+label+'</span><span class="v">'+val+'</span></div>';
    }
    var html='<div class="rg-name" style="color:'+info.c+'">'+(d.regime||"\u2014").replace(/_/g," ")+'</div>'+
      '<div class="rg-desc">'+info.d+'</div>'+
      (d.confidence>0?'<div class="rg-conf">confidence '+d.confidence+' / 100'+(d.secondary_tag?" \u00B7 "+d.secondary_tag:"")+'</div>':'')+
      '<div class="rg-inputs">'+
        row("vix","VIX",i.vix,"")+row("cpi_yoy","CPI y/y",i.cpi_yoy,"%")+
        row("spx_3m","SPX 3m",i.spx_3m,"%")+row("hy","HY",i.hy,"bp")+
        row("wti_3m","WTI 3m",i.wti_3m,"%")+row("us02_3m","2Y 3m",i.us02_3m,"bp")+
      '</div>';
    document.getElementById("rgBody").innerHTML=html;
  }

  // ----- SPX candlestick + volume, with hover detail, zoom, and GEX levels -----
  function drawSPX(){
    if(drawn.spx) return;
    Promise.all([getJSON("spx_daily"), getJSON("gex").catch(function(){return null;})]).then(function(res){
      var d=res[0], gex=res[1];
      var bars=(d&&d.bars)||[]; if(!bars.length){ document.getElementById("spxPlot").innerHTML='<div class="err">No SPX daily data yet. It populates on the next engine run.</div>'; return; }
      var dates=bars.map(function(b){return b.date;});
      var last=bars[bars.length-1], prev=bars.length>1?bars[bars.length-2]:last;
      var chg=((last.c-prev.c)/prev.c*100), chgpts=(last.c-prev.c);
      // big header
      document.getElementById("spxPx").textContent=last.c.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
      var cc=chg>=0?"var(--green)":"var(--red)";
      document.getElementById("spxChg").innerHTML='<span style="color:'+cc+'">'+(chg>=0?"+":"")+chgpts.toFixed(2)+' ('+(chg>=0?"+":"")+chg.toFixed(2)+'%)</span>';
      document.getElementById("spxAsof").textContent=last.date;

      // per-bar % change for hover
      var pct=bars.map(function(b,i){ if(i===0)return 0; var p=bars[i-1].c; return p?((b.c-p)/p*100):0; });
      var hovertext=bars.map(function(b,i){
        return "O "+b.o.toLocaleString()+"  H "+b.h.toLocaleString()+"<br>L "+b.l.toLocaleString()+"  C "+b.c.toLocaleString()+
               "<br>Vol "+(b.v?(b.v/1e9).toFixed(2)+"B":"\u2014")+"  "+(pct[i]>=0?"+":"")+pct[i].toFixed(2)+"%";
      });
      var volColors=bars.map(function(b){return (b.c>=b.o)?"rgba(45,138,85,.45)":"rgba(176,48,48,.45)";});
      var candle={type:"candlestick",x:dates,open:bars.map(function(b){return b.o;}),high:bars.map(function(b){return b.h;}),low:bars.map(function(b){return b.l;}),close:bars.map(function(b){return b.c;}),
        text:hovertext,hoverinfo:"text+x",
        increasing:{line:{color:"#2D8A55"},fillcolor:"rgba(45,138,85,.6)"},decreasing:{line:{color:"#B03030"},fillcolor:"rgba(176,48,48,.6)"},yaxis:"y",name:"",showlegend:false};
      var vol={type:"bar",x:dates,y:bars.map(function(b){return b.v;}),marker:{color:volColors},yaxis:"y2",name:"Vol",hoverinfo:"skip",showlegend:false};

      var layout=baseLayout();
      layout.dragmode="pan";
      layout.hovermode="x";
      layout.hoverlabel={bgcolor:"#FAF7F2",bordercolor:"#C8BFA8",font:{family:"'Courier New',monospace",size:10,color:"#1C1912"}};
      layout.grid={rows:2,columns:1,roworder:"top to bottom"};
      layout.yaxis={domain:[0.24,1],side:"right",gridcolor:"rgba(0,0,0,.05)",tickfont:tf(),fixedrange:false,autorange:true};
      layout.yaxis2={domain:[0,0.18],side:"right",gridcolor:"rgba(0,0,0,.04)",tickfont:tf(8),fixedrange:true,showticklabels:false};
      layout.xaxis={rangeslider:{visible:false},gridcolor:"rgba(0,0,0,.04)",tickfont:tf(),rangebreaks:[{bounds:["sat","mon"]}]};
      // default view: last ~60 sessions (still pannable/zoomable to full history)
      if(dates.length>60){ layout.xaxis.range=[dates[dates.length-60], dates[dates.length-1]]; }

      // GEX levels as horizontal lines (gamma flip, call wall, put wall)
      var shapes=[], anns=[];
      if(gex){
        var ov=gex.overview||{}, L=gex.levels||{};
        function lvlLine(val,color,label){
          if(val==null) return;
          shapes.push({type:"line",xref:"paper",x0:0,x1:1,yref:"y",y0:val,y1:val,
            line:{color:color,width:1,dash:"dot"}});
          anns.push({xref:"paper",x:1,y:val,yref:"y",xanchor:"right",yanchor:"bottom",
            text:label+" "+val.toLocaleString(),showarrow:false,
            font:{family:"'Courier New',monospace",size:8.5,color:color},bgcolor:"rgba(250,247,242,.7)"});
        }
        lvlLine(ov.gamma_flip,"#A67C00","Flip");
        lvlLine(L.call_wall&&L.call_wall.strike,"#1A5C38","Call wall");
        lvlLine(L.put_wall&&L.put_wall.strike,"#7A1E1E","Put wall");
      }
      layout.shapes=shapes; layout.annotations=anns;

      var conf={displayModeBar:false,responsive:true,scrollZoom:true,doubleClick:"reset"};
      Plotly.newPlot("spxPlot",[candle,vol],layout,conf);

      var plotEl=document.getElementById("spxPlot");

      // shared: update the corner readout for a given bar index
      function showBar(i){
        if(i==null||i<0||i>=bars.length||!bars[i])return;
        var b=bars[i];
        document.getElementById("spxHover").innerHTML=
          '<span class="hk">'+b.date+'</span> O '+b.o.toLocaleString()+' H '+b.h.toLocaleString()+
          ' L '+b.l.toLocaleString()+' C '+b.c.toLocaleString()+' \u00B7 Vol '+(b.v?(b.v/1e9).toFixed(2)+'B':'\u2014')+
          ' \u00B7 <span style="color:'+(pct[i]>=0?"var(--green)":"var(--red)")+'">'+(pct[i]>=0?"+":"")+pct[i].toFixed(2)+'%</span>';
      }
      // desktop hover
      plotEl.on("plotly_hover",function(ev){
        var pt=ev.points&&ev.points[0]; if(!pt)return; showBar(pt.pointIndex);
      });
      // touch scrub: map finger x-position to nearest bar, update readout live.
      // Works on iPad where there's no hover. Does not block Plotly's pan.
      function scrubFromTouch(clientX){
        try{
          var gd=plotEl; var xa=gd._fullLayout.xaxis;
          var rect=gd.getBoundingClientRect();
          var xInData=xa.p2d(clientX-rect.left);
          // xInData is a date-ish value; find nearest bar by index along visible range
          // Plotly gives category/linear index for date axis; match to closest date
          var target=xInData;
          var lo=0,hi=bars.length-1,best=0,bestDiff=Infinity;
          for(var k=0;k<bars.length;k++){
            var t=new Date(bars[k].date).getTime();
            var diff=Math.abs(t-new Date(_fromAxis(target)).getTime());
            if(diff<bestDiff){bestDiff=diff;best=k;}
          }
          showBar(best);
        }catch(e){}
      }
      function _fromAxis(v){
        // xaxis.p2d on a date axis returns ms or date string depending on version
        if(typeof v==="number"){ return v; }
        return v;
      }
      var scrubbing=false;
      plotEl.addEventListener("touchstart",function(e){ scrubbing=true; if(e.touches[0])scrubFromTouch(e.touches[0].clientX); },{passive:true});
      plotEl.addEventListener("touchmove",function(e){ if(scrubbing&&e.touches[0])scrubFromTouch(e.touches[0].clientX); },{passive:true});
      plotEl.addEventListener("touchend",function(){ scrubbing=false; },{passive:true});

      // zoom buttons — operate on the x-axis range, keep drag as pan
      function curRange(){
        var xa=plotEl._fullLayout.xaxis;
        return [xa.range[0], xa.range[1]];
      }
      function setXRange(r){ Plotly.relayout(plotEl,{"xaxis.range":r}); }
      function zoomBy(factor){
        var r=curRange();
        var a=new Date(r[0]).getTime(), b=new Date(r[1]).getTime();
        if(isNaN(a)||isNaN(b)){ a=r[0]; b=r[1]; }
        var mid=(a+b)/2, half=(b-a)/2*factor;
        setXRange([new Date(mid-half).toISOString().slice(0,10), new Date(mid+half).toISOString().slice(0,10)]);
      }
      document.getElementById("spxZoomIn").addEventListener("click",function(){ zoomBy(0.6); });
      document.getElementById("spxZoomOut").addEventListener("click",function(){ zoomBy(1.6); });
      document.getElementById("spxZoomReset").addEventListener("click",function(){
        var r=(dates.length>60)?[dates[dates.length-60],dates[dates.length-1]]:[dates[0],dates[dates.length-1]];
        setXRange(r);
      });
      drawn.spx=true;
    }).catch(function(e){ document.getElementById("spxPlot").innerHTML=errHTML("spx_daily.json",e.message); });
  }

  // ----- VIX term structure: real futures curve (manual vix_term.json, paste like GEX) -----
  function drawVIX(){
    if(drawn.vix) return;
    getJSON("vix_term").then(function(d){
      var futs=(d&&d.futures)||[];
      var spot=(d&&d.spot);
      if(!futs.length){ throw new Error("no futures"); }
      // x labels: Spot + each contract; y: values
      var labels=[], vals=[];
      if(spot!=null){ labels.push("Spot"); vals.push(spot); }
      futs.forEach(function(f){ labels.push(f.label); vals.push(f.value); });
      // contango vs backwardation: compare front future to back future
      var front=futs[0].value, back=futs[futs.length-1].value;
      var contango = back>front;
      var shape = contango ? "CONTANGO" : (back<front ? "BACKWARDATION" : "FLAT");
      var shapeColor = contango ? "var(--green)" : (back<front ? "var(--red)" : "var(--inkLight)");
      var spread = (back-front);
      document.getElementById("vixNote").innerHTML =
        (spot!=null?'spot '+spot.toFixed(2)+'  ':'') +
        '<span style="color:'+shapeColor+';font-weight:700">'+shape+'</span>' +
        (isFinite(spread)?'  '+(spread>0?"+":"")+spread.toFixed(2):"");
      // main curve (futures only, line+markers)
      var xf=[], yf=[];
      futs.forEach(function(f){ xf.push(f.label); yf.push(f.value); });
      var curve={type:"scatter",mode:"lines+markers",x:xf,y:yf,
        line:{color:(contango?"#1A5C38":"#7A1E1E"),width:2.5,shape:"spline"},
        marker:{size:7,color:(contango?"#1A5C38":"#7A1E1E")},
        text:yf.map(function(v){return v.toFixed(2);}),
        hovertemplate:"%{x}: %{y:.2f}<extra></extra>",showlegend:false};
      var data=[curve];
      // spot marker (gold dashed reference line at spot level)
      var shapes=[];
      if(spot!=null){
        shapes.push({type:"line",xref:"paper",x0:0,x1:1,yref:"y",y0:spot,y1:spot,
          line:{color:"#A67C00",width:1,dash:"dash"}});
      }
      var layout=baseLayout();
      layout.margin={l:6,r:34,t:8,b:24};
      layout.shapes=shapes;
      layout.xaxis={gridcolor:"rgba(0,0,0,.04)",tickfont:tf(9),fixedrange:true};
      layout.yaxis={gridcolor:"rgba(0,0,0,.05)",tickfont:tf(9),side:"right",fixedrange:true,
        title:{text:"",font:tf(8)}};
      if(spot!=null){
        layout.annotations=[{xref:"paper",x:0,y:spot,yref:"y",xanchor:"left",yanchor:"bottom",
          text:"spot "+spot.toFixed(2),showarrow:false,font:{family:"'Courier New',monospace",size:8,color:"#A67C00"},bgcolor:"rgba(250,247,242,.7)"}];
      }
      Plotly.newPlot("vixPlot",data,layout,{displayModeBar:false,responsive:true,staticPlot:false});
      drawn.vix=true;
    }).catch(function(e){
      // no manual data yet — clear guidance, not a scary error
      document.getElementById("vixNote").innerHTML='<span style="color:var(--inkFade)">awaiting data</span>';
      document.getElementById("vixPlot").innerHTML='<div class="err" style="padding:14px">VIX term structure needs the futures ladder.<div class="fix">Paste the VIX futures (front \u2192 M6) into vix_term.json and upload to outputs/ \u2014 same flow as GEX. Format: {"spot":15.7,"futures":[{"label":"Jul","value":16.2},\u2026]}</div></div>';
    });
  }

  // ----- multi-asset band: auto-scrolling marquee (levels + % change) -----
  function loadAssets(){
    // [key, label, decimals, prefix, transform]
    var DEFS=[
      ["spx","S&P 500",0,"",null],
      ["ndx","Nasdaq",0,"",null],
      ["dow","Dow",0,"",null],
      ["rut","Russell 2K",0,"",null],
      ["vix","VIX",2,"",null],
      ["tnx","US 10Y",2,"","yield"],
      ["wti","WTI Oil",2,"$",null],
      ["gold","Gold",0,"$",null],
      ["dxy","Dollar",2,"",null],
      ["btc","Bitcoin",0,"$",null]
    ];
    getJSON("macro_series").then(function(d){
      var s=(d&&d.series)||[];
      if(s.length<2){ document.getElementById("assetBand").innerHTML='<div class="loading">No series data yet.</div>'; return; }
      var last=s[s.length-1], prev=s[s.length-2];
      var cells=DEFS.map(function(def){
        var k=def[0], name=def[1], dp=def[2], pre=def[3], tf=def[4];
        var cur=last[k], pr=prev[k];
        if(cur===null||cur===undefined) return null;
        if(tf==="yield"){ cur=cur/10; if(pr!=null) pr=pr/10; }  // ^TNX is yield x10
        var chg=(pr!==null&&pr!==undefined&&pr!==0)?((cur-pr)/pr*100):null;
        var invert=(k==="vix");
        var pos=chg===null?null:(invert?chg<0:chg>=0);
        var color=pos===null?"var(--inkLight)":(pos?"var(--green)":"var(--red)");
        var accent=pos===null?"var(--inkFade)":(pos?"var(--greenSoft)":"var(--redSoft)");
        var val=pre+Number(cur).toLocaleString(undefined,{minimumFractionDigits:dp,maximumFractionDigits:dp})+(tf==="yield"?"%":"");
        var chgstr=chg===null?"":((chg>0?"+":"")+chg.toFixed(2)+"%");
        return cell(name,val,chgstr,color,accent);
      }).filter(Boolean);
      // duplicate the track so the marquee loops seamlessly
      var track=cells.join("")+cells.join("");
      document.getElementById("assetBand").innerHTML='<div class="marquee-track">'+track+'</div>';
    }).catch(function(e){ document.getElementById("assetBand").innerHTML='<div class="err">Assets: couldn\'t load macro_series.json.</div>'; });

    function cell(name,val,chg,color,accent){
      return '<div class="asset-cell">'+(accent?'<div class="accent" style="background:'+accent+'"></div>':'')+
        '<span class="an">'+name+'</span>'+
        '<span class="av">'+val+'</span>'+
        '<span class="ac" style="color:'+(color||"var(--inkLight)")+'">'+chg+'</span>'+
      '</div>';
    }
  }

  var calData=null, calMonth=null;

  function renderCalendar(){
    var today=new Date().toISOString().slice(0,10);
    var evts=calData.filter(function(e){return e.date>=today;}).sort(function(a,b){return a.date<b.date?-1:1;});
    if(!evts.length){ document.getElementById("calStrip").innerHTML='<div class="loading">No upcoming events. Add them to events.json.</div>'; return; }
    // months present, in order
    var MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    var months=[];
    evts.forEach(function(e){ var k=e.date.slice(0,7); if(months.indexOf(k)<0) months.push(k); });
    if(!calMonth || months.indexOf(calMonth)<0) calMonth=months[0];
    // filter buttons
    var seg='<div class="seg" id="calSeg">'+months.map(function(k){
      var mi=parseInt(k.slice(5,7),10)-1; var lbl=MON[mi];
      return '<button data-m="'+k+'"'+(k===calMonth?' class="on"':'')+'>'+lbl+'</button>';
    }).join("")+'</div>';
    document.getElementById("calNote").innerHTML="";
    // put the seg into the tile header note area
    var head=document.querySelector(".a-cal .thead");
    var existingSeg=head.querySelector(".seg");
    if(existingSeg) existingSeg.remove();
    head.insertAdjacentHTML("beforeend", seg);
    head.querySelector("#calSeg").addEventListener("click",function(ev){
      var b=ev.target.closest("button"); if(!b) return;
      calMonth=b.dataset.m; renderCalendar();
    });
    // grid of this month's events
    var monthEvts=evts.filter(function(e){return e.date.slice(0,7)===calMonth;});
    var grid=monthEvts.map(function(e){
      var imp=(e.impact||"").toLowerCase(), cls=imp==="high"?"hi":imp==="med"?"med":"";
      var dt=new Date(e.date+"T00:00:00");
      var dow=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][dt.getDay()];
      var day=dt.getDate();
      return '<div class="cal-card '+cls+'"><div class="cal-date">'+dow+' '+day+'</div><div class="cal-evt">'+(e.title||"")+'</div>'+(e.note?'<div class="cal-in">'+e.note+'</div>':'')+'</div>';
    }).join("");
    document.getElementById("calStrip").innerHTML='<div class="cal-grid">'+grid+'</div>';
  }

  function renderScreener(){

    var arr=scrData.slice();
    // quick filters
    if(scrFilter==="breakout") arr=arr.filter(function(s){return s.breakout;});
    else if(scrFilter==="passers") arr=arr.filter(function(s){return s.passer;});
    else if(scrFilter) arr=arr.filter(function(s){return s.label===scrFilter;});
    // dropdown filters
    if(scrMcap) arr=arr.filter(function(s){return (s.mcap_B||0)>=+scrMcap;});
    if(scrIndustry) arr=arr.filter(function(s){return s.industry===scrIndustry;});
    if(scrChg) arr=arr.filter(function(s){return s.daily_pct!=null && s.daily_pct>=+scrChg;});
    // search: ticker OR name OR industry
    if(scrSearch) arr=arr.filter(function(s){
      return (s.ticker||"").toLowerCase().indexOf(scrSearch)>=0
        || (s.name||"").toLowerCase().indexOf(scrSearch)>=0
        || (s.industry||"").toLowerCase().indexOf(scrSearch)>=0;
    });
    // sort — rank ascending, everything else descending
    if(scrSort==="rank") arr.sort(function(a,b){return (a.rank||9999)-(b.rank||9999);});
    else arr.sort(function(a,b){return (b[scrSort]!=null?b[scrSort]:-999)-(a[scrSort]!=null?a[scrSort]:-999);});
    var cEl=document.getElementById("scrCount");
    if(cEl){
      var m=(scrMeta||{});
      var fresh=m.data_is_fresh, cov=m.daily_coverage_pct, bar=m.latest_bar;
      var txt=arr.length+" stocks";
      if(fresh===false) txt+=' \u00B7 STALE: no fresh bars last run';
      else if(cov!=null) txt+=' \u00B7 '+cov+'% refreshed'+(bar?' \u00B7 '+bar:'');
      cEl.textContent=txt;
      cEl.style.color = (fresh===false) ? "var(--red)" : (cov!=null&&cov<90) ? "var(--amber)" : "var(--inkFade)";
    }
    var head='<div class="scr-th"><span data-s="rank">#</span><span data-s="ticker">Stock</span>'+
      '<span data-s="daily_pct" class="num">Day%</span><span data-s="opp_score" class="num">Opp</span>'+
      '<span data-s="trade_score" class="num">T</span><span data-s="invest_score" class="num">I</span>'+
      '<span data-s="mcap_B" class="num">Cap</span><span>Add</span></div>';
    var rows=arr.slice(0,200).map(function(s){
      var dp=s.daily_pct, dps=(dp==null)?"\u2014":((dp>=0?"+":"")+dp.toFixed(1)+"%");
      var dpc=dp==null?"var(--inkFade)":(dp>=0?"var(--green)":"var(--red)");
      var inR=trHas(s.ticker), inT=trHasReady(s.ticker);
      var nm=s.name||s.industry||"";
      return '<div class="scr-tr'+(s.passer?'':' nearmiss')+'">'+
        '<span class="rk">'+(s.rank||"\u2014")+'</span>'+
        '<span class="nmcell"><span class="tk">'+s.ticker+(s.breakout?' \u25B2':'')+'</span><span class="nm">'+nm+'</span></span>'+
        '<span class="num" style="color:'+dpc+'">'+dps+'</span>'+
        '<span class="num" style="font-weight:700">'+(s.opp_score!=null?Math.round(s.opp_score):"\u2014")+'</span>'+
        '<span class="num">'+(s.trade_score!=null?s.trade_score:"\u2014")+'</span>'+
        '<span class="num">'+(s.invest_score!=null?s.invest_score:"\u2014")+'</span>'+
        '<span class="num">'+capFmt(s.mcap_B)+'</span>'+
        '<span class="scr-acts"><button data-w="research" data-tk="'+s.ticker+'" class="'+(inR?"added":"")+'">R</button>'+
        '<button data-w="trades" data-tk="'+s.ticker+'" class="'+(inT?"added":"")+'">T</button>'+
        '<button data-w="pick" data-tk="'+s.ticker+'" title="add to picks">\u2605</button></span></div>';
    }).join("");
    var el=document.getElementById("scrTable");
    el.innerHTML=head+rows;
    el.querySelectorAll(".scr-th span[data-s]").forEach(function(h){
      h.addEventListener("click",function(){ scrSort=this.dataset.s; renderScreener(); });
    });
    el.querySelectorAll(".scr-acts button").forEach(function(btn){
      btn.addEventListener("click",function(){
        var tk=this.dataset.tk, w=this.dataset.w;
        var stock=scrData.filter(function(s){return s.ticker===tk;})[0];
        if(w==="pick"){ addPick(stock); }
        else if(w==="research"){ trAddIdea(stock); renderScreener(); }
        else if(w==="trades"){ trPlanFromStock(stock); }
      });
    });
  }

  function generateThesis(stock, idx, btn){
    var box=document.getElementById("thesis-"+idx);
    btn.disabled=true; btn.textContent="Thinking\u2026";
    box.innerHTML='<div class="gen">Writing thesis\u2026</div>';
    var L=stock.levels||{};
    var regime=(C.macro&&C.macro.regime)||"NO_CLEAR";
    var hasLevels=stock.levels!=null;
    var levelLine = hasLevels ?
      ("Last price "+L.last+". Resistance/base-high "+L.resistance+". Support/swing-low "+L.support+". 50-day MA "+L.ma50+". Weekly volatility ~"+L.atr_pct+"%. ") :
      ("No precise breakout price levels are available for this stock \u2014 do NOT invent specific prices; give entry/exit guidance in relative terms (e.g. 'on a breakout above the recent base high with volume', 'stop below the base'). ");
    var prompt=
      "You are a senior hedge fund PM writing a concise trade thesis for a stock. "+
      "Be direct and specific. Use ONLY the data provided; do not invent fundamentals. "+
      "Macro regime: "+regime+". "+
      "Stock: "+stock.ticker+" ("+(stock.name||stock.industry||"")+"). "+
      levelLine+
      "Trade score "+stock.trade_score+"/100, Invest score "+stock.invest_score+"/100, "+
      "volume state "+stock.vol_state+", position vs 2yr high "+stock.pos_vs_high+"%. "+
      "Write 4 short sections with these exact headers on their own lines: THESIS, ENTRY, EXITS, SIZING. "+
      "THESIS: 2 sentences on why this setup, tied to the breakout and regime. "+
      "ENTRY: "+(hasLevels?"a specific entry trigger and price using the levels given. ":"an entry trigger in relative terms. ")+
      "EXITS: "+(hasLevels?"a stop price (below support/base) and a first target, with the logic. ":"stop and target logic in relative terms. ")+
      "SIZING: position sizing guidance given the volatility and scores, in relative terms (e.g. half vs full risk unit). "+
      "Keep the whole thing under 160 words. Plain text, no markdown symbols.";
    fetch("https://api.anthropic.com/v1/messages",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:prompt}]})
    }).then(function(r){return r.json();}).then(function(data){
      var text=(data.content||[]).filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("\n");
      box.innerHTML=formatThesis(text);
      btn.style.display="none";
    }).catch(function(err){
      box.innerHTML='<div class="gen" style="color:var(--red)">Thesis generation failed ('+err.message+'). This needs the live API on the deployed site.</div>';
      btn.disabled=false; btn.textContent="Retry \u2192";
    });
  }
  function formatThesis(text){
    // bold the section headers
    var html=text.replace(/\n?(THESIS|ENTRY|EXITS|SIZING)\s*:?/g,'<h5>$1</h5>');
    return html;
  }

  // ================= PORTFOLIO =================
  // The risk math is ported VERBATIM from MacroFlow_Command_Dashboard.html —
  // same RULES constants, same expectancy formulas, same cool-off logic, same
  // five Council lenses. It now reads your LIVE trades log instead of a
  // hardcoded account, so it reflects what you're actually holding.
  //
  // Nothing here is invented. Where the Dashboard scanned trade notes with
  // regexes (movedStops / reEntries / badEntries), those still work — they read
  // your exit_reason and exit_notes fields.

  var RULES = { riskCons:0.01, riskAggr:0.02, atrMult:2.0, maxPosPct:0.35,
                maxHeatR:3, coolOff:6, coolOffDays:5, atrTight:1.0, atrWide:3.5,
                earnDays:14, fallbackRR:2.0 };
  var PF_KEY = "phoenix_pf_v1";
  // Per-account config. The two books are kept SEPARATE — six tickers appear in
  // both at different sizes on different capital, so merging them would corrupt
  // expectancy. The switcher filters; it never combines.
  var pfCfg = {
    active: "gabriel",
    accounts: {
      gabriel: { label:"Gabriel", startingBalance:2000, aggressive:false },
      aldemar: { label:"Aldemar", startingBalance:2000, aggressive:false }
    }
  };
  function pfAcct(){ return pfCfg.accounts[pfCfg.active] || {label:pfCfg.active,startingBalance:2000,aggressive:false}; }

  function pfLoadCfg(){
    try{
      var s=localStorage.getItem(PF_KEY);
      if(s){
        var o=JSON.parse(s);
        // migrate the old flat shape {aggressive,startingBalance} -> per-account
        if(o && o.accounts) pfCfg=Object.assign(pfCfg,o);
        else if(o && (o.startingBalance!=null || o.aggressive!=null)){
          pfCfg.accounts.gabriel.startingBalance = o.startingBalance || 2000;
          pfCfg.accounts.gabriel.aggressive = !!o.aggressive;
        }
      }
    }catch(e){}
    // any account that exists in the log but not in config gets a default entry
    (trLog||[]).forEach(function(t){
      var a=t.account;
      if(a && !pfCfg.accounts[a]){
        pfCfg.accounts[a]={label:a.charAt(0).toUpperCase()+a.slice(1),startingBalance:2000,aggressive:false};
      }
    });
    if(!pfCfg.accounts[pfCfg.active]){
      var ks=Object.keys(pfCfg.accounts);
      if(ks.length) pfCfg.active=ks[0];
    }
  }
  function pfSaveCfg(){ try{ localStorage.setItem(PF_KEY,JSON.stringify(pfCfg)); }catch(e){} }
  function curRiskPct(){ return pfAcct().aggressive?RULES.riskAggr:RULES.riskCons; }

  // Trades belonging to the active account. Legacy trades with no account tag
  // fall into whichever account is active, so nothing silently disappears.
  // Trades for the active book only. An untagged trade (made in the app before
  // accounts existed) belongs to ONE book — the default — never to all of them.
  // Showing it in every book would double-count it and corrupt both expectancies.
  var PF_DEFAULT_ACCT="gabriel";
  function pfTrades(){
    return (trLog||[]).filter(function(t){
      var a=t.account||PF_DEFAULT_ACCT;
      return a===pfCfg.active;
    });
  }

  // ---- helpers (ported) ----
  function pfD(s){ return new Date(s+"T00:00:00"); }
  function pfDayDiff(a,b){ if(!a||!b) return 0; return Math.max(0,Math.round((pfD(b)-pfD(a))/864e5)); }
  function pfToday(){ return new Date().toISOString().slice(0,10); }
  function pfMed(a){ if(!a.length)return 0; var s=a.slice().sort(function(x,y){return x-y;}),m=Math.floor(s.length/2);
    return s.length%2?s[m]:(s[m-1]+s[m])/2; }
  function pfN(v,dp){ dp=dp==null?2:dp; return Math.abs(v).toLocaleString("en-US",{minimumFractionDigits:dp,maximumFractionDigits:dp}); }
  function pfUsd(v,dp){ return (v<0?"\u2212":"")+"$"+pfN(v,dp==null?2:dp); }
  function pfUsdS(v,dp){ return (v<0?"\u2212":"+")+"$"+pfN(v,dp==null?2:dp); }
  function pfPct(v,dp){ return (v*100).toFixed(dp==null?1:dp)+"%"; }
  function pfRS(v){ return (v<0?"\u2212":"+")+Math.abs(v).toFixed(2)+"R"; }
  function pfXN(v){ return isFinite(v)?v.toFixed(2)+"\u00d7":"\u2014"; }

  // ---- compute (ported verbatim from the Command Dashboard) ----
  function pfCompute(){
    var SB = +pfAcct().startingBalance || 2000;
    var src = pfTrades().filter(function(t){ return t.status==="open"||t.status==="closed"; });
    var recs = src.map(function(t){
      var last = t.status==="closed" ? t.exit_price : (trPrices[t.ticker]!=null?trPrices[t.ticker]:t.entry);
      last = (last==null?t.entry:last);
      var qty = +t.qty||0, entry = +t.entry||0, stop = +t.stop||0;
      var pnl=(last-entry)*qty, ret=entry?last/entry-1:0;
      var risk=(entry-stop)*qty, R=risk>0?pnl/risk:0, val=qty*entry;
      var dit = t.status==="closed" ? pfDayDiff(t.entry_date,t.exit_date) : pfDayDiff(t.entry_date,pfToday());
      return {ticker:t.ticker,status:t.status,entry:entry,stop:stop,target:+t.target||0,qty:qty,
              exitDate:t.exit_date,entryDate:t.entry_date,
              reason:((t.exit_reason||"")+" "+(t.exit_notes||"")).trim(),
              last:last,pnl:pnl,ret:ret,risk:risk,R:R,val:val,dit:dit};
    });
    var closed=recs.filter(function(r){return r.status==="closed";});
    var open=recs.filter(function(r){return r.status==="open";});
    var realized=closed.reduce(function(a,r){return a+r.pnl;},0);
    var unrealized=open.reduce(function(a,r){return a+r.pnl;},0);
    var balance=SB+realized+unrealized, totalReturn=SB?balance/SB-1:0;
    var W=closed.filter(function(r){return r.pnl>0;}), L=closed.filter(function(r){return r.pnl<0;});
    var n=closed.length, wr=n?W.length/n:0, lr=n?L.length/n:0;
    var gp=W.reduce(function(a,r){return a+r.pnl;},0), gl=L.reduce(function(a,r){return a+r.pnl;},0);
    var aw=W.length?gp/W.length:0, al=L.length?Math.abs(gl)/L.length:0;
    var payoff=al?aw/al:0, pf=gl?gp/Math.abs(gl):0;
    var beWR=payoff?1/(1+payoff):0, reqPayoff=wr?lr/wr:0;
    var expD=aw*wr-al*lr;
    var awR=W.length?W.reduce(function(a,r){return a+r.R;},0)/W.length:0;
    var alR=L.length?L.reduce(function(a,r){return a+r.R;},0)/L.length:0;
    var expR=n?closed.reduce(function(a,r){return a+r.R;},0)/n:0;
    var medW=pfMed(W.map(function(r){return r.pnl;})), medL=pfMed(L.map(function(r){return r.pnl;}));
    var lw=W.length?W.reduce(function(a,r){return r.pnl>a.pnl?r:a;}):null;
    var ll=L.length?L.reduce(function(a,r){return r.pnl<a.pnl?r:a;}):null;
    var losersBeyond1R=L.filter(function(r){return r.R<-1;}).length;
    var ord=closed.slice().sort(function(a,b){
      var d=pfD(a.exitDate||"1970-01-01")-pfD(b.exitDate||"1970-01-01");
      return d||(a.ticker<b.ticker?-1:1);
    });
    var cum=0,peak=0,maxdd=0,strk=0,maxstrk=0,seq=[0],pk=[0];
    ord.forEach(function(r){ cum+=r.pnl; seq.push(cum); peak=Math.max(peak,cum); pk.push(peak);
      maxdd=Math.min(maxdd,cum-peak); if(r.pnl<0){strk++;maxstrk=Math.max(maxstrk,strk);}else strk=0; });
    var curStreak=0;
    for(var i=ord.length-1;i>=0;i--){ if(ord[i].pnl<0)curStreak++; else break; }
    var medPos=pfMed(recs.map(function(r){return r.val;}));
    var bigPos=recs.slice().sort(function(a,b){return b.val-a.val;}).slice(0,2);
    var R$=curRiskPct()*balance;
    var openRisk$=open.reduce(function(a,r){return a+Math.max(0,(r.entry-r.stop)*r.qty);},0);
    var openRiskR=R$?openRisk$/R$:0;
    var reqRR; if(n===0)reqRR=RULES.fallbackRR; else if(W.length===0)reqRR=Infinity; else reqRR=lr/wr;
    var lastClosedExit=ord.length?ord[ord.length-1].exitDate:null;
    var daysSinceLast=lastClosedExit?pfDayDiff(lastClosedExit,pfToday()):null;
    var coolActive=curStreak>=RULES.coolOff && daysSinceLast!==null && daysSinceLast<RULES.coolOffDays;
    var coolServed=curStreak>=RULES.coolOff && daysSinceLast!==null && daysSinceLast>=RULES.coolOffDays;
    var coolRemaining=daysSinceLast!==null?Math.max(0,RULES.coolOffDays-daysSinceLast):0;
    return {SB:SB,recs:recs,closed:closed,open:open,realized:realized,unrealized:unrealized,
      balance:balance,totalReturn:totalReturn,W:W,L:L,n:n,wr:wr,lr:lr,gp:gp,gl:gl,aw:aw,al:al,
      payoff:payoff,pf:pf,beWR:beWR,reqPayoff:reqPayoff,reqRR:reqRR,expD:expD,awR:awR,alR:alR,expR:expR,
      medW:medW,medL:medL,lw:lw,ll:ll,losersBeyond1R:losersBeyond1R,seq:seq,pk:pk,peak:peak,maxdd:maxdd,
      maxstrk:maxstrk,curStreak:curStreak,medPos:medPos,bigPos:bigPos,R$:R$,openRisk$:openRisk$,openRiskR:openRiskR,
      lastClosedExit:lastClosedExit,daysSinceLast:daysSinceLast,coolActive:coolActive,coolServed:coolServed,
      coolRemaining:coolRemaining,riskPct:curRiskPct()};
  }
