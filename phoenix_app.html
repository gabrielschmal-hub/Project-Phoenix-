  function pfRender(){
    if(!document.getElementById("pfStrip")) return;
    var s=pfCompute();
    pfRenderSwitch();
    document.getElementById("pfStrip").innerHTML=pfStrip(s);
    document.getElementById("pfHeatBody").innerHTML=pfHeatTile(s);
    document.getElementById("pfStreakBody").innerHTML=pfStreakTile(s);
    document.getElementById("pfMetBody").innerHTML=pfMetricsTile(s);
    document.getElementById("pfCouncilBody").innerHTML=pfCouncilTile(s);
    document.getElementById("pfChairBody").innerHTML=pfChairTile(s);
    var mn=document.getElementById("pfMetNote");
    if(mn) mn.textContent = s.n ? s.n+" closed \u00b7 "+s.W.length+"W/"+s.L.length+"L" : "no closed trades";
    var en=document.getElementById("pfEqNote");
    if(en) en.textContent = s.n>1 ? "peak "+pfUsd(s.peak,0)+" \u00b7 dd "+pfUsd(s.maxdd,0) : "";
    // rules line lives in the chair tile's note — it's the constitution in one line
    var rn=document.getElementById("pfRulesNote");
    if(rn){
      rn.innerHTML='<span class="pf-rules-line">1R '+pfPct(s.riskPct,0)+' \u00b7 stop '+RULES.atrMult+'\u00d7ATR \u00b7 max '+
        (RULES.maxPosPct*100)+'% \u00b7 heat \u2264'+RULES.maxHeatR+'R</span> '+
        '<input class="pf-bal" type="number" id="pfBal" value="'+s.SB+'" inputmode="numeric" title="starting balance for '+pfAcct().label+'"> '+
        '<button class="pf-toggle'+(pfAcct().aggressive?' on':'')+'" id="pfAggr">'+(pfAcct().aggressive?'2%':'1%')+'</button>';
      var t=document.getElementById("pfAggr");
      if(t) t.onclick=function(){ pfAcct().aggressive=!pfAcct().aggressive; pfSaveCfg(); pfRender(); };
      var b=document.getElementById("pfBal");
      if(b) b.onchange=function(){ pfAcct().startingBalance=parseFloat(this.value)||2000; pfSaveCfg(); pfRender(); };
    }
    pfDrawEquity(s);
  }

  // ---- account switcher ----
  function pfRenderSwitch(){
    var el=document.getElementById("pfSwitch"); if(!el) return;
    var keys=Object.keys(pfCfg.accounts);
    if(keys.length<2){ el.style.display="none"; return; }
    el.style.display="";
    el.innerHTML=keys.map(function(k){
      var a=pfCfg.accounts[k];
      // per-account trade count, so the tab tells you what's in it
      var n=(trLog||[]).filter(function(t){
        return (t.account||PF_DEFAULT_ACCT)===k && (t.status==="open"||t.status==="closed");
      }).length;
      return '<button class="pf-seg'+(k===pfCfg.active?" on":"")+'" data-acc="'+k+'">'+
             a.label+'<span class="sn">'+n+'</span></button>';
    }).join("");
    el.querySelectorAll("button").forEach(function(b){
      b.onclick=function(){
        pfCfg.active=this.getAttribute("data-acc");
        pfSaveCfg(); pfRender();
      };
    });
  }

  // ---- summary strip (mirrors the asset band) ----
  function pfStrip(s){
    var status = s.coolActive ? {t:"COOL-OFF",c:"var(--red)"}
               : s.openRiskR>RULES.maxHeatR ? {t:"OVER HEAT",c:"var(--red)"}
               : s.n===0 ? {t:"NO DATA",c:"var(--inkFade)"}
               : s.expR>=0 ? {t:"EDGE +",c:"var(--green)"}
               : {t:"EDGE \u2212",c:"var(--red)"};
    function cell(n,v,sub,col,accent,wide){
      return '<div class="pf-cell'+(wide?' wide':'')+'">'+
        (accent?'<div class="accent" style="background:'+accent+'"></div>':'')+
        '<div class="cn">'+n+'</div><div class="cv"'+(col?' style="color:'+col+'"':'')+'>'+v+'</div>'+
        (sub?'<div class="cs" style="color:'+(col||"var(--inkFade)")+'">'+sub+'</div>':'')+'</div>';
    }
    return cell("Equity", pfUsd(s.balance,0),
                (s.totalReturn>=0?"+":"")+pfPct(s.totalReturn,2)+" all-time",
                s.totalReturn>=0?"var(--green)":"var(--red)", "var(--gold)", true)+
      cell("Realized", pfUsdS(s.realized,0), null, s.realized>=0?"var(--green)":"var(--red)")+
      cell("Unrealized", pfUsdS(s.unrealized,0), s.open.length+" open", s.unrealized>=0?"var(--green)":"var(--red)")+
      cell("1R", pfUsd(s.R$,0), pfPct(s.riskPct,0)+" of equity", null)+
      cell("Status", status.t, s.n?s.n+" closed":"log a trade", status.c, status.c);
  }

  // ---- heat tile ----
  function pfHeatTile(s){
    var heatPct=Math.min(100,s.openRiskR/RULES.maxHeatR*100);
    var col=s.openRiskR>RULES.maxHeatR?"var(--red)":s.openRiskR>RULES.maxHeatR*0.75?"var(--amber)":"var(--green)";
    var conc=s.open.map(function(r){ return {tk:r.ticker,pct:s.balance?r.val/s.balance:0}; })
                   .sort(function(a,b){return b.pct-a.pct;});
    var over=conc.filter(function(c){return c.pct>RULES.maxPosPct;});
    if(!s.open.length) return '<div class="pf-empty-t">No open positions.<br>Zero heat.</div>';
    return '<div class="pf-gauge-v">'+
      '<div class="gnum" style="color:'+col+'">'+s.openRiskR.toFixed(2)+'R <span class="go">/ '+RULES.maxHeatR+'R</span></div>'+
      '<div class="gbar"><div class="gfill" style="width:'+heatPct+'%;background:'+col+'"></div></div>'+
      '<div class="gs">'+pfUsd(s.openRisk$,0)+' at risk'+
        (s.openRiskR>RULES.maxHeatR?' \u2014 <b style="color:var(--red)">over cap, no new entries</b>':
         ' \u00b7 room for '+Math.max(0,(RULES.maxHeatR-s.openRiskR)).toFixed(2)+'R')+'</div>'+
      '<div style="border-top:1px solid var(--line);padding-top:6px;margin-top:2px">'+
        conc.slice(0,4).map(function(c){
          var w=Math.min(100,c.pct/RULES.maxPosPct*100);
          var cc=c.pct>RULES.maxPosPct?"var(--red)":c.pct>RULES.maxPosPct*0.75?"var(--amber)":"var(--greenSoft)";
          return '<div class="pf-conc-row"><span class="ct">'+c.tk+'</span>'+
            '<div class="cbar"><div class="cfill" style="width:'+w+'%;background:'+cc+'"></div></div>'+
            '<span class="cv" style="color:'+(c.pct>RULES.maxPosPct?"var(--red)":"var(--inkMed)")+'">'+pfPct(c.pct,1)+'</span></div>';
        }).join("")+
        (over.length?'<div class="pf-warn">'+over.map(function(o){return o.tk;}).join(", ")+' over the '+(RULES.maxPosPct*100)+'% cap</div>':'')+
      '</div>'+
    '</div>';
  }

  // ---- streak tile ----
  function pfStreakTile(s){
    var col=s.coolActive?"var(--red)":s.curStreak>=RULES.coolOff-2?"var(--amber)":"var(--ink)";
    var sub=s.coolActive?'<b style="color:var(--red)">Cool-off active \u2014 '+s.coolRemaining+'d left. No new entries.</b>':
            s.coolServed?'Cool-off served \u2014 resume with one reduced-size probe, not a full push.':
            s.curStreak===0?'No active streak \u00b7 worst was '+s.maxstrk:
            s.curStreak+' in a row \u00b7 '+(RULES.coolOff-s.curStreak)+' more triggers a '+RULES.coolOffDays+'d stand-down';
    return '<div class="pf-gauge-v">'+
      '<div class="gnum" style="color:'+col+'">'+s.curStreak+' <span class="go">/ '+RULES.coolOff+'</span></div>'+
      '<div class="gbar"><div class="gfill" style="width:'+Math.min(100,s.curStreak/RULES.coolOff*100)+'%;background:'+
        (s.coolActive?"var(--red)":s.curStreak>=RULES.coolOff-2?"var(--amber)":"var(--greenSoft)")+'"></div></div>'+
      '<div class="gs">'+sub+'</div>'+
      (s.n?'<div style="border-top:1px solid var(--line);padding-top:6px;margin-top:2px" class="gs">'+
        'Worst streak <b>'+s.maxstrk+'</b> \u00b7 max drawdown <b style="color:var(--red)">'+pfUsd(s.maxdd,0)+'</b>'+
        (s.daysSinceLast!=null?' \u00b7 last exit '+s.daysSinceLast+'d ago':'')+'</div>':'')+
    '</div>';
  }

  // ---- metrics tile ----
  function pfMetricsTile(s){
    if(!s.n) return '<div class="pf-empty-t">Close a trade and the expectancy equation appears here.</div>';
    function cell(k,v,c,sub){
      return '<div class="pf-m"><div class="mk">'+k+'</div><div class="mv"'+(c?' style="color:'+c+'"':'')+'>'+v+'</div>'+
             (sub?'<div class="ms">'+sub+'</div>':'')+'</div>';
    }
    var edge=s.wr>=s.beWR;
    return '<div class="pf-mgrid">'+
        cell("Exp $", pfUsdS(s.expD,0), s.expD>=0?"var(--green)":"var(--red)", "per trade")+
        cell("Exp R", pfRS(s.expR), s.expR>=0?"var(--green)":"var(--red)", "risk-adj")+
        cell("Win rate", pfPct(s.wr,0), edge?"var(--green)":"var(--red)", "need "+pfPct(s.beWR,0))+
        cell("Payoff", pfXN(s.payoff), s.payoff>=s.reqPayoff?"var(--green)":"var(--red)", "need "+pfXN(s.reqPayoff))+
        cell("Profit f.", s.pf?s.pf.toFixed(2):"\u2014", s.pf>=1?"var(--green)":"var(--red)")+
        cell("Avg win", pfUsd(s.aw,0), "var(--green)")+
        cell("Avg loss", pfUsd(s.al,0), "var(--red)")+
        cell("Max DD", pfUsd(s.maxdd,0), "var(--red)")+
        cell("Worst run", s.maxstrk+"", s.maxstrk>=RULES.coolOff?"var(--red)":"var(--ink)")+
        cell("Stops broke", s.losersBeyond1R+"/"+s.L.length, s.losersBeyond1R?"var(--red)":"var(--green)", "past \u22121R")+
      '</div>'+
      '<p class="pf-prose" style="margin-top:8px;padding-top:7px;border-top:1px solid var(--line)">'+
        (edge
          ? 'Clears breakeven on both axes. Win rate <b>'+pfPct(s.wr,1)+'</b> against the <b>'+pfPct(s.beWR,1)+'</b> your payoff demands.'
          : 'At <b>'+pfPct(s.wr,1)+'</b> the payoff needed to break even is <b style="color:var(--amber)">'+pfXN(s.reqPayoff)+'</b>, above the <b>'+pfXN(s.payoff)+'</b> extracted \u2014 <b>a deficit on both sides</b>.')+
        (s.losersBeyond1R>0?' Hold every loss to \u2264\u22121R \u2014 <b>'+s.losersBeyond1R+'</b> breached the stop.':'')+
      '</p>';
  }

  function pfDrawEquity(s){
    var el=document.getElementById("pfPlot"); if(!el) return;
    if(s.n<2){ el.innerHTML='<div class="pf-empty-t">Two closed trades draws the curve.</div>'; return; }
    var x=s.seq.map(function(_v,i){return i;});
    Plotly.newPlot("pfPlot",[
      {x:x,y:s.pk,type:"scatter",mode:"lines",line:{color:"rgba(166,124,0,.35)",width:1,dash:"dot"},hoverinfo:"skip"},
      {x:x,y:s.seq,type:"scatter",mode:"lines+markers",
       line:{color:s.realized>=0?"#2D8A55":"#B03030",width:2},
       marker:{size:3,color:s.realized>=0?"#2D8A55":"#B03030"},
       hovertemplate:"trade %{x}<br>$%{y:,.0f}<extra></extra>"}
    ],{
      paper_bgcolor:"rgba(0,0,0,0)",plot_bgcolor:"rgba(0,0,0,0)",
      margin:{l:42,r:8,t:4,b:20},showlegend:false,
      font:{family:"'Courier New',monospace",size:8,color:"#6B6347"},
      xaxis:{gridcolor:"rgba(0,0,0,.04)",zeroline:false},
      yaxis:{gridcolor:"rgba(0,0,0,.05)",zeroline:true,zerolinecolor:"rgba(0,0,0,.15)",tickprefix:"$"}
    },{displayModeBar:false,responsive:true});
  }

  // ---- THE COUNCIL (five lenses, ported) ----
  // Split into two tiles: the five lenses, and the Chairman's synthesis.
  // Both compute from the same numbers — pfLenses() does the work once.
  function pfLenses(s){

    var risks=s.closed.map(function(r){return r.risk;}).filter(function(x){return x>0;});
    var medR=pfMed(risks), maxAll=risks.length?Math.max.apply(null,risks):0;
    var normal=risks.filter(function(r){return r<=medR*5;});
    var minR=normal.length?Math.min.apply(null,normal):0, maxR=normal.length?Math.max.apply(null,normal):0;
    var spread=minR>0?maxR/minR:1, hadOutlier=maxAll>medR*5;
    var stopsHeld=s.L.length-s.losersBeyond1R, flatTotal=s.expR*s.n*s.R$;
    var notes=s.recs.map(function(r){return (r.reason||"").toLowerCase();});
    function cnt(re){ return notes.filter(function(t){return re.test(t);}).length; }
    var movedStops=cnt(/moved .*sl|moved the sl|previous day|once in profit|moved up sl|trail/);
    var reEntries=cnt(/re ?entered|bad trade|wrong .*siz|wrong entry/);
    var badEntries=cnt(/at the top|low volume|early entry|double top|extended|wrong timing|resistance/);

    var qua='Risk-adjusted, the book is <b style="color:'+(s.expR>=0?"var(--green)":"var(--red)")+'">'+pfRS(s.expR)+'</b> per trade \u2014 '+
      (Math.abs(s.expR)<0.15?'essentially flat':(s.expR>=0?'mildly positive':'negative'))+
      ' \u2014 yet in dollars it\'s <b style="color:'+(s.realized>=0?"var(--green)":"var(--red)")+'">'+pfUsdS(s.realized)+'</b>.';
    if(risks.length>1 && spread>1.2){
      qua+=' The gap is <b>sizing</b>: risk ran <b>'+pfUsd(minR)+'</b>\u2013<b>'+pfUsd(maxR)+'</b>, a <b>'+spread.toFixed(1)+'\u00d7</b> spread'+
        (hadOutlier?', and once ballooned past <b>'+pfUsd(maxAll,0)+'</b> on a sizing slip':'')+
        ' \u2014 heavy bets on losers, light ones on winners. Hold risk at one constant 1R and the <i>same</i> '+s.n+
        ' trades net about <b style="color:'+(flatTotal>=0?"var(--green)":"var(--red)")+'">'+pfUsdS(flatTotal)+'</b>.';
    } else if(risks.length){
      qua+=' Sizing is <b>consistent</b> ('+spread.toFixed(1)+'\u00d7 spread) \u2014 the dollar result reflects the edge, not position-size luck.';
    }
    qua+=' Profit factor '+(s.pf?s.pf.toFixed(2):"\u2014")+', deepest drawdown '+pfUsd(s.maxdd)+
         ' \u2014 '+(Math.abs(s.maxdd)<s.balance*0.15?'survivable':'heavy')+'.';

    var exo='Stops held: <b>'+stopsHeld+' of '+s.L.length+'</b> losses came in at \u22121R or tighter'+
      (stopsHeld===s.L.length&&s.L.length>0?' \u2014 you honored the line, and most can\'t.':'.');
    if(movedStops>0) exo+=' The damage is upstream: roughly <b>'+movedStops+'</b> winner'+(movedStops===1?' was':'s were')+
      ' choked by stops yanked to "yesterday\'s close," banking +1R where +3R waited.';
    if(reEntries>0) exo+=' Add <b>'+reEntries+'</b> re-entry / sizing botch'+(reEntries>1?'es':'')+'.';
    exo+=' '+(movedStops>0?'It\'s not a risk problem \u2014 it\'s a <b>winner-management</b> problem.':'Clean the execution and the math follows.');

    var con='The room will tell you to let winners run \u2014 look harder.';
    if(badEntries>0) con+=' Your losers cluster at <b>resistance and double tops</b> ('+badEntries+' flagged): you feed the \u22121R machine at the <i>entry</i>, and the exit is just where the bill lands.';
    con+= s.wr<s.beWR
      ? ' And the win rate you trust, <b>'+pfPct(s.wr,0)+'</b>, sits <b>below</b> your <b>'+pfPct(s.beWR,0)+'</b> breakeven \u2014 a liability in an asset\'s clothes.'
      : ' And don\'t lean too hard on a <b>'+pfPct(s.wr,0)+'</b> win rate \u2014 one bad cluster and it flips.';
    con+=' Fix where you <i>buy</i> before you agonise over where you sell.';

    var out='Step back: this is <b>'+s.n+' closed trade'+(s.n===1?'':'s')+'</b>'+(s.n<30?' \u2014 barely a long weekend of data \u2014':'')+
      ' in one strategy and one regime.';
    out+= s.n<30
      ? ' A stranger sees <b>noise</b>, not a verdict. The real danger isn\'t the '+pfUsdS(s.realized)+
        ' \u2014 it\'s <b>over-fitting lessons to a coin-flip sample</b> and scaling on a conclusion you haven\'t earned.'
      : ' Respectable now \u2014 but still one method in one market. Don\'t mistake a kind regime for a permanent edge.';

    var psy;
    if(movedStops>0){
      psy='Your own notes draw it: you <b>can\'t sit with an open winner</b>. You lift the stop to feel safe, get tagged on routine noise, then watch the move finish without you. '+
          'That\'s <b>anxiety management</b>, not trade management.'+
          (reEntries>0?' The re-entries say the same \u2014 acting to ease discomfort, not to express an edge.':'')+
          ' The skill to build here isn\'t analytical \u2014 it\'s <b>tolerating an unrealised gain</b>.';
    } else {
      psy='Watch for <b>activity as comfort</b>: '+
          (badEntries>0?badEntries+' entries into resistance or extended moves read as impatience to be <i>in</i>':
           'trades taken to feel busy rather than to express an edge')+
          '. The edge here is <b>waiting</b> for the clean setup, not watching more screens.';
    }

    return {qua:qua,exo:exo,con:con,out:out,psy:psy,
            spread:spread,movedStops:movedStops,badEntries:badEntries,reEntries:reEntries};
  }

  function pfCouncilTile(s){
    if(!s.n) return '<div class="pf-empty-t">The council convenes once there are closed trades to weigh.</div>';
    var L=pfLenses(s);
    var M=[["I","The Quant","Risk &amp; survival",L.qua],
           ["II","The Executioner","Discipline",L.exo],
           ["III","The Contrarian","The dissent",L.con],
           ["IV","The Outsider","Fresh eyes",L.out],
           ["V","The Psychologist","Behaviour",L.psy,"wide"]];
    return '<div class="pf-council-scroll">'+
      M.map(function(m){
        return '<div class="pf-cm'+(m[4]?' wide':'')+'">'+
          '<div class="cm-h"><span class="cm-seal">'+m[0]+'</span><span class="cm-name">'+m[1]+'</span>'+
            '<span class="cm-role">'+m[2]+'</span></div>'+
          '<div class="cm-b">'+m[3]+'</div></div>';
      }).join("")+'</div>';
  }

  function pfChairTile(s){
    if(!s.n) return '<div class="pf-empty-t">The ruling follows the evidence.<br>Log a closed trade.</div>';
    var L=pfLenses(s);
    var ruling = s.expD>=0
      ? 'the book is green \u2014 but the Outsider is right that '+s.n+' trades can\'t yet confirm it. Bank the discipline, hold size, let the sample grow.'
      : 'the deficit is real but <b>mechanical and self-inflicted</b>, not a dead strategy.';
    return '<div class="ch-b">'+
      '<p>The Quant and the Executioner converge on the mechanics'+
        (L.spread>1.2?' \u2014 <b>inconsistent sizing</b>':'')+
        (L.movedStops>0?' and a <b>trail pulled far too tight</b>':'')+
        ' \u2014 on a book that, risk-adjusted, is '+
        (Math.abs(s.expR)<0.15?'roughly breakeven':(s.expR>=0?'positive':'negative'))+
        ' ('+pfRS(s.expR)+'/trade). '+
        (L.movedStops>0?'The Psychologist supplies the <i>why</i>: those tight trails are discomfort management, not strategy. ':'')+
        (L.badEntries>0?'The Contrarian widens it \u2014 the losses begin at <b>weak entries</b>, so exits aren\'t the whole tale. ':'')+
        'And the Outsider keeps us honest: at <b>'+s.n+' trade'+(s.n===1?'':'s')+'</b>, none of this is yet proven.</p>'+
      '<p><b>The ruling:</b> '+ruling+' Act first on the free, controllable fixes \u2014 <b>size every trade to the same 1R</b>'+
        (L.movedStops>0?', then <b>loosen the trail</b> so winners reach structure':'')+
        '. '+(L.badEntries>0?'Take the Contrarian\'s point and <b>sharpen entries</b>. ':'')+
        (s.n<30?'But obey the Outsider: <b>keep size small until 30+ trades confirm the edge</b>. ':'')+
        'Order of operations \u2014 sizing, trailing, selection. The rest is patience.</p>'+
    '</div>';
  }

  // ================= TRADES (Plan / Open / History) =================
  // ONE data model for a stock's whole life:
  //   status "plan"   -> an idea OR a ready trade. Both live in the Plan tab.
  //                      "ready" = has entry+stop+target. "idea" = still being studied.
  //   status "open"   -> live position
  //   status "closed" -> exited, for review
  // The detail page serves BOTH jobs: chart + financials + thesis (old Research)
  // AND entry/stop/target/RR/sizing (the plan). Same page, one place.
  //
  // Charts fetch LIVE from Yahoo on click — no engine dependency, no research.json,
  // no waiting for a cron run. research_data.json only enriches (summary/financials/
  // ratings/earnings) when present.
  // Persisted to localStorage so plans survive reloads. Export writes trades_log.json.

  var TRADES_HTML =
    '<div class="trades-wrap">'+
      '<div class="trades-tabs" id="trTabs">'+
        '<div class="tr-tab active" data-tab="plan">Plan<span class="tr-cnt" id="trCntPlan">0</span></div>'+
        '<div class="tr-tab" data-tab="open">Open<span class="tr-cnt" id="trCntOpen">0</span></div>'+
        '<div class="tr-tab" data-tab="closed">History<span class="tr-cnt" id="trCntClosed">0</span></div>'+
        '<button class="tr-exp-btn" id="trExportBtn">Export</button>'+
      '</div>'+
      '<div class="trades-body" id="trBody"></div>'+
      '<button class="tr-add-btn" id="trAddBtn" title="Add ticker">+</button>'+
    '</div>';

  var trLog = null;            // the single list of {id,status,ticker,...}
  var trTab = "plan";
  var trModalOpen = false;
  var trPrices = {};           // {ticker: last} live prices this session
  var trCoach = {};            // {id: html} coaching generated this session
  var TR_KEY = "phoenix_trades_v1";

  // ---------- persistence ----------
  // MERGE localStorage with the committed file — don't pick one.
  //
  // The old version returned early the moment localStorage had anything, so
  // trades_log.json was only ever read on a virgin browser. Create one trade and
  // the seed file became permanently unreachable: 31 imported trades invisible,
  // forever, with no error.
  //
  // Now: the committed file seeds anything you don't already have, and your own
  // edits always win (an imported row you corrected stays corrected). Merge by
  // id first, then by content signature so a re-import can't duplicate a trade
  // whose id changed.
  function trSig(t){
    return [t.ticker,t.account||"",t.entry_date||"",t.entry||"",t.qty||""].join("|");
  }
  function trLoad(cb){
    if(trLog!==null){ cb(); return; }
    var local=[];
    try{
      var s=localStorage.getItem(TR_KEY);
      if(s) local=JSON.parse(s)||[];
    }catch(e){ local=[]; }

    getJSON("trades_log")
      .then(function(d){ return (d&&Array.isArray(d.trades))?d.trades:[]; })
      .catch(function(){ return []; })
      .then(function(seed){
        var byId={}, bySig={};
        local.forEach(function(t){ byId[t.id]=t; bySig[trSig(t)]=t; });
        var added=0;
        seed.forEach(function(t){
          if(byId[t.id] || bySig[trSig(t)]) return;   // yours wins
          local.push(t); byId[t.id]=t; bySig[trSig(t)]=t; added++;
        });
        trLog=local;
        trFixIds();
        if(added){ trSave(); console.log("[trades] seeded "+added+" from trades_log.json"); }
        cb();
      });
  }
  function trFixIds(){ (trLog||[]).forEach(function(t,i){ if(!t.id) t.id=trNewId()+"_"+i; }); }
  function trSave(){ try{ localStorage.setItem(TR_KEY, JSON.stringify(trLog)); }catch(e){} }
  function trNewId(){ return "tr_"+Date.now()+"_"+Math.floor(Math.random()*9999); }
  function trExport(){
    var blob=new Blob([JSON.stringify({trades:trLog||[]},null,1)],{type:"application/json"});
    var u=URL.createObjectURL(blob);
    var a=document.createElement("a"); a.href=u; a.download="trades_log.json"; a.click();
    setTimeout(function(){URL.revokeObjectURL(u);},1200);
  }

  // ---------- queries ----------
  function trGet(id){ return (trLog||[]).filter(function(t){return t.id===id;})[0]; }
  function trByStatus(s){ return (trLog||[]).filter(function(t){return t.status===s;}); }
  function trIsReady(t){ return !!(t.entry && t.stop && t.target); }
  function trHas(tk){ return (trLog||[]).some(function(t){return t.ticker===tk;}); }
  function trHasReady(tk){ return (trLog||[]).some(function(t){return t.ticker===tk && (t.status==="open" || (t.status==="plan" && trIsReady(t)));}); }

  // ---------- screener entry points ----------
  // R button: drop it in Plan as an idea (no levels needed) — the old "Research" action
  function trAddIdea(stock){
    trLoad(function(){
      if(trHas(stock.ticker)) return;   // already tracked
      trLog.push({
        id:trNewId(), status:"plan", ticker:stock.ticker,
        name:stock.name||"", industry:stock.industry||"",
        setup:"", entry:null, stop:null, target:null, qty:null, thesis:"",
        plan_date:new Date().toISOString().slice(0,10),
        // tag with the active book so it can't leak into the other one
        account:(typeof pfCfg!=="undefined"&&pfCfg.active)||"gabriel",
        account_size:(typeof pfAcct==="function"?pfAcct().startingBalance:2000),
        trade_score:stock.trade_score||null, invest_score:stock.invest_score||null,
      });
      trSave();
    });
  }
  // T button: open the plan modal pre-filled from engine levels — a ready trade
  function trPlanFromStock(stock){
    trLoad(function(){
      var L=stock.levels||{};
      var entry=L.last||null, stop=L.support||null;
      var target=null;
      if(L.resistance && L.last && L.resistance>L.last) target=+(L.resistance+(L.resistance-L.last)*0.5).toFixed(2);
      else if(L.resistance) target=L.resistance;
      trPromptPlan({
        ticker:stock.ticker, name:stock.name||"", industry:stock.industry||"",
        setup:stock.breakout?"Breakout":"Screener pick",
        entry:entry, stop:stop, target:target,
        trade_score:stock.trade_score||null, invest_score:stock.invest_score||null,
      });
    });
  }

  // ---------- arithmetic (pure) ----------
  function trCalc(t, cur){
    var entry=+t.entry||0, stop=+t.stop||0, target=+t.target||0, qty=+t.qty||0;
    cur=(cur!=null)?+cur:null;
    var riskSh=(entry>0&&stop>0)?Math.abs(entry-stop):null;
    var rewSh=(entry>0&&target>0)?Math.abs(target-entry):null;
    var rr=(riskSh&&rewSh&&riskSh>0)?rewSh/riskSh:null;
    var pnl=null,pnlPct=null;
    if(cur!==null&&entry>0&&qty>0){ pnl=(cur-entry)*qty; pnlPct=(cur-entry)/entry*100; }
    var distStop=(cur!==null&&stop>0)?(cur-stop)/cur*100:null;
    var distTarget=(cur!==null&&target>0)?(target-cur)/cur*100:null;
    var planPct=null;
    if(cur!==null&&entry>0&&target>0&&Math.abs(target-entry)>0)
      planPct=Math.min(100,Math.max(-50,(cur-entry)/(target-entry)*100));
    var acct=+(t.account_size||100000), sugQty=null, riskAmt=null;
    if(riskSh&&riskSh>0){ riskAmt=acct*0.01; sugQty=Math.floor(riskAmt/riskSh); }
    return {rr:rr,pnl:pnl,pnlPct:pnlPct,distStop:distStop,distTarget:distTarget,
            planPct:planPct,sugQty:sugQty,riskSh:riskSh,riskAmt:riskAmt};
  }

  // ---------- live price ----------
  // Prices come from the engine, in priority order:
  //   1. this session's chart file (last daily close)
  //   2. research_data.json quote (top ~150 names)
  //   3. stocks.json levels.last (every screener candidate)
  // There is no client-side live price — the browser cannot call Yahoo (CORS).
  // Freshness is whatever the last engine run captured.
  function trFetchPrice(tk, cb){
    if(trPrices[tk]!=null){ cb(trPrices[tk]); return; }
    dpEnsureEnrich(function(){
      var p=null;
      var e=(dpEnrich&&dpEnrich[tk])||null;
      if(e && e.quote && e.quote.last!=null) p=e.quote.last;
      if(p==null && scrData){
        var s=scrData.filter(function(x){return x.ticker===tk;})[0];
        if(s&&s.levels&&s.levels.last!=null) p=s.levels.last;
      }
      if(p!=null){ trPrices[tk]=p; cb(p); return; }
      // last resort: the chart file (only for tickers we actually open)
      if(dpChartCache[tk]){
        var q=dpChartCache[tk].quote||{};
        if(q.last!=null){ trPrices[tk]=q.last; cb(q.last); return; }
      }
      cb(null);
    });
  }
  function trFetchAll(list, done){
    if(!list.length){ done(); return; }
    // one enrichment load covers every ticker — no per-ticker network at all
    dpEnsureEnrich(function(){
      var pending=list.length;
      list.forEach(function(t){ trFetchPrice(t.ticker,function(){ if(!--pending) done(); }); });
    });
  }

  // ---------- formatters ----------
  function trPx(v){ return v==null?"\u2014":Number(v).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}); }
  function trPnl(v){ if(v==null)return"\u2014"; return (v>=0?"+":"-")+"$"+Math.abs(v).toLocaleString(undefined,{maximumFractionDigits:0}); }
  function trPct(v,d){ if(v==null)return"\u2014"; return (v>=0?"+":"")+v.toFixed(d!=null?d:1)+"%"; }
  function trCol(v){ return v==null?"var(--inkFade)":(v>=0?"var(--green)":"var(--red)"); }

  // Earnings flag for list rows. Uses whatever fin files we've already loaded —
  // Plan/Open rows preload them so the flag shows without opening the ticker.
  function trEarnFlag(tk){
    var fd=dpFinCache[tk];
    if(!fd) return "";
    if(fd.fresh_earnings) return '<span class="earn-flag">\u2726 NEW</span>';
    if(fd.next_earnings){
      var d=Math.round((new Date(fd.next_earnings+"T00:00:00")-new Date())/86400000);
      if(d>=0&&d<=7) return '<span class="earn-flag" style="background:var(--amber)">'+(d===0?"TODAY":d+"D")+'</span>';
    }
    return "";
  }

  // Preload fin files for the tickers on screen so earnings flags appear in the
  // list. ~1.8KB each, cached for the session, capped so we don't hammer Pages.
  function trPreloadFin(list, done){
    var todo=list.filter(function(t){ return !dpFinCache[t.ticker] && !dpFinMiss[t.ticker]; }).slice(0,40);
    if(!todo.length){ done&&done(); return; }
    var pending=todo.length;
    todo.forEach(function(t){
      dpLoadFin(t.ticker, function(){ if(!--pending){ done&&done(); } });
    });
  }

  // ---------- summary ----------
  function trSummaryHTML(){
    var open=trByStatus("open"), plans=trByStatus("plan"), closed=trByStatus("closed");
    var ready=plans.filter(trIsReady).length;
    var pnlOpen=0, hasOpen=false;
    open.forEach(function(t){
      var c=trCalc(t,trPrices[t.ticker]);
      if(c.pnl!=null){ pnlOpen+=c.pnl; hasOpen=true; }
    });
    var realized=0, wins=0;
    closed.forEach(function(t){
      if(t.exit_price&&t.entry&&t.qty){ var p=(t.exit_price-t.entry)*t.qty; realized+=p; if(p>0) wins++; }
    });
    var wr=closed.length?Math.round(wins/closed.length*100):null;
    return '<div class="tr-summary-bar">'+
      '<div class="tr-sum-cell"><div class="sk">Open P&L</div><div class="sv" style="color:'+(hasOpen?trCol(pnlOpen):"var(--inkFade)")+'">'+(hasOpen?trPnl(pnlOpen):"\u2014")+'</div></div>'+
      '<div class="tr-sum-cell"><div class="sk">Positions</div><div class="sv" style="color:var(--green)">'+open.length+'</div></div>'+
      '<div class="tr-sum-cell"><div class="sk">Ready / Ideas</div><div class="sv"><span style="color:var(--gold)">'+ready+'</span><span style="color:var(--inkGhost);font-size:11px"> / '+(plans.length-ready)+'</span></div></div>'+
      '<div class="tr-sum-cell"><div class="sk">Realized \u00B7 Win%</div><div class="sv" style="font-size:12px"><span style="color:'+trCol(realized)+'">'+trPnl(realized)+'</span><span style="color:var(--inkFade)"> \u00B7 '+(wr!=null?wr+"%":"\u2014")+'</span></div></div>'+
    '</div>';
  }

  // ---------- PLAN tab: ready-to-fire section + ideas section ----------
  function trRenderPlan(){
    var plans=trByStatus("plan");
    if(!plans.length)
      return '<div class="tr-empty">Nothing in the plan yet.<span>Tap + to add a ticker, or use <b>R</b> (study it) / <b>T</b> (plan a trade) in the Screener.</span></div>';
    var ready=plans.filter(trIsReady);
    var ideas=plans.filter(function(t){return !trIsReady(t);});
    var html="";
    if(ready.length){
      html+='<div class="tr-sect ready">Ready to fire<span class="n">'+ready.length+'</span></div>';
      html+=ready.map(trPlanCard).join("");
    }
    if(ideas.length){
      html+='<div class="tr-sect idea" style="margin-top:'+(ready.length?"14px":"4px")+'">Ideas \u00B7 needs levels<span class="n">'+ideas.length+'</span></div>';
      html+=ideas.map(trPlanCard).join("");
    }
    return html;
  }

  function trPlanCard(t){
    var ready=trIsReady(t);
    var cur=trPrices[t.ticker], calc=trCalc(t,cur);
    var missing=[];
    if(!t.entry) missing.push("entry");
    if(!t.stop) missing.push("stop");
    if(!t.target) missing.push("target");
    function cell(k,v,color,isEmpty){
      return '<div class="tr-cell'+(isEmpty?' miss':'')+'"><div class="ck">'+k+'</div>'+
             '<div class="cv'+(isEmpty?' empty':'')+'"'+(color&&!isEmpty?' style="color:'+color+'"':'')+'>'+v+'</div></div>';
    }
    return '<div class="tr-card '+(ready?'ready-c':'idea-c')+'" data-id="'+t.id+'">'+
      '<div class="tr-head" data-action="detail" data-id="'+t.id+'">'+
        '<span class="tr-tk">'+t.ticker+'<span class="arrow">\u2192</span></span>'+
        '<span class="tr-name">'+(t.name||t.industry||"")+'</span>'+
        trEarnFlag(t.ticker)+
        '<span class="tr-chip '+(ready?'chip-ready':'chip-idea')+'">'+(ready?'READY':'IDEA')+'</span>'+
      '</div>'+
      (missing.length?'<div class="tr-needs">Needs '+missing.join(" \u00B7 ")+' \u2014 open it to study the chart and set levels.</div>':'')+
      '<div class="tr-grid">'+
        cell("Entry", t.entry?trPx(t.entry):"set", null, !t.entry)+
        cell("Current", cur!=null?trPx(cur):"\u21BB", null, cur==null)+
        cell("Stop", t.stop?trPx(t.stop):"set", "var(--red)", !t.stop)+
        cell("Target", t.target?trPx(t.target):"set", "var(--green)", !t.target)+
        cell("R/R", calc.rr!=null?calc.rr.toFixed(1)+"R":"\u2014", (calc.rr>=2?"var(--green)":calc.rr!=null?"var(--amber)":null), calc.rr==null)+
        cell("Size", calc.sugQty!=null?calc.sugQty+" sh":"\u2014", null, calc.sugQty==null)+
        cell("T / I", (t.trade_score!=null?t.trade_score:"\u2014")+" / "+(t.invest_score!=null?t.invest_score:"\u2014"), null, t.trade_score==null)+
        cell("Added", t.plan_date||"\u2014", null, false)+
      '</div>'+
      (t.thesis?'<div class="tr-thesis-text">'+truncate(t.thesis,150)+'</div>':'')+
      '<div class="tr-actions">'+
        (ready?'<button class="tr-btn primary" data-action="open" data-id="'+t.id+'">Open trade \u2192</button>':
               '<button class="tr-btn primary" data-action="edit" data-id="'+t.id+'">Set levels</button>')+
        '<button class="tr-btn" data-action="detail" data-id="'+t.id+'">\u29C8 Chart &amp; thesis</button>'+
        '<button class="tr-btn" data-action="refresh" data-id="'+t.id+'">\u21BB</button>'+
        (ready?'<button class="tr-btn" data-action="edit" data-id="'+t.id+'">Edit</button>':'')+
        '<button class="tr-btn danger" data-action="delete" data-id="'+t.id+'">Remove</button>'+
      '</div>'+
    '</div>';
  }

  // ---------- OPEN tab ----------
  function trRenderOpen(){
    var open=trByStatus("open");
    if(!open.length) return '<div class="tr-empty">No open positions.<span>Open a ready plan to track live P&L and get coaching.</span></div>';
    return open.map(function(t){
      var cur=trPrices[t.ticker], calc=trCalc(t,cur);
      var barW=calc.planPct!=null?Math.max(0,Math.min(100,calc.planPct)):0;
      var barCol=(calc.pnl!=null&&calc.pnl<0)?"var(--redSoft)":"var(--greenSoft)";
      var coach=trCoach[t.id];
      function cell(k,v,color){
        return '<div class="tr-cell"><div class="ck">'+k+'</div><div class="cv"'+(color?' style="color:'+color+'"':'')+'>'+v+'</div></div>';
      }
      return '<div class="tr-card open-c" data-id="'+t.id+'">'+
        '<div class="tr-head" data-action="detail" data-id="'+t.id+'">'+
          '<span class="tr-tk">'+t.ticker+'<span class="arrow">\u2192</span></span>'+
          '<span class="tr-name">'+(t.name||t.industry||"")+'</span>'+
          trEarnFlag(t.ticker)+
          '<span class="tr-chip chip-open">OPEN</span>'+
        '</div>'+
        '<div class="tr-grid">'+
          cell("Entry", trPx(t.entry))+
          cell("Current", cur!=null?trPx(cur):"\u2014", cur!=null?"var(--ink)":"var(--inkFade)")+
          cell("P&L $", trPnl(calc.pnl), trCol(calc.pnl))+
          cell("P&L %", trPct(calc.pnlPct), trCol(calc.pnlPct))+
          cell("Stop", trPx(t.stop), "var(--red)")+
          cell("Target", trPx(t.target), "var(--green)")+
          cell("Dist stop", trPct(calc.distStop))+
          cell("Dist target", trPct(calc.distTarget))+
          cell("R/R", calc.rr!=null?calc.rr.toFixed(1)+"R":"\u2014")+
          cell("Qty", t.qty||"\u2014")+
          cell("Entered", t.entry_date||"\u2014")+
          cell("Setup", t.setup||"\u2014")+
        '</div>'+
        (calc.planPct!=null?
          '<div class="tr-progress-wrap"><div class="tr-prog-label">'+Math.round(calc.planPct)+'% of plan complete</div>'+
          '<div class="tr-progress"><div class="tr-progress-bar" style="width:'+barW+'%;background:'+barCol+'"></div></div></div>':'')+
        (t.thesis?'<div class="tr-thesis-text">'+truncate(t.thesis,150)+'</div>':'')+
        '<div class="tr-actions">'+

          '<button class="tr-btn" data-action="detail" data-id="'+t.id+'">\u29C8 Chart</button>'+
          '<button class="tr-btn" data-action="refresh" data-id="'+t.id+'">\u21BB</button>'+
          '<button class="tr-btn coaching" data-action="coach" data-id="'+t.id+'">'+(coach?"Hide coaching":"AI Coaching")+'</button>'+
          '<button class="tr-btn" data-action="edit" data-id="'+t.id+'">Edit</button>'+
        '</div>'+
        (coach?'<div class="tr-coaching">'+coach+'</div>':'')+
      '</div>';
    }).join("");
  }

  // ---------- HISTORY tab ----------
  function trRenderClosed(){
    var closed=trByStatus("closed").slice().sort(function(a,b){ return (b.exit_date||"")>(a.exit_date||"")?1:-1; });
    if(!closed.length) return '<div class="tr-empty">No closed trades yet.<span>Exited positions land here for review.</span></div>';
    return closed.map(function(t){
      var real=(t.exit_price&&t.entry&&t.qty)?(t.exit_price-t.entry)*t.qty:null;
      var pct=(t.exit_price&&t.entry)?((t.exit_price-t.entry)/t.entry*100):null;
      var win=real!=null&&real>0, loss=real!=null&&real<0;
      var calc=trCalc(t,null);
      // R multiple actually achieved
      var rMult=null;
      if(calc.riskSh&&t.exit_price&&t.entry) rMult=(t.exit_price-t.entry)/calc.riskSh;
      function cell(k,v,color){
        return '<div class="tr-cell"><div class="ck">'+k+'</div><div class="cv"'+(color?' style="color:'+color+'"':'')+'>'+v+'</div></div>';
      }
      return '<div class="tr-card closed-c '+(win?"win":loss?"loss":"")+'" data-id="'+t.id+'">'+
        '<div class="tr-head" data-action="detail" data-id="'+t.id+'">'+
          '<span class="tr-tk">'+t.ticker+'<span class="arrow">\u2192</span></span>'+
          '<span class="tr-name">'+(t.name||t.industry||"")+'</span>'+
          '<span class="tr-chip '+(win?"chip-win":loss?"chip-loss":"chip-idea")+'">'+(win?"WIN":loss?"LOSS":"CLOSED")+'</span>'+
        '</div>'+
        '<div class="tr-grid">'+
          cell("Entry", trPx(t.entry))+
          cell("Exit", trPx(t.exit_price))+
          cell("Realized", trPnl(real), trCol(real))+
          cell("Return %", trPct(pct), trCol(pct))+
          cell("R achieved", rMult!=null?(rMult>=0?"+":"")+rMult.toFixed(1)+"R":"\u2014", trCol(rMult))+
          cell("R/R planned", calc.rr!=null?calc.rr.toFixed(1)+"R":"\u2014")+
          cell("Stop was", trPx(t.stop), "var(--red)")+
          cell("Target was", trPx(t.target), "var(--green)")+
          cell("Entered", t.entry_date||"\u2014")+
          cell("Exited", t.exit_date||"\u2014")+
          cell("Setup", t.setup||"\u2014")+
          cell("Reason", t.exit_reason||"\u2014")+
        '</div>'+
        (t.exit_notes?'<div class="tr-thesis-text"><b>Review:</b> '+t.exit_notes+'</div>':'')+
        '<div class="tr-actions">'+
          '<button class="tr-btn" data-action="detail" data-id="'+t.id+'">\u29C8 Chart</button>'+
          '<button class="tr-btn" data-action="edit" data-id="'+t.id+'">Edit</button>'+
          '<button class="tr-btn danger" data-action="delete" data-id="'+t.id+'">Remove</button>'+
        '</div>'+
      '</div>';
    }).join("");
  }

  // ---------- render ----------
  function trRender(){
    var cp=document.getElementById("trCntPlan"), co=document.getElementById("trCntOpen"), cc=document.getElementById("trCntClosed");
    if(cp) cp.textContent=trByStatus("plan").length;
    if(co) co.textContent=trByStatus("open").length;
    if(cc) cc.textContent=trByStatus("closed").length;
    var body=document.getElementById("trBody"); if(!body) return;
    var content = trTab==="plan" ? trRenderPlan() : trTab==="open" ? trRenderOpen() : trRenderClosed();
    body.innerHTML=trSummaryHTML()+content;
    body.querySelectorAll("[data-action]").forEach(function(el){
      el.addEventListener("click",function(ev){
        ev.stopPropagation();
        var a=this.dataset.action, id=this.dataset.id;
        if(a==="detail") trOpenDetail(id);
        else if(a==="open") trPromptOpen(id);
        else if(a==="close") trPromptClose(id);
        else if(a==="edit") trPromptEdit(id);
        else if(a==="delete") trConfirmDelete(id);
        else if(a==="refresh") trRefresh(id);
        else if(a==="coach") trCoachGen(id,this);
      });
    });
  }

  function trRefresh(id){
    var t=trGet(id); if(!t) return;
    delete trPrices[t.ticker];
    trFetchPrice(t.ticker,function(){ trRender(); });
  }

  // ---------- AI coaching (open positions) ----------
  function trCoachGen(id,btn){
    var t=trGet(id); if(!t) return;
    if(trCoach[id]){ delete trCoach[id]; trRender(); return; }
    var cur=trPrices[t.ticker], c=trCalc(t,cur);
    var regime=(C.macro&&C.macro.regime)||"NO_CLEAR";
    btn.disabled=true; btn.textContent="Thinking\u2026";
    var prompt="You are a senior hedge fund PM coaching a trader on a live position. Be direct and specific. "+
      "Use ONLY the numbers given; never invent prices. "+
      "Ticker: "+t.ticker+(t.name?" ("+t.name+")":"")+". Setup: "+(t.setup||"breakout")+". Macro regime: "+regime+". "+
      "Entry "+trPx(t.entry)+", current "+(cur!=null?cur.toFixed(2):"unknown")+", stop "+trPx(t.stop)+", target "+trPx(t.target)+", qty "+(t.qty||"?")+". "+
      "P&L "+trPnl(c.pnl)+" ("+trPct(c.pnlPct)+"). Distance to stop "+trPct(c.distStop)+", to target "+trPct(c.distTarget)+". "+
      "Plan "+(c.planPct!=null?Math.round(c.planPct)+"% complete":"progress unknown")+". Planned R/R "+(c.rr!=null?c.rr.toFixed(1)+"R":"unknown")+". "+
      (t.thesis?"Original thesis: "+t.thesis.slice(0,200)+". ":"")+
      "Answer under these exact headers: GOOD ENTRY / THESIS INTACT / STOP / ADD OR REDUCE / TODAY'S ACTION. "+
      "Under 180 words total. Plain text, no markdown symbols.";
    fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:prompt}]})
    }).then(function(r){return r.json();}).then(function(d){
      var txt=(d.content||[]).filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("\n");
      trCoach[id]=txt.replace(/\n?(GOOD ENTRY|THESIS INTACT|STOP|ADD OR REDUCE|TODAY'S ACTION)\??:?/g,"<h5>$1</h5>");
      trRender();
    }).catch(function(e){
      trCoach[id]='<div style="color:var(--red);font-size:11px">Coaching failed ('+e.message+'). Needs the live API on the deployed site.</div>';
      trRender();
    });
  }

  // ---------- modals ----------
  function trModal(html,onOk){
    if(trModalOpen) return; trModalOpen=true;
    var bg=document.createElement("div"); bg.className="tr-modal-bg"; bg.id="trModalBg";
    bg.innerHTML='<div class="tr-modal">'+html+'</div>';
    document.body.appendChild(bg);
    bg.addEventListener("click",function(e){ if(e.target===bg) trModalClose(); });
    var ok=bg.querySelector(".ok"); if(ok) ok.addEventListener("click",function(){ onOk(bg); });
    var ca=bg.querySelector(".cancel"); if(ca) ca.addEventListener("click",trModalClose);
  }
  function trModalClose(){ var el=document.getElementById("trModalBg"); if(el) el.remove(); trModalOpen=false; }

  // Add / edit a plan (levels optional — an idea is a valid plan)
  function trPromptPlan(pre){
    pre=pre||{};
    var today=new Date().toISOString().slice(0,10);
    var isEdit=!!pre.id;
    var html='<div class="tr-modal-title">'+(isEdit?"Edit "+pre.ticker:"Add to plan")+'</div>'+
      '<div class="tr-modal-sub">Levels are optional \u2014 save it as an idea now, set entry/stop/target once you\'ve studied the chart.</div>'+

  // ================= DETAIL PAGE =================
  // Serves BOTH the old Research job (chart, financials, ratings, earnings, AI thesis)
  // AND the plan job (entry/stop/target/RR/sizing, promote to open).
  // Chart is fetched LIVE from Yahoo — never blocked on the engine.

  var trDetailTk=null, trDetailId=null, dpTf="daily";
  var dpCache={};              // {tk:{bars:{daily,weekly,monthly}, meta:{}}}
  var dpEnrich=null;           // research_data.json contents, if it exists
  var DP_TF={ daily:{range:"1y",interval:"1d"}, weekly:{range:"5y",interval:"1wk"}, monthly:{range:"10y",interval:"1mo"} };

  function dpEnsureEnrich(cb){
    var need=2, fired=false;
    function tick(){ if(--need<=0 && !fired){ fired=true; cb(); } }
    if(dpEnrich!==null) tick();
    else getJSON("research_data").then(function(d){ dpEnrich=(d&&d.tickers)||{}; tick(); })
           .catch(function(){ dpEnrich={}; tick(); });
    // stocks.json gives us levels.last for every candidate — the price fallback
    if(scrData) tick();
    else getJSON("stocks").then(function(d){ scrData=(d&&d.stocks)||[]; tick(); })
           .catch(function(){ if(!scrData) scrData=[]; tick(); });
  }

  // Bars come from the ENGINE, one small file per ticker: outputs/charts/TK.json
  // (~23KB). The browser CANNOT fetch Yahoo directly — query1.finance.yahoo.com
  // sends no Access-Control-Allow-Origin header, so any direct fetch is blocked
  // by CORS before our code sees a response. The engine bakes these nightly from
  // the BULK yf.download endpoint, so every candidate gets a chart (the old
  // per-ticker pull throttled and left most tickers empty).

  var dpChartCache={};    // {tk: {chart:{daily,weekly,monthly}, quote, range52}}
  var dpChartMiss={};     // {tk: true} — fetched and genuinely absent
  var dpFinCache={};      // {tk: {quarters:[...], mcap_B, pe, name, sector}}
  var dpFinMiss={};       // {tk: true}

  // Financials live in their own file (outputs/fin/TK.json, ~1.8KB) because
  // earnings land quarterly while prices move daily. Bundling them into chart
  // files meant rewriting identical data every run AND inheriting the chart's
  // gate-passer limit — which is why mega-caps like ASML showed nothing.
  // These cover EVERY ticker in the fundamentals CSV, gates ignored.
  function dpLoadFin(tk, cb){
    if(dpFinCache[tk]){ cb(dpFinCache[tk]); return; }
    if(dpFinMiss[tk]){ cb(null); return; }
    getJSON("fin/"+String(tk).replace(/[\/.]/g,"-"))
      .then(function(d){ dpFinCache[tk]=d; cb(d); })
      .catch(function(){ dpFinMiss[tk]=true; cb(null); });
  }

  // Rehydrate the engine's compact parallel-array encoding into bar objects.
  function dpExpand(c){
    if(!c) return [];
    if(Array.isArray(c)) return c;              // legacy dict-per-bar format
    var d=c.d||[], out=[];
    for(var i=0;i<d.length;i++){
      out.push({date:d[i], o:c.o[i], h:c.h[i], l:c.l[i], c:c.c[i], v:c.v[i]});
    }
    return out;
  }

  // Engine writes charts/TK.json (dots and slashes swapped for dashes).
  // Reuses the existing url()/getJSON helpers — same BASE, same cache-buster.
  function dpChartName(tk){
    return "charts/"+String(tk).replace(/[\/.]/g,"-");
  }

  function dpLoadChart(tk, cb){
    if(dpChartCache[tk]){ cb(dpChartCache[tk]); return; }
    if(dpChartMiss[tk]){ cb(null); return; }
    getJSON(dpChartName(tk))
      .then(function(d){
        dpChartCache[tk]=d;
        if(d && d.quote && d.quote.last!=null) trPrices[tk]=d.quote.last;
        cb(d);
      })
      .catch(function(){ dpChartMiss[tk]=true; cb(null); });
  }

  function dpFetchBars(tk,tf,cb){
    if(dpCache[tk] && dpCache[tk].bars[tf]){ cb(dpCache[tk].bars[tf]); return; }
    dpLoadChart(tk,function(d){
      if(!dpCache[tk]) dpCache[tk]={bars:{},meta:null};
      if(!d){ dpCache[tk].bars[tf]=[]; cb([]); return; }
      var bars=dpExpand(d.chart&&d.chart[tf]);
      dpCache[tk].bars[tf]=bars;
      if(!dpCache[tk].meta){
        var q=d.quote||{}, r=d.range52||{};
        var e=(dpEnrich&&dpEnrich[tk])||null;
        var p=Object.assign({},(d.profile)||{},(e&&e.profile)||{});
        var last=q.last, prev=q.prev;
        if(last==null && bars.length) last=bars[bars.length-1].c;
        if(prev==null && bars.length>1) prev=bars[bars.length-2].c;
        dpCache[tk].meta={last:last||null, prev:prev||null,
                          low52:r.low||null, high52:r.high||null,
                          exch:p.exchange||null};
        if(last!=null) trPrices[tk]=last;
      }
      cb(bars);
    });
  }

  function trOpenDetail(id){
    var t=trGet(id); if(!t) return;
    trDetailId=id; trDetailTk=t.ticker; dpTf="daily";
    var page=document.getElementById("page-trades");
    page.innerHTML='<div class="loading" style="padding:50px 20px">Loading '+t.ticker+'\u2026</div>';
    dpEnsureEnrich(function(){
      trRenderDetail(id);
      // financials and bars load in parallel — neither blocks the other
      dpLoadFin(t.ticker, function(){ trRenderDetail(id); });
      dpFetchBars(t.ticker,"daily",function(bars){
        dpDraw(t.ticker,bars,"daily");
        dpHeader(t.ticker);
        trRenderDetail(id);
      });
    });
  }

              '<span class="px" id="dpPx">'+(cur!=null?fmtN(cur):"\u2014")+'</span>'+
              '<span class="chg" id="dpChg">'+chgHtml+'</span></div>'+
            '<div class="r2"><span>'+name+'</span>'+
              (meta.exch?'<span class="exch">'+meta.exch+'</span>':'')+
              '<span>'+(p.industry||p.sector||t.industry||"")+'</span>'+statusChip+fdBadge+'</div>'+
          '</div>'+
          '<div class="dp-stats">'+
            '<div class="dp-stat"><div class="k">Mkt Cap</div><div class="v">'+(q.mcap_B!=null?capFmt(q.mcap_B):"\u2014")+'</div></div>'+
            '<div class="dp-stat"><div class="k">P/E</div><div class="v">'+(pe!=null?pe.toFixed(1):"\u2014")+'</div></div>'+
            '<div class="dp-stat"><div class="k">52wk</div><div class="v" id="dp52" style="font-size:10.5px">'+r52+'</div></div>'+
          '</div>'+
        '</div>'+
        '<div class="dp-body">'+
          '<div class="dp-left">'+
            '<div class="dp-chart-tile">'+
              '<div class="thead" style="display:flex;align-items:baseline">'+
                '<span class="tt" style="margin:0;font-family:var(--mono);font-size:9px;letter-spacing:1px;color:var(--gold);text-transform:uppercase">Price</span>'+
                '<div class="dp-seg" id="dpSeg">'+
                  '<button data-tf="daily" class="'+(dpTf==="daily"?"on":"")+'">D</button>'+
                  '<button data-tf="weekly" class="'+(dpTf==="weekly"?"on":"")+'">W</button>'+
                  '<button data-tf="monthly" class="'+(dpTf==="monthly"?"on":"")+'">M</button>'+
                '</div>'+
              '</div>'+
              '<div class="dp-chart-body"><div class="plot" id="dpPlot"><div class="loading">Fetching chart\u2026</div></div></div>'+
            '</div>'+
            '<div class="dp-lower">'+
              '<div class="dp-tile"><div class="tt">Financials</div><div class="tbody2" id="dpFin"></div></div>'+
              '<div class="dp-tile"><div class="tt">Analyst Ratings</div><div class="tbody2" id="dpRat"></div></div>'+
              '<div class="dp-tile"><div class="tt">Next Earnings</div><div class="tbody2" id="dpEarn"></div></div>'+
            '</div>'+
          '</div>'+
          '<div class="dp-right">'+planPanel+thesisPanel+'</div>'+
        '</div>'+
      '</div>';

    document.getElementById("dpBack").onclick=trBackFromDetail;
    document.getElementById("dpSeg").onclick=function(ev){
      var b=ev.target.closest("button"); if(!b) return;
      dpTf=b.dataset.tf;
      Array.prototype.forEach.call(this.querySelectorAll("button"),function(x){ x.classList.toggle("on",x===b); });
      var el=document.getElementById("dpPlot");
      if(el && !(dpCache[tk]&&dpCache[tk].bars[dpTf])) el.innerHTML='<div class="loading">Fetching\u2026</div>';
      dpFetchBars(tk,dpTf,function(bars){ dpDraw(tk,bars,dpTf); });
    };
    document.getElementById("dpThBtn").onclick=function(){ dpGenThesis(id,this); };
    page.querySelectorAll("[data-dp]").forEach(function(b){
      b.onclick=function(){
        var a=this.dataset.dp;
        if(a==="open") trPromptOpen(id);
        else if(a==="close") trPromptClose(id);
        else if(a==="edit") trPromptPlan(trGet(id));
      };
    });

    // Financials from fin/TK.json (committed, all tickers). Ratings/earnings
    // from the optional research pass. Each tile degrades on its own.
    var fdata=dpFinCache[tk]||null;
    var merged={
      financials:(fdata&&fdata.quarters)||[],
      ratings:(e&&e.ratings)||null,
      earnings:(e&&e.earnings)||{},
      profile:Object.assign({},(dpChartCache[tk]&&dpChartCache[tk].profile)||{},(e&&e.profile)||{}),
      quote:Object.assign({},(dpChartCache[tk]&&dpChartCache[tk].quote)||{},(e&&e.quote)||{}),
      pe:(e&&e.pe!=null)?e.pe:((fdata&&fdata.pe!=null)?fdata.pe:null),
    };
    dpFin(merged, tk);
    dpRat(merged, tk);
    dpEarn(merged, tk);
    // redraw chart if we already have the bars (repaint case)
    if(dpCache[tk]&&dpCache[tk].bars[dpTf]) dpDraw(tk,dpCache[tk].bars[dpTf],dpTf);
  }

  function dpHeader(tk){
    var m=dpCache[tk]&&dpCache[tk].meta; if(!m||!m.last) return;
    var px=document.getElementById("dpPx"); if(px) px.textContent=fmtN(m.last);
    if(m.prev){
      var ch=m.last-m.prev, cp=ch/m.prev*100;
      var el=document.getElementById("dpChg");
      if(el) el.innerHTML='<span style="color:'+(ch>=0?"var(--green)":"var(--red)")+'">'+(ch>=0?"+":"")+fmtN(ch)+' ('+(cp>=0?"+":"")+cp.toFixed(2)+'%)</span>';
    }
    if(m.low52&&m.high52){
      var f=document.getElementById("dp52");
      if(f&&f.textContent==="\u2014") f.textContent=fmtN(m.low52)+" \u2013 "+fmtN(m.high52);
    }

  // Draw chart with the trade's own levels overlaid — this is the point of chart-first.
  function dpDraw(tk,bars,tf){
    var el=document.getElementById("dpPlot"); if(!el) return;
    if(!bars||!bars.length){
      var inScreener = scrData && scrData.some(function(x){return x.ticker===tk;});
      var otherTf = dpCache[tk] && Object.keys(dpCache[tk].bars).filter(function(k){
        return k!==tf && dpCache[tk].bars[k] && dpCache[tk].bars[k].length; });
      var msg;
      if(otherTf && otherTf.length){
        msg='No '+tf+' bars for '+tk+'.<div class="fix">Other timeframes have data \u2014 try '+
            otherTf.map(function(k){return k.charAt(0).toUpperCase();}).join(" or ")+'.</div>';
      } else if(inScreener){
        msg='No chart file for '+tk+' yet.<div class="fix">'+tk+' is in the screener, so the next '+
            'engine run will write <code>outputs/charts/'+tk+'.json</code>. Charts are baked by the '+
            'engine because the browser can\'t fetch Yahoo directly (CORS).</div>';
      } else {
        msg=tk+' isn\'t in the current screener universe.<div class="fix">The engine only charts '+
            'stocks that pass the gates. <b>Your trades live in this browser, so the engine can\'t '+
            'see them.</b> Hit <b>Export</b> on the Trades tab and commit <code>trades_log.json</code> '+
            'to <code>outputs/</code> \u2014 pinned tickers always get charted, even if they stop '+
            'passing the gates.</div>';
      }
      el.innerHTML='<div class="err" style="padding:14px;line-height:1.6">'+msg+'</div>';
      return;
    }
    var t=trDetailId?trGet(trDetailId):null;
    var dates=bars.map(function(b){return b.date;});
    var volc=bars.map(function(b){ return b.c>=b.o?"rgba(45,138,85,.4)":"rgba(176,48,48,.4)"; });
    var candle={type:"candlestick",x:dates,
      open:bars.map(function(b){return b.o;}), high:bars.map(function(b){return b.h;}),
      low:bars.map(function(b){return b.l;}),  close:bars.map(function(b){return b.c;}),
      increasing:{line:{color:"#2D8A55"},fillcolor:"rgba(45,138,85,.55)"},
      decreasing:{line:{color:"#B03030"},fillcolor:"rgba(176,48,48,.55)"},
      yaxis:"y",showlegend:false,name:""};
    var vol={type:"bar",x:dates,y:bars.map(function(b){return b.v;}),marker:{color:volc},yaxis:"y2",showlegend:false,hoverinfo:"skip"};
    var layout={paper_bgcolor:"rgba(0,0,0,0)",plot_bgcolor:"rgba(0,0,0,0)",margin:{l:4,r:52,t:6,b:20},
      font:{family:"'Courier New',monospace",size:9,color:"#6B6347"},showlegend:false,dragmode:"pan",
      grid:{rows:2,columns:1,roworder:"top to bottom"},
      yaxis:{domain:[0.24,1],side:"right",gridcolor:"rgba(0,0,0,.05)",fixedrange:false},
      yaxis2:{domain:[0,0.18],side:"right",gridcolor:"rgba(0,0,0,.04)",showticklabels:false,fixedrange:false},
      xaxis:{rangeslider:{visible:false},gridcolor:"rgba(0,0,0,.04)"},
      shapes:[],annotations:[]};
    if(tf==="daily") layout.xaxis.rangebreaks=[{bounds:["sat","mon"]}];
    // overlay the plan levels
    if(t){
      var L=[[t.entry,"#A67C00","Entry"],[t.stop,"#B03030","Stop"],[t.target,"#1A5C38","Target"]];
      L.forEach(function(x){
        if(!x[0]) return;
        layout.shapes.push({type:"line",xref:"paper",x0:0,x1:1,yref:"y",y0:x[0],y1:x[0],
          line:{color:x[1],width:1,dash:x[2]==="Entry"?"solid":"dot"}});
        layout.annotations.push({xref:"paper",x:1,xanchor:"left",yref:"y",y:x[0],
          text:" "+x[2]+" "+x[0],showarrow:false,
          font:{family:"'Courier New',monospace",size:8,color:x[1]}});
      });
    }
    Plotly.newPlot("dpPlot",[candle,vol],layout,{displayModeBar:false,responsive:true,scrollZoom:true,doubleClick:"reset"});
  }

  // Quarterly financials with small inline bar charts — revenue trend and margin
  // trend per quarter, which is what you actually read at a glance.
  function dpFin(e, tk){
    var fin=e.financials||[], el=document.getElementById("dpFin"); if(!el) return;
    if(!fin.length){
      el.innerHTML='<div style="font-family:var(--mono);font-size:9px;color:var(--inkFade);padding:6px;line-height:1.6">'+
        (dpFinMiss[tk]
          ? (tk||"This ticker")+' isn\'t in macroflow_fundamentals_quarterly.csv.<br><br>That file covers ~2,139 tickers. Re-export it to include this one.'
          : 'Loading financials\u2026')+'</div>';
      return;
    }
    function col(v){ return v==null?"var(--inkFade)":(v>=0?"var(--green)":"var(--red)"); }
    function pct(v,d){ return v==null?"\u2014":(v>=0?"+":"")+v.toFixed(d==null?0:d)+"%"; }
    var last=fin[fin.length-1]||{};

    // headline: the four numbers worth checking first
    var head='<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:8px">'+
      [["Rev YoY",last.rev_yoy,col(last.rev_yoy),1],
       ["Net margin",last.net_margin,col(last.net_margin),1],
       ["ROE",last.roe,col(last.roe),1],
       ["Debt/Eq",last.debt_equity,
        (last.debt_equity==null?"var(--inkFade)":(last.debt_equity<=1?"var(--green)":last.debt_equity<=2?"var(--amber)":"var(--red)")),
        null]]
      .map(function(x){
        var val = x[3]==null ? (x[1]!=null?x[1].toFixed(2):"\u2014") : pct(x[1],x[3]);
        return '<div style="background:var(--card2);border:1px solid var(--line);border-radius:4px;padding:4px 6px">'+
          '<div style="font-family:var(--mono);font-size:6.5px;color:var(--inkFade);text-transform:uppercase;letter-spacing:.3px">'+x[0]+'</div>'+
          '<div style="font-family:var(--mono);font-size:12px;font-weight:700;color:'+x[2]+'">'+val+'</div></div>';
      }).join("")+'</div>';

    // REVENUE BARS — one bar per quarter, height proportional to revenue
    var revs=fin.filter(function(f){return f.revenue_B!=null;});
    var bars="";
    if(revs.length>1){
      var mx=Math.max.apply(null,revs.map(function(f){return f.revenue_B;}));
      bars='<div style="font-family:var(--mono);font-size:7px;color:var(--inkFade);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Revenue $B \u00B7 by quarter</div>'+
        '<div style="display:flex;align-items:flex-end;gap:3px;height:44px;margin-bottom:3px">'+
        revs.map(function(f,i){
          var h=Math.max(4,(f.revenue_B/mx)*44);
          var grow=f.rev_yoy;
          var c=grow==null?"var(--inkGhost)":(grow>=0?"var(--greenSoft)":"var(--redSoft)");
          return '<div style="flex:1;display:flex;flex-direction:column;justify-content:flex-end;height:44px" title="'+f.q+': $'+f.revenue_B+'B">'+
                 '<div style="height:'+h+'px;background:'+c+';border-radius:2px 2px 0 0"></div></div>';
        }).join("")+'</div>'+
        '<div style="display:flex;gap:3px;margin-bottom:8px">'+
        revs.map(function(f){
          return '<div style="flex:1;font-family:var(--mono);font-size:6px;color:var(--inkFade);text-align:center">'+(f.q||"").slice(2,7)+'</div>';
        }).join("")+'</div>';
    }

    // MARGIN TREND — net margin per quarter as a sparkline-ish bar row
    var mgs=fin.filter(function(f){return f.net_margin!=null;});
    var mtrend="";
    if(mgs.length>1){
      var mmax=Math.max.apply(null,mgs.map(function(f){return Math.abs(f.net_margin);}));
      mtrend='<div style="font-family:var(--mono);font-size:7px;color:var(--inkFade);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Net margin % \u00B7 by quarter</div>'+
        '<div style="display:flex;align-items:flex-end;gap:3px;height:30px;margin-bottom:8px">'+
        mgs.map(function(f){
          var h=Math.max(3,(Math.abs(f.net_margin)/mmax)*30);
          return '<div style="flex:1;display:flex;flex-direction:column;justify-content:flex-end;height:30px" title="'+f.q+': '+f.net_margin+'%">'+
                 '<div style="height:'+h+'px;background:'+(f.net_margin>=0?"var(--green)":"var(--red)")+';opacity:.75;border-radius:2px 2px 0 0"></div></div>';
        }).join("")+'</div>';
    }

    // margin ladder — the shape of the business, latest quarter
    var lad="";
    var ladder=[["Gross",last.gross_margin],["Operating",last.op_margin],["EBITDA",last.ebitda_margin],["FCF",last.fcf_margin]]
               .filter(function(x){return x[1]!=null;});
    if(ladder.length){
      lad='<div style="padding-top:7px;border-top:1px solid var(--line)">'+
        '<div style="font-family:var(--mono);font-size:7px;color:var(--inkFade);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Margins \u00B7 latest qtr</div>'+
        ladder.map(function(x){
          // Negative margins are real (ASML runs negative FCF margin on heavy
          // capex quarters). Draw them from the centre leftward in red, not as
          // an invisible 0-width bar with a stray label.
          var v=Math.max(-100,Math.min(100,x[1]));
          var neg=v<0, w=Math.min(50,Math.abs(v)/2);
          return '<div style="display:flex;align-items:center;gap:5px;margin-bottom:2px">'+
            '<span style="font-family:var(--mono);font-size:7.5px;color:var(--inkLight);width:50px">'+x[0]+'</span>'+
            '<div style="flex:1;height:5px;background:var(--card2);border:1px solid var(--line);border-radius:2px;position:relative;overflow:hidden">'+
              '<div style="position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--line2)"></div>'+
              '<div style="position:absolute;top:0;bottom:0;'+
                (neg?('right:50%;'):('left:50%;'))+'width:'+w+'%;background:'+(neg?"var(--redSoft)":"var(--greenSoft)")+'"></div>'+
            '</div>'+
            '<span style="font-family:var(--mono);font-size:8px;font-weight:700;color:'+col(x[1])+';width:38px;text-align:right">'+pct(x[1],1)+'</span>'+
          '</div>';
        }).join("")+'</div>';
    }
    el.innerHTML=head+bars+mtrend+lad;
  }

  function dpRat(e, tk){
    var r=e.ratings, p=e.profile||{}, el=document.getElementById("dpRat"); if(!el) return;
    if(!r){
      var rec=p.recommendation?'<div class="rate-row"><span class="k">Consensus</span><span style="font-weight:700;text-transform:uppercase">'+p.recommendation+'</span></div>':'';
      var tg=p.target_mean?'<div class="rate-row"><span class="k">Target</span><span style="font-weight:700">'+fmtN(p.target_mean)+'</span></div>':'';
      el.innerHTML=(rec||tg)||
        '<div style="font-family:var(--mono);font-size:9px;color:var(--inkFade);padding:6px;line-height:1.6">'+
        'Analyst ratings aren\'t in any committed file \u2014 they need a per-ticker Yahoo call, '+
        'which throttles, so only the top ~150 ranked names get them.</div>';
      return;
    }
    var tot=(r.strong_buy+r.buy+r.hold+r.sell+r.strong_sell)||1;
    var segs=[["strong buy","#1A5C38",r.strong_buy],["buy","#2D8A55",r.buy],["hold","#A67C00",r.hold],["sell","#B03030",r.sell],["strong sell","#7A1E1E",r.strong_sell]];
    el.innerHTML='<div class="rate-bar">'+segs.filter(function(s){return s[2]>0;}).map(function(s){
        return '<div class="rate-seg" style="background:'+s[1]+';width:'+(s[2]/tot*100)+'%">'+(s[2]/tot>0.12?s[2]:"")+'</div>';
      }).join("")+'</div>'+
      segs.map(function(s){ return '<div class="rate-row"><span class="k">'+s[0]+'</span><span style="font-weight:700">'+s[2]+'</span></div>'; }).join("")+
      (p.target_mean?'<div class="rate-row" style="border-top:1px solid var(--line);margin-top:4px;padding-top:4px"><span class="k">Mean target</span><span style="font-weight:700;color:var(--gold)">'+fmtN(p.target_mean)+'</span></div>':'');
  }

  function dpEarn(e, tk){
    var el=document.getElementById("dpEarn"); if(!el) return;
    var fd=dpFinCache[tk]||null;
    var ee=e.earnings||{}, p=e.profile||{};
    var fin=e.financials||[];
    var out="";

    // NEXT EARNINGS — engine-tracked, refreshed as the rotation reaches each ticker
    var nd=(fd&&fd.next_earnings)||ee.next_date||null;
    if(nd){
      var dt=new Date(nd+"T00:00:00");
      var days=Math.round((dt-new Date())/86400000);
      var soon=days>=0&&days<=7, past=days<0;
      out+='<div class="earn-lbl">'+(past?"Last reported on":"Next report")+'</div>'+
        '<div class="earn-big" style="'+(soon?"color:var(--amber)":"")+'">'+
          dt.toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"})+'</div>';
      if(!past){
        out+='<div style="font-family:var(--mono);font-size:9.5px;margin-bottom:8px;color:'+
          (soon?"var(--amber)":"var(--gold)")+';font-weight:'+(soon?"700":"400")+'">'+
          (days===0?"\u2726 REPORTS TODAY":days===1?"\u2726 REPORTS TOMORROW":"in "+days+" days")+'</div>';
      } else {
        out+='<div style="font-family:var(--mono);font-size:9px;color:var(--inkFade);margin-bottom:8px">'+
          Math.abs(days)+'d ago</div>';
      }
    } else {
      out+='<div style="font-family:var(--mono);font-size:8.5px;color:var(--inkFade);padding:3px 0 8px;line-height:1.5">'+
        'Earnings date not yet known.<br>The engine checks a rotating batch each run \u2014 '+
        'positions and plans are checked every day.</div>';
    }

    // FRESH EARNINGS — the whole point during earnings season
    if(fd&&fd.fresh_earnings){
      var lq=fin[fin.length-1]||{};
      out+='<div style="background:var(--goldBg,rgba(166,124,0,.1));border:1px solid var(--gold);border-radius:5px;padding:7px 9px;margin-bottom:8px">'+
        '<div style="font-family:var(--mono);font-size:7.5px;color:var(--gold);letter-spacing:.8px;text-transform:uppercase;margin-bottom:3px">\u2726 New numbers just in</div>'+
        '<div style="font-family:var(--mono);font-size:10px;color:var(--ink);line-height:1.5">'+
          String(fd.fresh_earnings).slice(0,10)+
          (lq.revenue_B!=null?'<br>Rev $'+lq.revenue_B.toFixed(2)+'B'+
            (lq.rev_yoy!=null?' <span style="color:'+(lq.rev_yoy>=0?"var(--green)":"var(--red)")+'">('+
             (lq.rev_yoy>=0?"+":"")+lq.rev_yoy+'% YoY)</span>':''):'')+
          (lq.net_margin!=null?'<br>Net margin '+lq.net_margin+'%':'')+
        '</div></div>';
    }

    // last reported quarter — always available from committed data
    if(fin.length){
      var q=fin[fin.length-1];
      out+='<div class="earn-row"><span class="k">Last quarter</span><span style="font-weight:700">'+(q.q||"\u2014")+'</span></div>';
      if(q.revenue_B!=null) out+='<div class="earn-row"><span class="k">Revenue</span><span>$'+q.revenue_B.toFixed(2)+'B</span></div>';
      if(q.rev_yoy!=null) out+='<div class="earn-row"><span class="k">Rev YoY</span><span style="color:'+(q.rev_yoy>=0?"var(--green)":"var(--red)")+'">'+(q.rev_yoy>=0?"+":"")+q.rev_yoy+'%</span></div>';
    }
    if(p.employees) out+='<div class="earn-row"><span class="k">Employees</span><span>'+p.employees.toLocaleString()+'</span></div>';
    if(p.div_yield) out+='<div class="earn-row"><span class="k">Div yield</span><span>'+(p.div_yield*100).toFixed(2)+'%</span></div>';
    el.innerHTML=out;
  }

  // AI thesis — knows whether it's writing for an idea, a ready plan, or a live position
  function dpGenThesis(id,btn){
    var t=trGet(id); if(!t) return;
    var tk=t.ticker;
    var e=(dpEnrich&&dpEnrich[tk])||{}, p=e.profile||{}, q=e.quote||{};
    var meta=(dpCache[tk]&&dpCache[tk].meta)||{};
    var cur=meta.last||trPrices[tk];
    var calc=trCalc(t,cur);
    var box=document.getElementById("dpGen");
    btn.disabled=true; btn.textContent="Thinking\u2026";
    box.innerHTML='<div class="dp-gen" style="color:var(--inkLight);font-family:var(--mono);font-size:10px;padding:8px 0">Writing\u2026</div>';
    var regime=(C.macro&&C.macro.regime)||"NO_CLEAR";
    var fdt=dpFinCache[tk]||null;
    var finArr=(fdt&&fdt.quarters)||e.financials||[];
    var fin=finArr.slice(-3).map(function(f){
      return f.q+": rev $"+f.revenue_B+"B"+
        (f.rev_yoy!=null?" (YoY "+(f.rev_yoy>=0?"+":"")+f.rev_yoy+"%)":"")+
        (f.net_margin!=null?", net margin "+f.net_margin+"%":"")+
        (f.fcf_margin!=null?", FCF margin "+f.fcf_margin+"%":"");
    }).join("; ");
    var lastF=finArr[finArr.length-1]||{};
    var health=[];
    if(lastF.roe!=null) health.push("ROE "+lastF.roe+"%");
    if(lastF.debt_equity!=null) health.push("debt/equity "+lastF.debt_equity);
    if(lastF.current_ratio!=null) health.push("current ratio "+lastF.current_ratio);
    var lo52=(e.range52&&e.range52.low)||meta.low52, hi52=(e.range52&&e.range52.high)||meta.high52;
    var stage = t.status==="open" ? "The trader ALREADY HOLDS this position." :
                trIsReady(t) ? "The trader has a ready plan but has NOT entered yet." :
                               "The trader is still studying this — no levels set yet.";
    var prompt=
      "You are a senior hedge fund PM writing a research thesis for "+tk+(p.name?" ("+p.name+")":"")+". "+
      "Use ONLY the data provided. Never invent numbers. "+stage+" "+
      "Macro regime: "+regime+". Sector: "+(p.sector||t.industry||"?")+", industry: "+(p.industry||t.industry||"?")+". "+
      "Current price "+(cur!=null?cur.toFixed(2):"?")+
      (q.mcap_B!=null?", market cap $"+q.mcap_B+"B":"")+
      (e.pe?", P/E "+e.pe.toFixed(1):"")+
      ((lo52&&hi52)?", 52-week range "+lo52+"\u2013"+hi52:"")+". "+
      (t.trade_score!=null?"Engine scores: trade "+t.trade_score+"/100, invest "+t.invest_score+"/100. ":"")+
      (t.setup?"Setup: "+t.setup+". ":"")+
      (t.entry?"Planned entry "+t.entry+". ":"")+
      (t.stop?"Stop "+t.stop+". ":"")+
      (t.target?"Target "+t.target+". ":"")+
      (calc.rr!=null?"Risk/reward "+calc.rr.toFixed(1)+"R. ":"")+
      (fin?"Recent quarters: "+fin+". ":"")+
      (health.length?"Balance sheet: "+health.join(", ")+". ":"")+
      (p.target_mean?"Analyst mean target "+p.target_mean+". ":"")+
      (p.summary?"Business: "+truncate(p.summary,300)+" ":"")+
      "Write these sections with the header on its own line: WHAT THEY DO, MOAT, ENTRY, EXIT, STRATEGY, RISKS. "+
      "WHAT THEY DO: one tight sentence. MOAT: the durable advantage, or say plainly if it's weak. "+
      (t.entry?"ENTRY: assess whether the planned entry is sound given the levels. ":"ENTRY: suggest a price or condition to enter, using the 52-week range as reference. ")+
      (t.stop?"EXIT: assess the stop and target, and whether the R/R justifies the trade. ":"EXIT: suggest stop and target logic with prices. ")+
      "STRATEGY: how to play it given the regime and scores. RISKS: the top 2 risks. "+
      "Under 220 words. Plain text, no markdown symbols.";
    fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1400,messages:[{role:"user",content:prompt}]})
    }).then(function(r){ return r.json(); }).then(function(d){
      var txt=(d.content||[]).filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("\n");
      box.innerHTML='<div class="dp-gen">'+txt.replace(/\n?(WHAT THEY DO|MOAT|ENTRY|EXIT|STRATEGY|RISKS)\s*:?/g,'<h5>$1</h5>')+'</div>';
      btn.style.display="none";
    }).catch(function(err){
      box.innerHTML='<div class="dp-gen" style="color:var(--red);font-size:11px">Thesis generation failed ('+err.message+'). Needs the live API on the deployed site.</div>';
      btn.disabled=false; btn.textContent="Retry \u2192";
    });
  }

  function fmtN(v){ return v==null?"\u2014":Number(v).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}); }
  function truncate(s,n){ return (s&&s.length>n)?s.slice(0,n)+"\u2026":(s||""); }

  // ---------- mobile rail ----------
  // ---------- floating nav panel ----------
  var navPanel=document.getElementById("navPanel"), navBtn=document.getElementById("navBtn"), navScrim=document.getElementById("navScrim");
  function openNav(){ navPanel.classList.add("open"); navScrim.classList.add("show"); }
  function closeNav(){ navPanel.classList.remove("open"); navScrim.classList.remove("show"); }
  function toggleNav(){ navPanel.classList.contains("open")?closeNav():openNav(); }
  navBtn.addEventListener("click",toggleNav);
  navScrim.addEventListener("click",closeNav);

  // ---------- boot ----------
  var start=(location.hash||"").replace("#","");
  if(!NAV.some(function(n){return n.id===start&&n.live;})) start="markets";
  go(start);
})();
</script>

</body>
</html>
